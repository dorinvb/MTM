            { id: "3_80", ch: 3, ch_name: "Contracte, Contabilitate si Marketing", q_num: 80, text: "Care din cele de mai jos va apărea ca un activ circulant într-un bilanț?", options: [{ letter: "A", text: "debitorii comerciali" }, { letter: "B", text: "dividendul propus acționarilor" }, { letter: "C", text: "creditorii" }, { letter: "D", text: "împrumuturile bancare și creditele prin cont descoperit" }], correct: 0 },  // === CAPITOLUL 4: REGLEMENTARI TRANSPORT MARFA (1-50) ===
            { id: "4_1", ch: 4, ch_name: "Reglementari Transport Marfa", q_num: 1, text: "În conformitate cu OG nr. 27/2011 privind transporturile rutiere, din punct de vedere al caracterului comercial al activităţii există următoarele categorii de transport rutier:", options: [{ letter: "A", text: "transport rutier în trafic naţional şi transport rutier în trafic internaţional" }, { letter: "B", text: "transport rutier de mărfuri şi transport rutier de persoane" }, { letter: "C", text: "transport rutier contra cost şi transport rutier în cont propriu" }, { letter: "D", text: "transport rutier public şi transport în interes personal" }], correct: 2 },
            { id: "4_2", ch: 4, ch_name: "Reglementari Transport Marfa", q_num: 2, text: "În conformitate cu OG nr. 27/2011 privind transporturile rutiere, din punct de vedere al ariei de desfăşurare există următoarele categorii de transport rutier:", options: [{ letter: "A", text: "transport rutier contra cost şi transport rutier în cont propriu" }, { letter: "B", text: "transport rutier de mărfuri şi transport rutier de persoane" }, { letter: "C", text: "transport rutier naţional şi transport rutier internaţional" }, { letter: "D", text: "transport rutier public şi transport în interes personal" }], correct: 2 },
            { id: "4_3", ch: 4, ch_name: "Reglementari Transport Marfa", q_num: 3, text: "Prevederile OUG 27/2011 privind accesul la ocupaţia de operator de transport nu se aplică întreprinderilor angajate exclusiv în următoarele tipuri de transport rutier naţional:", options: [{ letter: "A", text: "transportul de mărfuri cu autovehicule a căror masă totală maximă autorizată nu depăşeşte 7,5 tone" }, { letter: "B", text: "transportul de mărfuri cu autovehicule închiriate a căror masă totală maximă autorizată depăşeşte 3,5 tone" }, { letter: "C", text: "transporturi comerciale de lapte şi stupi de albine" }, { letter: "D", text: "transporturi poştale efectuate în cadrul unui serviciu universal" }], correct: 3 },
            { id: "4_4", ch: 4, ch_name: "Reglementari Transport Marfa", q_num: 4, text: "Ce măsuri trebuie să ia o întreprindere deținătoare de parc auto pentru prevenirea accidentelor de circulație?", options: [{ letter: "A", text: "să verifice, prin sondaj, capacitatea de muncă a conducătorilor auto la începutul zilei de muncă" }, { letter: "B", text: "să utilizeze numai conducători auto cu experiență de cel puțin 1 an în conducerea autovehiculelor" }, { letter: "C", text: "să asigure instruirea lunară a conducătorilor auto cu tematică specifică de siguranță rutieră" }, { letter: "D", text: "să efectueze investigarea accidentelor de circulație soldate cu victime" }], correct: 3 },
            { id: "4_5", ch: 4, ch_name: "Reglementari Transport Marfa", q_num: 5, text: "Prevederile OUG 27/2011 privind accesul la ocupaţia de operator de transport nu se aplică întreprinderilor angajate exclusiv în următoarele tipuri de transport rutier naţional:", options: [{ letter: "A", text: "transporturi comerciale de lapte si stupi de albine, cu incasarea contravalorii transportului" }, { letter: "B", text: "transportul comercial de vehicule defecte sau care sunt avariate, cu incasarea contravalorii transportului" }, { letter: "C", text: "transportul de marfuri contra cost cu autovehicule a caror masa totala maxima autorizata depaseste 7,5 tone" }, { letter: "D", text: "transportul de marfuri în regim de taxi" }], correct: 3 },
            { id: "4_6", ch: 4, ch_name: "Reglementari Transport Marfa", q_num: 6, text: "Pentru care categorie și tip de transport rutier dintre cele enumerate este obligatorie licența comunitară:", options: [{ letter: "A", text: "transport contra cost" }, { letter: "B", text: "transport în cont propriu în trafic național cu vehicule cu masa maximă autorizată peste 7,5 tone" }, { letter: "C", text: "transport în cont propriu de mărfuri perisabile" }, { letter: "D", text: "transport în cont propriu în trafic național cu vehicule cu masa maximă autorizată peste 3,5 tone" }], correct: 0 },
            { id: "4_7", ch: 4, ch_name: "Reglementari Transport Marfa", q_num: 7, text: "În baza licenţei comunitare şi a copiilor conforme ale acesteia, un operator de transport poate efectua conform prevederilor O.G. nr. 27/2011:", options: [{ letter: "A", text: "operaţiuni de transport în cont propriu şi activităţi de intermediere în transporturile rutiere" }, { letter: "B", text: "operaţiuni de transport rutier contra cost şi în cont propriu" }, { letter: "C", text: "operaţiuni de transport rutier public şi activităţi conexe transporturilor rutiere" }, { letter: "D", text: "operaţiuni de transport rutier public şi activităţi de intermediere în transporturile rutiere" }], correct: 1 },
            { id: "4_8", ch: 4, ch_name: "Reglementari Transport Marfa", q_num: 8, text: "Operatorul de transport trebuie să dețină la sediu:", options: [{ letter: "A", text: "documentele privind întreținerea vehiculelor pentru o perioadă de 12 luni" }, { letter: "B", text: "documentele privind întreținerea vehiculelor pentru anul în curs și anul precedent" }, { letter: "C", text: "documentele privind întreținerea vehiculelor pentru o perioadă de 18 luni" }, { letter: "D", text: "documentele privind întreținerea vehiculelor pentru o perioadă de 6 luni" }], correct: 2 },
            { id: "4_9", ch: 4, ch_name: "Reglementari Transport Marfa", q_num: 9, text: "Certificatul de transport în cont propriu nu se poate elibera dacă:", options: [{ letter: "A", text: "întreprinderea nu îndeplineste conditia de competenta profesionala" }, { letter: "B", text: "întreprinderea nu îndeplineste conditiile pentru eliberarea carnetului TIR" }, { letter: "C", text: "întreprinderea nu prezinta asigurarea de risc sau scrisoarea de garantie bancara" }, { letter: "D", text: "întreprinderea nu are ca obiect de activitate principal transportul rutier" }], correct: 0 },
            { id: "4_10", ch: 4, ch_name: "Reglementari Transport Marfa", q_num: 10, text: "Transportul rutier în cont propriu:", options: [{ letter: "A", text: "nu constituie decât o activitate auxiliară ansamblului de activităţi desfăşurate de întreprindere" }, { letter: "B", text: "nu este permis în cazul transportului internaţional" }, { letter: "C", text: "se efectuează contra cost dar cu încasarea echivalentului în natură al tarifului" }, { letter: "D", text: "se poate efectua doar cu vehicule inchiriate" }], correct: 0 },
            { id: "4_11", ch: 4, ch_name: "Reglementari Transport Marfa", q_num: 11, text: "Transportul rutier în cont propriu se efectuează:", options: [{ letter: "A", text: "contra cost, conform contractului de transport" }, { letter: "B", text: "fără încasarea unui tarif, contravaloarea transportului putând fi achitată în natură" }, { letter: "C", text: "fără încasarea unui tarif, contravaloarea transportului putând fi achitată în servicii" }, { letter: "D", text: "prin transportarea mărfii din sau către întreprindere în scopuri proprii" }], correct: 3 },
            { id: "4_12", ch: 4, ch_name: "Reglementari Transport Marfa", q_num: 12, text: "Condițiile tehnice suplimentare pe care trebuie să le îndeplinească autovehiculele care transportă mărfuri periculoase pentru a circula pe drumurile publice sunt prevăzute în:", options: [{ letter: "A", text: "OMT 1892/2006" }, { letter: "B", text: "RNTR - 2" }, { letter: "C", text: "RNTR - 1" }, { letter: "D", text: "RNTR - 3" }], correct: 3 },
            { id: "4_13", ch: 4, ch_name: "Reglementari Transport Marfa", q_num: 13, text: "În conformitate cu prevederile O.G. nr. 27/2011, licenţa comunitară se eliberează de autoritatea competentă cu o valabilitate de:", options: [{ letter: "A", text: "1 an" }, { letter: "B", text: "10 ani" }, { letter: "C", text: "5 ani" }, { letter: "D", text: "7 ani" }], correct: 1 },
            { id: "4_14", ch: 4, ch_name: "Reglementari Transport Marfa", q_num: 14, text: "Conform prevederilor O.G. nr. 27/2011, licenţa comunitară se păstrează de către întreprindere la:", options: [{ letter: "A", text: "autoritatea competentă" }, { letter: "B", text: "bordul autovehiculului" }, { letter: "C", text: "registrul electronic al operatorilor de transport" }, { letter: "D", text: "sediul întreprinderii" }], correct: 3 },
            { id: "4_15", ch: 4, ch_name: "Reglementari Transport Marfa", q_num: 15, text: "Conform prevederilor O.G. nr. 27/2011, perioada de valabilitate a copiilor conforme ale licenţei comunitare este de:", options: [{ letter: "A", text: "cel mult un an, fără a depăşi perioada de valabilitate a licenţei comunitare" }, { letter: "B", text: "minimum cinci ani, fără a depăşi perioada de valabilitate a licenţei comunitare" }, { letter: "C", text: "minimum trei ani, fără a depăşi perioada de valabilitate a licenţei comunitare" }, { letter: "D", text: "minimum un an, fără a depăşi perioada de valabilitate a licenţei comunitare" }], correct: 2 },
            { id: "4_16", ch: 4, ch_name: "Reglementari Transport Marfa", q_num: 16, text: "Conform Convenției CMR un operator de transport care efectuează transport internațional de mărfuri poate:", options: [{ letter: "A", text: "să se scutească pe sine de responsabilitatea CMR prin inserarea în acest scop a unei clauze în condițiile sale de transport" }, { letter: "B", text: "să-și diminueze responsabilitatea mai mult decât îi este permis de convenție prin inserarea în acest scop a unei clauze în condițiile sale de transport" }, { letter: "C", text: "să-și decline responsabilitatea CMR dacă destinatarul nu a cunoscut termenii convenției" }, { letter: "D", text: "să convină cu expeditorul ca acesta să accepte o responsabilitate mai mare decât este prevăzută prin Convenție" }], correct: 3 },
            { id: "4_17", ch: 4, ch_name: "Reglementari Transport Marfa", q_num: 17, text: "Copia conformă a licenţei comunitare este personalizată de către emitent cu:", options: [{ letter: "A", text: "numărul de înmatriculare al autovehiculului pentru care a fost emisă" }, { letter: "B", text: "numele şi prenumele conducătorului auto" }, { letter: "C", text: "numele şi prenumele managerului de transport" }, { letter: "D", text: "seria certificatului de înmatriculare al autovehiculului pentru care a fost emisă" }], correct: 0 },
            { id: "4_18", ch: 4, ch_name: "Reglementari Transport Marfa", q_num: 18, text: "Conform prevederilor O.G. nr. 27/2011, certificatul de transport în cont propriu se păstrează de către întreprindere la:", options: [{ letter: "A", text: "autoritatea competentă" }, { letter: "B", text: "bordul autovehiculului" }, { letter: "C", text: "registrul electronic al întreprinderilor de transport" }, { letter: "D", text: "sediul întreprinderii" }], correct: 3 },
            { id: "4_19", ch: 4, ch_name: "Reglementari Transport Marfa", q_num: 19, text: "Conform prevederilor O.G. nr. 27/2011, perioada de valabilitate a copiilor conforme ale certificatului de transport în cont propriu este de:", options: [{ letter: "A", text: "cel mult un an, fără a depăşi perioada de valabilitate a certificatului de transport în cont propriu" }, { letter: "B", text: "minimum cinci ani, fără a depăşi perioada de valabilitate a certificatului de transport în cont propriu" }, { letter: "C", text: "minimum trei ani, fără a depăşi perioada de valabilitate a certificatului de transport în cont propriu" }, { letter: "D", text: "minimum un an, fără a depăşi perioada de valabilitate a certificatului de transport în cont propriu" }], correct: 3 },
            { id: "4_20", ch: 4, ch_name: "Reglementari Transport Marfa", q_num: 20, text: "În cazul aplicării măsurii de suspendare a unei copii conforme a licenței comunitare, operatorul de transport va depune acest document la:", options: [{ letter: "A", text: "inspectoratul teritorial al I.S.C.T.R. în raza căruia s-a făcut controlul în termen de maximum 15 zile de la comunicarea măsurii" }, { letter: "B", text: "agenția teritorială a A.R.R. din județul în care se află sediul operatorului de transport în termen de maximum 5 zile de la comunicarea măsurii" }, { letter: "C", text: "agenția teritorială a A.R.R. din județul în care se află sediul operatorului de transport în termen de maximum 15 zile de la comunicarea măsurii" }, { letter: "D", text: "inspectoratul teritorial al I.S.C.T.R. în raza căruia s-a făcut controlul în termen de maximum 5 zile de la comunicarea măsurii" }], correct: 3 },
            { id: "4_21", ch: 4, ch_name: "Reglementari Transport Marfa", q_num: 21, text: "Certificatul de transport în cont propriu nu se poate elibera dacă:", options: [{ letter: "A", text: "întreprinderea nu are ca obiect de activitate principal transportul rutier" }, { letter: "B", text: "întreprinderea nu îndeplinește condiția de competență profesională" }, { letter: "C", text: "întreprinderea nu prezintă asigurarea de risc sau scrisoarea de garanție bancară" }, { letter: "D", text: "întreprinderea nu îndeplinește condiția de capacitate financiară" }], correct: 1 },
            { id: "4_22", ch: 4, ch_name: "Reglementari Transport Marfa", q_num: 22, text: "Conform prevederilor O.G. nr. 27/2011, copia conformă a certificatului de transport în cont propriu este personalizată de către emitent cu:", options: [{ letter: "A", text: "numărul de înmatriculare al autovehiculului pentru care a fost emisă" }, { letter: "B", text: "numele şi prenumele conducătorului auto" }, { letter: "C", text: "numele şi prenumele managerului de transport" }, { letter: "D", text: "seria certificatului de înmatriculare al autovehiculului pentru care a fost emisă" }], correct: 0 },
            { id: "4_23", ch: 4, ch_name: "Reglementari Transport Marfa", q_num: 23, text: "Conform prevederilor O.G. nr. 27/2011, certificatul de transport în cont propriu se eliberează de autoritatea competentă cu o valabilitate de:", options: [{ letter: "A", text: "1 an" }, { letter: "B", text: "10 ani" }, { letter: "C", text: "5 ani" }, { letter: "D", text: "7 ani" }], correct: 1 },
            { id: "4_24", ch: 4, ch_name: "Reglementari Transport Marfa", q_num: 24, text: "În conformitate cu prevederile Regulamentului nr.1072/2009, licenţa comunitară este eliberată:", options: [{ letter: "A", text: "pe numele operatorului de transport si nu este transmisibila" }, { letter: "B", text: "pe numele întreprinderii si a subcontractantului si nu este transmisibila" }, { letter: "C", text: "pe numele operatorului de transport si personalizata cu numele managerului de transport" }, { letter: "D", text: "pe numele întreprinderii care efectueaza activitati conexe transportului rutier în interiorul Uniunii Europene" }], correct: 0 },
            { id: "4_25", ch: 4, ch_name: "Reglementari Transport Marfa", q_num: 25, text: "Perioada săptămânală de odihnă a conducătorului auto:", options: [{ letter: "A", text: "urmează după 6 perioade zilnice de conducere consecutive" }, { letter: "B", text: "nu este necesară dacă nu a fost atins numărul maxim săptămânal de ore de conducere" }, { letter: "C", text: "are două zile" }, { letter: "D", text: "începe de fiecare dată în aceeași zi a săptămânii" }], correct: 0 },
            { id: "4_26", ch: 4, ch_name: "Reglementari Transport Marfa", q_num: 26, text: "În conformitate cu prevederile Regulamentului nr.1072/2009, licenţa comunitară este eliberată de autorităţile competente din statul membru de stabilire pentru o perioadă de până la:", options: [{ letter: "A", text: "10 ani, care poate fi reînnoită" }, { letter: "B", text: "15 ani, care poate fi reînnoită" }, { letter: "C", text: "5 ani, care poate fi reînnoită" }, { letter: "D", text: "licenţa comunitară se eliberează pentru o perioadă nelimitată" }], correct: 0 },
            { id: "4_27", ch: 4, ch_name: "Reglementari Transport Marfa", q_num: 27, text: "În conformitate cu prevederile Regulamentului nr.1072/2009, copiile conforme corespunzătoare licenţei comunitare sunt eliberate vehiculelor deţinute:", options: [{ letter: "A", text: "sub orice forma" }, { letter: "B", text: "în proprietate, în baza unor contracte de cumparare în rate, închiriere sau leasing" }, { letter: "C", text: "în proprietate sau in baza unor contracte de comodat" }, { letter: "D", text: "sub orice forma, cu exceptia contractelor de cumparare în rate" }], correct: 1 },
            { id: "4_28", ch: 4, ch_name: "Reglementari Transport Marfa", q_num: 28, text: "În conformitate cu prevederile Regulamentului CE nr.1071/2009, atunci când un manager de transport îşi pierde buna reputaţie, certificatul de competenţă profesională al managerului de transport declarat inapt:", options: [{ letter: "A", text: "se anuleaza pâna la obtinerea avizului medical si psihologic cu mențiunea apt pentru functia de manager de transport" }, { letter: "B", text: "se suspenda pâna la obtinerea avizului medical si psihologic cu mențiunea apt pentru functia de manager de transport" }, { letter: "C", text: "îşi pierde valabilitatea în toate statele membre pâna la luarea unei măsuri de reabilitare" }, { letter: "D", text: "se anuleaza iar managerul de transport poate obtine un nou certificat numai dupa o perioada de cel putin 5 ani" }], correct: 2 },
            { id: "4_29", ch: 4, ch_name: "Reglementari Transport Marfa", q_num: 29, text: "Care dintre următoarele cerinţe trebuie să le îndeplinească întreprinderea pentru a avea acces la ocupaţia de operator de transport rutier?", options: [{ letter: "A", text: "bună reputaţie" }, { letter: "B", text: "deţine autovehicule agreate de R.A.R." }, { letter: "C", text: "deţine certificat de transport rutier" }, { letter: "D", text: "vechime de cel puţin trei ani în transporturi pentru persoanele cu funcţii care concură la siguranţa circulaţiei" }], correct: 0 },
            { id: "4_30", ch: 4, ch_name: "Reglementari Transport Marfa", q_num: 30, text: "Care dintre următoarele cerinţe trebuie să le îndeplinească întreprinderea pentru a avea acces la ocupaţia de operator de transport rutier?", options: [{ letter: "A", text: "capacitate financiară adecvată numărului de vehicule utilizat" }, { letter: "B", text: "deţine licenţe de execuţie pentru vehiculele utilizate" }, { letter: "C", text: "deţine un număr suficient de vehicule pentru efectuarea transporturilor contractate" }, { letter: "D", text: "este înscrisă în Registrul electronic naţional al întreprinderilor de transport" }], correct: 0 },
            { id: "4_31", ch: 4, ch_name: "Reglementari Transport Marfa", q_num: 31, text: "Care dintre următoarele cerinţe trebuie să le îndeplinească întreprinderea pentru a avea acces la ocupaţia de operator de transport rutier?", options: [{ letter: "A", text: "competenţă profesională" }, { letter: "B", text: "deţine la sediul social cărţile de identitate ale vehiculelor utilizate" }, { letter: "C", text: "deţine la sediul social certificatele de înmatriculare ale vehiculelor utilizate" }, { letter: "D", text: "utilizează numai vehicule aflate în proprietate sa" }], correct: 0 },
            { id: "4_32", ch: 4, ch_name: "Reglementari Transport Marfa", q_num: 32, text: "În cazul efectuării transportului rutier național de mărfuri în cont propriu, prin document de transport se înțelege:", options: [{ letter: "A", text: "copia conformă a certificatului de transport în cont propriu" }, { letter: "B", text: "avizul de însoțire al mărfurilor" }, { letter: "C", text: "scrisoarea de transport C.M.R." }, { letter: "D", text: "copia conformă a licenței de transport" }], correct: 1 },
            { id: "4_33", ch: 4, ch_name: "Reglementari Transport Marfa", q_num: 33, text: "Care dintre următoarele cerinţe trebuie îndeplinită pentru exercitarea ocupaţiei de operator de transport rutier conform Regulamentului CE nr.1071/2009?", options: [{ letter: "A", text: "să aibă angajat un auditor de siguranţă rutieră" }, { letter: "B", text: "să aibă încheiate contracte de transport numai cu o întreprindere licenţiată pentru activităţi de intermediere" }, { letter: "C", text: "să aibă un sediu real şi stabil pe teritoriul unui stat membru" }, { letter: "D", text: "să utilizeze numai conducători auto care sunt cetăţeni ai unui stat membru" }], correct: 2 },
            { id: "4_34", ch: 4, ch_name: "Reglementari Transport Marfa", q_num: 34, text: "Pentru îndeplinirea cerinţei de acces la ocupaţia de operator de transport privind sediul, o întreprindere stabilită în România trebuie să:", options: [{ letter: "A", text: "dispună de unul sau mai multe autovehicule înmatriculate în România" }, { letter: "B", text: "sa detina un sediu si cel putin doua puncte de lucru" }, { letter: "C", text: "dispună de spatiu suficient si amenajat corespunzator pentru depozitarea pieselor de schimb" }, { letter: "D", text: "detina un sediu certificat ISO 9001/2000" }], correct: 0 },
            { id: "4_35", ch: 4, ch_name: "Reglementari Transport Marfa", q_num: 35, text: "Pentru îndeplinirea cerinţei de acces la ocupaţia de operator de transport privind sediul, o întreprindere stabilită în România trebuie să:", options: [{ letter: "A", text: "detina un sediu certificat de ARR situat intr-un stat membru UE, altul decat Romania" }, { letter: "B", text: "desfasoare operatiunile referitoare la autovehiculele utilizate cu echipamentele si instalatiile tehnice corespunzatoare, într-un centru de exploatare situat pe teritoriul României" }, { letter: "C", text: "detina un sediu autorizat de I.S.C.T.R. pentru efectuarea inspectiilor tehnice periodice" }, { letter: "D", text: "detina cel putin o semiremorca inmatriculata in Romania" }], correct: 1 },
            { id: "4_36", ch: 4, ch_name: "Reglementari Transport Marfa", q_num: 36, text: "Pentru obținerea licenței de serviciu pentru punctele de lucru este necesar:", options: [{ letter: "A", text: "punctele de lucru să fie înregistrate la Oficiul Național al Registrului Comerțului și comunicate la Finanțele Publice" }, { letter: "B", text: "nu este reglementată necesitatea obținerii licenței de serviciu pentru punctele de lucru" }, { letter: "C", text: "punctele de lucru să fie înregistrate la Oficiul Național al Registrului Comerțului" }, { letter: "D", text: "licența de serviciu este necesară numai pentru filiale sau sucursale cu personalitate juridică" }], correct: 1 },
            { id: "4_37", ch: 4, ch_name: "Reglementari Transport Marfa", q_num: 37, text: "In cazul in care un operator de transport deschide doua noi puncte de lucru in judete diferite, este necesar sa solicite licente comunitare si pentru punctele de lucru?", options: [{ letter: "A", text: "da, dar dupa inregistrarea punctelor de lucru la Oficiul National al Registrului Comertului" }, { letter: "B", text: "da, dar dupa inregistrarea punctelor de lucru la Agentia Nationala de Cadastru" }, { letter: "C", text: "nu, deoarece odata cu eliberarea licentei comunitare pentru sediu au fost obtinute si mai multe licente pentru punctele de lucru" }, { letter: "D", text: "nu, deoarece nu este necesara obtinerea de licente comunitare pentru punctele de lucru" }], correct: 3 },
            { id: "4_38", ch: 4, ch_name: "Reglementari Transport Marfa", q_num: 38, text: "Capacitatea financiară pentru autovehicule este de:", options: [{ letter: "A", text: "9.000 euro pentru primul autovehicul şi 5.000 euro pentru celelalte autovehicule" }, { letter: "B", text: "9.000 euro pentru primul vehicul şi 3.000 euro pentru celelalte vehicule" }, { letter: "C", text: "90.000 euro pentru primul autovehicul şi 6.000 euro pentru celelalte autovehicule" }, { letter: "D", text: "900 euro pentru primul vehicul şi 6.000 euro pentru celelalte vehicule" }], correct: 0 },
            { id: "4_39", ch: 4, ch_name: "Reglementari Transport Marfa", q_num: 39, text: "În cazul transportului rutier internațional de mărfuri contra cost, la bordul vehiculului trebuie să se afle:", options: [{ letter: "A", text: "atestatul de conducător auto prevăzut la art. 5 din Regulamentul (CE) nr. 1072/2009, dacă conducătorul auto este resortisant al unui stat membru UE" }, { letter: "B", text: "contractul de muncă vizat la ITM, dacă conducătorul auto nu este resortisant al unui stat membru UE" }, { letter: "C", text: "actul prin care se dovedește dreptul de muncă în România, dacă conducătorul auto este cetățean al unui stat care nu este membru UE" }, { letter: "D", text: "atestatul de conducător auto prevăzut la art. 5 din Regulamentul (CE) nr. 1072/2009, dacă conducătorul auto nu este resortisant al unui stat membru UE" }], correct: 3 },
            { id: "4_40", ch: 4, ch_name: "Reglementari Transport Marfa", q_num: 40, text: "În cazul deţinerii unui număr de 2 autovehicule şi 3 remorci condiţia de capacitate financiară este îndeplinită dacă se dispune de un capital şi rezerve de cel puţin:", options: [{ letter: "A", text: "14000 euro" }, { letter: "B", text: "19000 euro" }, { letter: "C", text: "25000 euro" }, { letter: "D", text: "29000 euro" }], correct: 0 },
            { id: "4_41", ch: 4, ch_name: "Reglementari Transport Marfa", q_num: 41, text: "În cazul deţinerii unui număr de 3 autovehicule si 5 remorci condiţia de capacitate financiara este îndeplinita dacă se dispune de un capital şi rezerve de cel puţin:", options: [{ letter: "A", text: "14.000 euro" }, { letter: "B", text: "19.000 euro" }, { letter: "C", text: "25.000 euro" }, { letter: "D", text: "45.000 euro" }], correct: 1 },
            { id: "4_42", ch: 4, ch_name: "Reglementari Transport Marfa", q_num: 42, text: "În cazul deţinerii unui număr de 5 autovehicule si 5 remorci condiţia de capacitate financiara este îndeplinita dacă se dispune de un capital şi rezerve de cel puţin:", options: [{ letter: "A", text: "25.000 euro" }, { letter: "B", text: "29.000 euro" }, { letter: "C", text: "33.000 euro" }, { letter: "D", text: "59.000 euro" }], correct: 1 },
            { id: "4_43", ch: 4, ch_name: "Reglementari Transport Marfa", q_num: 43, text: "Pentru îndeplinirea cerinței de acces la ocupația de operator de transport privind sediul, o întreprindere stabilită în România trebuie să:", options: [{ letter: "A", text: "dețină un sediu certificat de ARR pentru conformitate cu Regulamentul CE nr. 1073/2009" }, { letter: "B", text: "dețină un sediu autorizat de R.A.R. pentru exploatarea autovehiculelor" }, { letter: "C", text: "desfășoare operațiunile referitoare la autovehiculele utilizate cu echipamentele și instalațiile tehnice corespunzătoare, într-un centru de exploatare situat pe teritoriul României" }, { letter: "D", text: "să dispună de unul sau mai multe vehicule înmatriculate în România" }], correct: 2 },
            { id: "4_44", ch: 4, ch_name: "Reglementari Transport Marfa", q_num: 44, text: "Care dintre următoarele cerinţe trebuie să le îndeplinească întreprinderea pentru a avea acces la transportul rutier în cont propriu?", options: [{ letter: "A", text: "bună reputaţie" }, { letter: "B", text: "deţine autovehicule agreate de R.A.R." }, { letter: "C", text: "deţine certificat de transport rutier" }, { letter: "D", text: "vechime de cel puţin trei ani în transporturi pentru persoanele cu funcţii care concură la siguranţa circulaţiei" }], correct: 0 },
            { id: "4_45", ch: 4, ch_name: "Reglementari Transport Marfa", q_num: 45, text: "Care dintre următoarele cerinţe trebuie să le îndeplinească întreprinderea pentru a avea acces la transportul rutier în cont propriu?", options: [{ letter: "A", text: "competenţă profesională" }, { letter: "B", text: "deţine la sediul social cărţile de identitate ale vehiculelor utilizate" }, { letter: "C", text: "deţine la sediul social certificatele de înmatriculare ale vehiculelor utilizate" }, { letter: "D", text: "utilizează numai vehicule aflate în proprietate sa" }], correct: 0 },
            { id: "4_46", ch: 4, ch_name: "Reglementari Transport Marfa", q_num: 46, text: "În cazul transportului rutier internațional de mărfuri în cont propriu, la bordul vehiculului trebuie să se afle:", options: [{ letter: "A", text: "atestatul de conducător auto prevăzut la art. 5 din Regulamentul (CE) nr. 1072/2009, dacă conducătorul auto este resortisant al unui stat membru UE" }, { letter: "B", text: "actul prin care se dovedește dreptul de muncă în România, dacă conducătorul auto este cetățean al unui stat care nu este membru UE" }, { letter: "C", text: "contractul de muncă vizat la ITM, dacă conducătorul auto nu este resortisant al unui stat membru UE" }, { letter: "D", text: "atestatul de conducător auto prevăzut la art. 5 din Regulamentul (CE) nr. 1072/2009, dacă conducătorul auto nu este resortisant al unui stat membru UE" }], correct: 3 },

            { id: "4_48", ch: 4, ch_name: "Reglementari Transport Marfa", q_num: 48, text: "Cererea pentru obţinerea licenţei comunitare şi a copiilor conforme ale acesteia va fi însoţită de:", options: [{ letter: "A", text: "autorizaţia centrului de exploatare a vehiculelor eliberată de I.S.C.T.R." }, { letter: "B", text: "cazierul judiciar al managerului de transport" }, { letter: "C", text: "certificatele de înmatriculare ale vehiculelor utilizate" }, { letter: "D", text: "dovada achitării tarifului de utilizare a reţelei de drumuri naţionale din România" }], correct: 1 },

            { id: "4_50", ch: 4, ch_name: "Reglementari Transport Marfa", q_num: 50, text: "Cererea pentru obţinerea licenţei comunitare şi a copiilor conforme ale acesteia va fi însoţită de:", options: [{ letter: "A", text: "certificatul de competenţă profesională al managerului de transport" }, { letter: "B", text: "certificatul privind încadrarea vehiculelor în normele de poluare şi siguranţă rutieră" }, { letter: "C", text: "documentul privind realizarea auditului de siguranţă rutieră" }, { letter: "D", text: "statutul societăţii din care să rezulte că aceasta are în obiectul de activitate activităţi conexe transportului rutier" }], correct: 0 },  // === CAPITOLUL 4: REGLEMENTARI TRANSPORT MARFA (51-100) ===
            { id: "4_51", ch: 4, ch_name: "Reglementari Transport Marfa", q_num: 51, text: "În cazul transportului rutier național de mărfuri în cont propriu, la bordul vehiculului trebuie să se afle:", options: [{ letter: "A", text: "contractul de muncă vizat la ITM, dacă conducătorul auto nu este resortisant al unui stat membru UE" }, { letter: "B", text: "atestatul de conducător auto prevăzut la art. 5 din Regulamentul (CE) nr. 1072/2009, dacă conducătorul auto este resortisant al unui stat membru UE" }, { letter: "C", text: "atestatul de conducător auto prevăzut la art. 5 din Regulamentul (CE) nr. 1072/2009, dacă conducătorul auto nu este resortisant al unui stat membru UE" }, { letter: "D", text: "actul prin care se dovedește dreptul de muncă în România, dacă conducătorul auto este cetățean al unui stat care nu este membru UE" }], correct: 2 },
            { id: "4_52", ch: 4, ch_name: "Reglementari Transport Marfa", q_num: 52, text: "În vederea efectuării transportului rutier de mărfuri periculoase, operatorul de transport rutier va depune sau va transmite prin poştă:", options: [{ letter: "A", text: "certificatul de atestare profesională a consilierului de siguranţă" }, { letter: "B", text: "certificatul privind încadrarea vehiculelor în normele de poluare şi siguranţă rutieră" }, { letter: "C", text: "documentul privind asigurarea întreţinerii tehnice a vehiculelor rutiere utilizate" }, { letter: "D", text: "documentul privind realizarea auditului de siguranţă rutieră" }], correct: 0 },
            { id: "4_53", ch: 4, ch_name: "Reglementari Transport Marfa", q_num: 53, text: "În vederea efectuării transportului rutier de mărfuri periculoase, operatorul de transport rutier va depune sau va transmite prin poştă la A.R.R.:", options: [{ letter: "A", text: "autorizatia centrului de exploatare pentru vehiculele care urmeaza a fi utilizate la transportul de marfuri periculoase" }, { letter: "B", text: "documentul de transport (CMR) completat cu marfurile periculoase care urmeaza a fi transportate" }, { letter: "C", text: "instructiunile de siguranta care se vor afla la bordul unitatii de transport pentru toate marfurile care urmeaza a fi transportate" }, { letter: "D", text: "certificatul de agreare eliberat de R.A.R., pentru vehiculele pentru care este necesar a se elibera respectivul certificat" }], correct: 3 },
            { id: "4_54", ch: 4, ch_name: "Reglementari Transport Marfa", q_num: 54, text: "În vederea efectuării transportului rutier de mărfuri periculoase, operatorul de transport rutier va depune sau va transmite prin poştă la A.R.R.:", options: [{ letter: "A", text: "copia Acordului ADR" }, { letter: "B", text: "instructiunile de siguranta pentru marfurile periculoase transportate" }, { letter: "C", text: "certificatul de atestare profesionala al conducatorului auto, specific marfurilor periculoase care vor fi transportate" }, { letter: "D", text: "dovada achizitionarii trusei ADR" }], correct: 2 },
            { id: "4_55", ch: 4, ch_name: "Reglementari Transport Marfa", q_num: 55, text: "În vederea efectuării transportului rutier de mărfuri periculoase, operatorul de transport rutier va depune sau va transmite prin poştă la A.R.R.:", options: [{ letter: "A", text: "certificatul de inspectie tehnica, în cazul suprastructurilor specializate pentru transportul recipientelor cu gaze lichefiate sau cu alte marfuri periculoase" }, { letter: "B", text: "declaratia pe proprie raspundere privind conformitatea marfurilor care urmeaza a fi transportate" }, { letter: "C", text: "certificatul de agreare eliberat de R.A.R., în cazul vehiculelor utilizate pentru transportul marfurilor periculoase în colete" }, { letter: "D", text: "certificatul privind încadrarea vehiculelor în normele de poluare si siguranta rutiera" }], correct: 0 },
            { id: "4_56", ch: 4, ch_name: "Reglementari Transport Marfa", q_num: 56, text: "În vederea efectuării transportului rutier de mărfuri periculoase, operatorul de transport rutier va depune sau va transmite prin poştă la A.R.R.:", options: [{ letter: "A", text: "autorizaţia eliberată de Agenţia pentru Protecţia Mediului, pentru vehiculele care transportă mărfuri periculoase din clasa 7" }, { letter: "B", text: "autorizaţia eliberată de Comisia Naţională pentru Controlul Activităţilor Nucleare, pentru vehiculele care transportă mărfuri periculoase din clasa 7" }, { letter: "C", text: "autorizaţia eliberată de Garda de Mediu, pentru vehiculele care transportă mărfuri periculoase din clasa 7" }, { letter: "D", text: "autorizaţia eliberată de Ministerul Transporturilor şi Infrastructurii, pentru vehiculele care transportă mărfuri periculoase din clasa 7" }], correct: 1 },
            { id: "4_57", ch: 4, ch_name: "Reglementari Transport Marfa", q_num: 57, text: "În conformitate cu prevederile O.G. nr. 27/2011, la bordul autovehiculului care efectuează transport rutier național de mărfuri în cont propriu trebuie să se afle:", options: [{ letter: "A", text: "licența de execuție a autovehiculului" }, { letter: "B", text: "copia conformă a licenței comunitare" }, { letter: "C", text: "documentul de transport" }, { letter: "D", text: "contractul de muncă al conducătorului auto" }], correct: 2 },
            { id: "4_58", ch: 4, ch_name: "Reglementari Transport Marfa", q_num: 58, text: "Unui operator de transport rutier i se poate elibera un număr maxim de copii conforme ale licenţei comunitare corespunzător:", options: [{ letter: "A", text: "numărului de autovehicule pentru care îndeplineşte condiţia de capacitate financiară" }, { letter: "B", text: "numărului de autovehicule pentru care îndeplineşte condiţia privind parcarea acestora în condiţii de siguranţă" }, { letter: "C", text: "numărului de vehicule şi conducători auto pentru care îndeplineşte condiţia de competenţă profesională" }, { letter: "D", text: "numărului de vehicule, inclusiv remorcile şi semiremorcile pentru care îndeplineşte condiţia financiară" }], correct: 0 },
            { id: "4_59", ch: 4, ch_name: "Reglementari Transport Marfa", q_num: 59, text: "În cazul transportului rutier național de mărfuri contra cost, la bordul vehiculului trebuie să se afle:", options: [{ letter: "A", text: "atestatul de conducător auto prevăzut la art. 5 din Regulamentul (CE) nr. 1072/2009, dacă conducătorul auto este resortisant al unui stat membru UE" }, { letter: "B", text: "atestatul de conducător auto prevăzut la art. 5 din Regulamentul (CE) nr. 1072/2009, dacă conducătorul auto nu este resortisant al unui stat membru UE" }, { letter: "C", text: "contractul de muncă vizat la ITM, dacă conducătorul auto nu este resortisant al unui stat membru UE" }, { letter: "D", text: "actul prin care se dovedește dreptul de muncă în România, dacă conducătorul auto este cetățean al unui stat care nu este membru UE" }], correct: 1 },
            { id: "4_60", ch: 4, ch_name: "Reglementari Transport Marfa", q_num: 60, text: "În cazul în care operatorul de transport rutier îşi schimbă sediul social, acesta trebuie să notifice schimbarea către A.R.R., în cel mult:", options: [{ letter: "A", text: "10 zile" }, { letter: "B", text: "15 zile" }, { letter: "C", text: "30 zile" }, { letter: "D", text: "5 zile" }], correct: 1 },
            { id: "4_61", ch: 4, ch_name: "Reglementari Transport Marfa", q_num: 61, text: "Operatorul de transport, respectiv întreprinderea, trebuie să dețină la sediu:", options: [{ letter: "A", text: "documentele de transport utilizate pentru ultimii 3 ani" }, { letter: "B", text: "registrul de evidență a inspecțiilor tehnice periodice" }, { letter: "C", text: "documentele doveditoare din care să rezulte că deține autovehicule cu orice alt titlu, în original" }, { letter: "D", text: "registrul de evidență al conducătorilor auto angajați" }], correct: 2 },
            { id: "4_62", ch: 4, ch_name: "Reglementari Transport Marfa", q_num: 62, text: "Cererea pentru obţinerea certificatului de transport în cont propriu şi a copiilor conforme ale acestuia va fi însoţită de:", options: [{ letter: "A", text: "autorizaţia centrului de exploatare a vehiculelor eliberată de I.S.C.T.R." }, { letter: "B", text: "cazierul judiciar al managerului de transport" }, { letter: "C", text: "certificatele de înmatriculare ale vehiculelor utilizate" }, { letter: "D", text: "dovada achitării tarifului de utilizare a reţelei de drumuri naţionale din România" }], correct: 1 },
            { id: "4_63", ch: 4, ch_name: "Reglementari Transport Marfa", q_num: 63, text: "Cererea pentru obţinerea certificatului de transport în cont propriu şi a copiilor conforme ale acestuia va fi însoţită de:", options: [{ letter: "A", text: "cazierul judiciar al întreprinderii" }, { letter: "B", text: "certificatele de omologare ale vehiculelor utilizate" }, { letter: "C", text: "certificatul de atestare profesională al conducătorului auto" }, { letter: "D", text: "dovada verificării aparatului tahograf" }], correct: 0 },
            { id: "4_64", ch: 4, ch_name: "Reglementari Transport Marfa", q_num: 64, text: "Cererea pentru obţinerea certificatului de transport în cont propriu şi a copiilor conforme ale acestuia va fi însoţită de:", options: [{ letter: "A", text: "certificatul de competenţă profesională al managerului de transport" }, { letter: "B", text: "certificatul privind încadrarea vehiculelor în normele de poluare şi siguranţă rutieră" }, { letter: "C", text: "documentul privind realizarea auditului de siguranţă rutieră" }, { letter: "D", text: "statutul societăţii din care să rezulte că aceasta are în obiectul de activitate activităţi conexe transportului rutier" }], correct: 0 },
            { id: "4_65", ch: 4, ch_name: "Reglementari Transport Marfa", q_num: 65, text: "Cererea pentru obținerea licenței comunitare și a copiilor conforme ale acesteia va fi însoțită de:", options: [{ letter: "A", text: "documentul privind asigurarea întreținerii tehnice a vehiculelor rutiere utilizate" }, { letter: "B", text: "asigurarea de răspundere civilă auto" }, { letter: "C", text: "certificatul de radiere de la Oficiul Național al Registrului Comerțului" }, { letter: "D", text: "cărțile de identitate ale vehiculelor utilizate" }], correct: 0 },
            { id: "4_66", ch: 4, ch_name: "Reglementari Transport Marfa", q_num: 66, text: "Ce obligaţie are operatorul de transport, în cazul în care constată că nu mai îndeplineşte condiţia de capacitate financiară pentru toate autovehiculele pentru care s-au emis copii conforme ale licenţei comunitare?", options: [{ letter: "A", text: "în termen de 15 zile, să vândă sau să radieze temporar din circulaţie un număr corespunzător de vehicule" }, { letter: "B", text: "în termen de 10 zile, să depună la A.R.R. un număr de copii conforme egal cu numărul de autovehicule pentru care condiţia de capacitate financiară nu mai este îndeplinită" }, { letter: "C", text: "nu are nici o obligaţie" }, { letter: "D", text: "să anunţe în scris agenţia ARR emitentă despre acest fapt, împreună cu un angajament scris, prin care să se oblige să remedieze situaţia în termen de cel mult 60 de zile" }], correct: 1 },
            { id: "4_67", ch: 4, ch_name: "Reglementari Transport Marfa", q_num: 67, text: "Închirierea unui vehicul rutier de către un operator de transport se face prin:", options: [{ letter: "A", text: "contract de închiriere pe durată determinată a unui vehicul cu conducător auto" }, { letter: "B", text: "contract de închiriere pe durată determinată, contra cost" }, { letter: "C", text: "contract de închiriere pe durată nedeterminată, cu titlu oneros" }, { letter: "D", text: "contract de închiriere sau de concesiune încheiat pe durată determinată" }], correct: 1 },
            { id: "4_68", ch: 4, ch_name: "Reglementari Transport Marfa", q_num: 68, text: "In cazul transporturilor rutiere efectuate cu autovehicule închiriate este necesar:", options: [{ letter: "A", text: "ca autovehiculul să deţină licenţă de execuţie" }, { letter: "B", text: "contractul de închiriere nu este necesar sa fie la bordul autovehiculului, se menţionează valabilitatea contractului in foaia de parcurs de către administratorul firmei" }, { letter: "C", text: "contractul de închiriere sa fie la bordul autovehiculului, in copie" }, { letter: "D", text: "contractul de închiriere sa fie la bordul autovehiculului, in original sau in copie conforma cu originalul" }], correct: 3 },
            { id: "4_69", ch: 4, ch_name: "Reglementari Transport Marfa", q_num: 69, text: "În conformitate cu prevederile Regulamentului nr. 1072/2009, licența comunitară este eliberată:", options: [{ letter: "A", text: "pe numele operatorului de transport și personalizată cu numărul de înmatriculare al autovehiculelor" }, { letter: "B", text: "pe numele întreprinderii care efectuează activități conexe transportului rutier în interiorul Uniunii Europene" }, { letter: "C", text: "pe numele întreprinderii și a subcontractantului și nu este transmisibilă" }, { letter: "D", text: "pe numele operatorului de transport și nu este transmisibilă" }], correct: 3 },
            { id: "4_70", ch: 4, ch_name: "Reglementari Transport Marfa", q_num: 70, text: "Copia conformă a licenţei comunitare se eliberează:", options: [{ letter: "A", text: "pentru fiecare autovehicul şi ansambluri de vehicule" }, { letter: "B", text: "pentru fiecare remorcă" }, { letter: "C", text: "pentru fiecare semiremorcă" }, { letter: "D", text: "pentru fiecare vehicul trăgător şi tractat" }], correct: 0 },
            { id: "4_71", ch: 4, ch_name: "Reglementari Transport Marfa", q_num: 71, text: "Pentru îndeplinirea cerinței de acces la ocupația de operator de transport privind sediul, o întreprindere stabilită în România trebuie să:", options: [{ letter: "A", text: "dispună de spațiu suficient și amenajat corespunzător pentru depozitarea pieselor de schimb" }, { letter: "B", text: "dețină cel puțin un punct de lucru înregistrat la Oficiul Național al Registrului Comerțului" }, { letter: "C", text: "dispună de unul sau mai multe autovehicule înmatriculate în România" }, { letter: "D", text: "dețină un sediu certificat ISO 9001/2000" }], correct: 2 },
            { id: "4_72", ch: 4, ch_name: "Reglementari Transport Marfa", q_num: 72, text: "În conformitate cu prevederile O.G. nr. 27/2011, la bordul autovehiculului care efectuează transport rutier contra cost trebuie să se afle:", options: [{ letter: "A", text: "cartea de identitate a vehiculului" }, { letter: "B", text: "certificatul de transport în cont propriu" }, { letter: "C", text: "copia conformă a licenţei comunitare" }, { letter: "D", text: "licenţa comunitară" }], correct: 2 },
            { id: "4_73", ch: 4, ch_name: "Reglementari Transport Marfa", q_num: 73, text: "În conformitate cu prevederile O.G. nr. 27/2011, la bordul autovehiculului care efectuează transport rutier de mărfuri contra cost trebuie să se afle:", options: [{ letter: "A", text: "contractul de muncă al conducătorului auto" }, { letter: "B", text: "copia conformă a certificatului de transport în cont propriu" }, { letter: "C", text: "documentul de transport" }, { letter: "D", text: "licenţa de execuţie a autovehiculului" }], correct: 2 },
            { id: "4_74", ch: 4, ch_name: "Reglementari Transport Marfa", q_num: 74, text: "În conformitate cu prevederile Regulamentului (CE) nr. 1072/2009, prin operațiuni de cabotaj se înțelege:", options: [{ letter: "A", text: "transportul național în cont propriu în statul de stabilire" }, { letter: "B", text: "transportul național contra cost în numele unui terț efectuat temporar într-un stat membru gazdă" }, { letter: "C", text: "transportul internațional între două puncte de încărcare/descărcare situate în interiorul Uniunii Europene" }, { letter: "D", text: "transportul internațional contra cost în numele unui terț între cel puțin două puncte de încărcare/descărcare situate în același stat membru" }], correct: 1 },
            { id: "4_75", ch: 4, ch_name: "Reglementari Transport Marfa", q_num: 75, text: "În cazul transportului rutier naţional de mărfuri contra cost, prin document de transport se înţelege:", options: [{ letter: "A", text: "avizul de expediţie a mărfurilor" }, { letter: "B", text: "copia conformă a certificatului de transport" }, { letter: "C", text: "factura fiscală" }, { letter: "D", text: "scrisoarea de transport tip C.M.R." }], correct: 3 },
            { id: "4_76", ch: 4, ch_name: "Reglementari Transport Marfa", q_num: 76, text: "În cazul transportului rutier internaţional de mărfuri contra cost, prin document de transport se înţelege:", options: [{ letter: "A", text: "autorizaţia pentru transportul internaţional de marfă" }, { letter: "B", text: "carnetul T.I.R." }, { letter: "C", text: "copia conformă a licenţei de transport" }, { letter: "D", text: "scrisoarea de transport tip C.M.R." }], correct: 3 },
            { id: "4_77", ch: 4, ch_name: "Reglementari Transport Marfa", q_num: 77, text: "În cazul transportului rutier naţional de mărfuri generale contra cost, la bordul vehiculului trebuie să se afle:", options: [{ letter: "A", text: "certificatul de agreare ADR" }, { letter: "B", text: "certificatul de formare profesională ADR" }, { letter: "C", text: "fişa de siguranţă" }, { letter: "D", text: "legitimaţia de serviciu valabilă a conducătorului auto" }], correct: 3 },
            { id: "4_78", ch: 4, ch_name: "Reglementari Transport Marfa", q_num: 78, text: "În conformitate cu prevederile Regulamentului CE nr. 1071/2009, atunci când un manager de transport își pierde buna reputație, certificatul de competență profesională al managerului de transport declarat inapt:", options: [{ letter: "A", text: "se suspendă până la obținerea avizului medical și psihologic cu mențiunea apt pentru funcția de manager de transport" }, { letter: "B", text: "se suspendă până la înlăturarea cauzelor care au stat la baza declarării ca inapt a managerului de transport" }, { letter: "C", text: "își pierde valabilitatea în toate statele membre până la luarea unei măsuri de reabilitare" }, { letter: "D", text: "se anulează până la obținerea avizului medical și psihologic cu mențiunea apt pentru funcția de manager de transport" }], correct: 2 },

            { id: "4_115", ch: 4, ch_name: "Reglementari Transport Marfa", q_num: 115, text: "Operatorul de transport, respectiv întreprinderea, are următoarea obligaţie:", options: [{ letter: "A", text: "să contracteze transporturile numai prin operatori licenţiaţi în activităţi de intermediere în transporturi" }, { letter: "B", text: "să deţină la sediul social licenţa de execuţie în transporturi" }, { letter: "C", text: "să nu permită intervenţia persoanelor neautorizate asupra aparatelor tahograf şi a limitatoarelor de viteză" }, { letter: "D", text: "să nu permită plecarea în cursă a vehiculelor echipate cu tahograf digital fără suficiente foi de înregistrare pentru efectuarea întregului parcurs al transportului" }], correct: 2 },
            { id: "4_116", ch: 4, ch_name: "Reglementari Transport Marfa", q_num: 116, text: "Operatorul de transport, respectiv întreprinderea, are următoarea obligaţie:", options: [{ letter: "A", text: "să deţină la sediul social copia conformă a licenţei comunitare" }, { letter: "B", text: "să nu permită plecarea în cursă a vehiculelor fără completarea înregistrărilor pe diagramele tahograf necesare pentru efectuarea întregului parcurs al transportului" }, { letter: "C", text: "să nu permită plecarea în cursă a vehiculelor fără licenţa comunitară la bord" }, { letter: "D", text: "să nu permită plecarea în cursă a vehiculelor fără suficiente foi de înregistrare pentru efectuarea întregului parcurs al transportului" }], correct: 3 },
            { id: "4_117", ch: 4, ch_name: "Reglementari Transport Marfa", q_num: 117, text: "Operatorul de transport, respectiv întreprinderea, are următoarea obligaţie:", options: [{ letter: "A", text: "să asigure existenţa avizului medical şi psihologic al conducătorului auto la bordul vehiculului" }, { letter: "B", text: "să asigure existenţa documentului privind verificarea tehnică efectuată înainte de plecarea în cursă la bordul vehiculului" }, { letter: "C", text: "să nu permită plecarea în cursă a vehiculelor care au tahograful defect" }, { letter: "D", text: "să nu permită plecarea în cursă a vehiculului fără licenţă de execuţie la bord" }], correct: 2 },
            { id: "4_118", ch: 4, ch_name: "Reglementari Transport Marfa", q_num: 118, text: "Operatorul de transport, respectiv întreprinderea, are următoarea obligaţie:", options: [{ letter: "A", text: "să nu permită plecarea în cursă a vehiculelor care au limitatorul de viteză defect" }, { letter: "B", text: "să nu permită plecarea în cursă a vehiculelor care au sistem antiblocare la frânare" }, { letter: "C", text: "să nu permită plecarea în cursă a vehiculului fără documentul privind întreţinerea vehiculelor" }, { letter: "D", text: "să nu utilizeze la efectuarea transporturilor contra cost vehicule înmatriculate pe o perioadă nedeterminată" }], correct: 0 },
            { id: "4_119", ch: 4, ch_name: "Reglementari Transport Marfa", q_num: 119, text: "Operatorul de transport, respectiv întreprinderea, are următoarea obligaţie:", options: [{ letter: "A", text: "să planifice transporturile astfel încât conducătorul auto să poată respecta prevederile legale privind timpul de odihnă" }, { letter: "B", text: "să planifice transporturile astfel încât conducătorul auto să poată respecta prevederile legale privind utilizarea alternativă a celor două cartele tahografice pe care le deţine" }, { letter: "C", text: "să plătească conducătorul auto funcţie de distanţa parcursă şi/sau de cantitatea de mărfuri transportată în fiecare lună" }, { letter: "D", text: "să utilizeze numai conducători auto angajaţi cu contract de muncă care au cel puţin două cartele tahografice valide" }], correct: 0 },
            { id: "4_120", ch: 4, ch_name: "Reglementari Transport Marfa", q_num: 120, text: "Operatorul de transport, respectiv întreprinderea, are următoarea obligaţie:", options: [{ letter: "A", text: "să asigure instruirea conducătorilor auto privind modalitatea de evitare a controalelor în trafic" }, { letter: "B", text: "să asigure instruirea conducătorilor auto privind modalitatea de plată în funcţie de distanţa parcursă şi sau/cantitatea de mărfuri transportată" }, { letter: "C", text: "să asigure instruirea conducătorilor auto privind obligaţiile ce revin acestora" }, { letter: "D", text: "să asigure instruirea conducătorilor auto privind utilizarea dispozitivelor ilegale de manipulare a tahografului" }], correct: 2 },
            { id: "4_121", ch: 4, ch_name: "Reglementari Transport Marfa", q_num: 121, text: "Utilizarea la efectuarea transportului rutier a unui autovehicul fără a deține copie conformă a licenței comunitare pentru acesta, se sanctioneaza cu:", options: [{ letter: "A", text: "suspendarea dreptului de utilizare a autovehiculului" }, { letter: "B", text: "suspendarea dreptului de conducere pe drumurile publice" }, { letter: "C", text: "retragerea certificatului de pregatire profesionala al conducatorului auto" }, { letter: "D", text: "anularea certificatului de competenta profesionala al managerului de transport" }], correct: 0 },
            { id: "4_122", ch: 4, ch_name: "Reglementari Transport Marfa", q_num: 122, text: "Instrainarea copiilor conforme ale licentei comunitare catre o alta persoana fizica sau juridica se sanctioneaza cu:", options: [{ letter: "A", text: "confiscarea autovehiculelor pentru care au fost emise copiile conforme" }, { letter: "B", text: "radierea intreprinderii din Registrul Comertului" }, { letter: "C", text: "radierea din circulatie a autovehiculelor pentru care au fost emise copiile conforme" }, { letter: "D", text: "retragerea licentei comunitare" }], correct: 3 },
            { id: "4_123", ch: 4, ch_name: "Reglementari Transport Marfa", q_num: 123, text: "Operatorul de transport, respectiv întreprinderea trebuie să dețină la sediu:", options: [{ letter: "A", text: "documentele doveditoare din care să rezulte angajarea în condiții legale a persoanelor cu funcții care concură la siguranța circulației" }, { letter: "B", text: "diagramele tahograf pentru anul precedent și anul în curs" }, { letter: "C", text: "carnetele Interbus utilizate pentru o perioadă de 3 ani" }, { letter: "D", text: "cărțile de muncă ale conducătorilor auto" }], correct: 0 },
            { id: "4_124", ch: 4, ch_name: "Reglementari Transport Marfa", q_num: 124, text: "Daca notam cu G greutatea incarcaturii, atunci cand marfa tinde sa se deplaseze spre cabina, sistemul de fixare al incarcaturii trebuie sa reziste la o forta de:", options: [{ letter: "A", text: "0,5 x G" }, { letter: "B", text: "0,6 x G" }, { letter: "C", text: "0,7 x G" }, { letter: "D", text: "0,8 x G" }], correct: 3 },
            { id: "4_125", ch: 4, ch_name: "Reglementari Transport Marfa", q_num: 125, text: "Daca notam cu G greutatea incarcaturii, atunci cand marfa tinde sa se deplaseze inspre partea din spate a vehiculului, sistemul de fixare al incarcaturii trebuie sa reziste la o forta de:", options: [{ letter: "A", text: "minim 0,5 x G" }, { letter: "B", text: "minim 0,6 x G" }, { letter: "C", text: "minim 0,7 x G" }, { letter: "D", text: "minim 0,8 x G" }], correct: 0 },
            { id: "4_126", ch: 4, ch_name: "Reglementari Transport Marfa", q_num: 126, text: "Daca notam cu G greutatea incarcaturii, atunci cand marfa tinde sa se deplaseze inspre peretii laterali ai vehiculului, sistemul de fixare al incarcaturii trebuie sa reziste la o forta de:", options: [{ letter: "A", text: "minim 0,5 x G" }, { letter: "B", text: "minim 0,6 x G" }, { letter: "C", text: "minim 0,7 x G" }, { letter: "D", text: "minim 0,8 x G" }], correct: 0 },
            { id: "4_127", ch: 4, ch_name: "Reglementari Transport Marfa", q_num: 127, text: "Operatorul de transport/întreprinderea are obligaţia să se asigure că încărcătura înfăşurată sau fixată în vehicul este în conformitate cu dispoziţiile din:", options: [{ letter: "A", text: "instrucţiunile privind sistemele de fixare a încărcăturii în transportul rutier de mărfuri elaborate de I.S.C.T.R." }, { letter: "B", text: "recomandările europene privind cele mai bune practici în domeniul fixării încărcăturii pentru transportul rutier" }, { letter: "C", text: "Regulamentul (CE) nr. 1072/2009 privind normele comune privind accesul la piaţa transportului rutier de mărfuri" }, { letter: "D", text: "Regulamentul Tehnic în Transportul Rutier R.N.T.R. 22 – privind sistemele de fixare a încărcăturii vehiculelor elaborat de R.A.R." }], correct: 1 },
            { id: "4_128", ch: 4, ch_name: "Reglementari Transport Marfa", q_num: 128, text: "Operatorul de transport, respectiv întreprinderea, trebuie să dețină la sediu:", options: [{ letter: "A", text: "autorizațiile speciale de transport eliberate de C.N.A.D.N.R. în cazul transportului de mărfuri și deșeuri periculoase, pentru anul în curs și anul precedent" }, { letter: "B", text: "tichetele de cântar prevăzute la transportul mărfurilor indivizibile și deșeurilor periculoase, pentru anul în curs și anul precedent" }, { letter: "C", text: "formularul de expediție/transport, în cazul transportului de deșeuri, pentru anul în curs și anul precedent" }, { letter: "D", text: "fișele de siguranță, în cazul transportului de mărfuri și deșeuri periculoase, pentru anul în curs și anul precedent" }], correct: 2 },
            { id: "4_129", ch: 4, ch_name: "Reglementari Transport Marfa", q_num: 129, text: "Operatorul de transport/întreprinderea are obligaţia să se asigure că elementele de fixare a mărfii respectă următoarea condiţie:", options: [{ letter: "A", text: "sunt adaptate pentru masa proprie a vehiculului respectiv" }, { letter: "B", text: "sunt adaptate pentru fixarea mărfii respective" }, { letter: "C", text: "sunt adaptate pentru fixarea suprastructurii vehiculului de şasiu" }, { letter: "D", text: "sunt adaptate pentru viteza comercială de circulaţie a vehiculului respectiv" }], correct: 1 },
            { id: "4_130", ch: 4, ch_name: "Reglementari Transport Marfa", q_num: 130, text: "Operatorul de transport/întreprinderea are obligaţia să se asigure că elementele de fixare a mărfii respectă următoarea condiţie:", options: [{ letter: "A", text: "forţa exercitată asupra lor este mai mare decât sarcina nominală pentru care au fost construite" }, { letter: "B", text: "nu prezintă noduri sau elemente deteriorate" }, { letter: "C", text: "sunt adaptate pentru fixarea şasiului" }, { letter: "D", text: "sunt realizate din componente galvanizate pentru o bună rezistenţă la frecare" }], correct: 1 },
            { id: "4_131", ch: 4, ch_name: "Reglementari Transport Marfa", q_num: 131, text: "Operatorul de transport/întreprinderea are obligaţia să se asigure că elementele de fixare a mărfii respectă următoarea condiţie:", options: [{ letter: "A", text: "sunt conforme cu prescripţiile tehnice elaborate de I.S.C.T.R." }, { letter: "B", text: "sunt conforme cu specificaţiile tehnice privind construcţia vehiculelor rutiere de marfă" }, { letter: "C", text: "sunt conforme cu standardele europene şi/sau internaţionale în vigoare în domeniu" }, { letter: "D", text: "sunt conforme cu standardele şi normativele în vigoare elaborate de A.R.R." }], correct: 2 },
            { id: "4_132", ch: 4, ch_name: "Reglementari Transport Marfa", q_num: 132, text: "În vederea efectuării transportului rutier de mărfuri periculoase, operatorul de transport rutier va depune sau va transmite prin poștă la A.R.R.:", options: [{ letter: "A", text: "certificatul de atestare profesională al conducătorului auto, specific mărfurilor periculoase care vor fi transportate" }, { letter: "B", text: "documentul de control al mărfurilor periculoase prevăzut în reglementările Uniunii Europene referitoare la transportul rutier al mărfurilor periculoase" }, { letter: "C", text: "instrucțiunile de siguranță pentru mărfurile periculoase transportate" }, { letter: "D", text: "certificatul de omologare individuală al vehiculelor pentru care este necesar a se elibera respectivul certificat" }], correct: 0 },
            { id: "4_133", ch: 4, ch_name: "Reglementari Transport Marfa", q_num: 133, text: "În cazul schimbării sediului, operatorul/întreprinderea de transport rutier are următoarea obligaţie:", options: [{ letter: "A", text: "să depună licenţa de transport şi copiile conforme în termen de 30 de zile la A.R.R." }, { letter: "B", text: "să notifice schimbarea către A.R.R. în termen de cel mult 15 zile de la producerea ei" }, { letter: "C", text: "să notifice schimbarea către A.R.R. în termen de cel mult 30 zile de la producerea ei" }, { letter: "D", text: "să publice schimbarea în cel mult 15 zile în Monitorul Oficial sau într-un ziar naţional" }], correct: 1 },
            { id: "4_134", ch: 4, ch_name: "Reglementari Transport Marfa", q_num: 134, text: "Pierderea, sustragerea sau deteriorarea licenţei comunitare se anunţă la A.R.R. în termen de:", options: [{ letter: "A", text: "maxim 15 zile de la data constatării" }, { letter: "B", text: "maxim 21 zile de la data constatării" }, { letter: "C", text: "maxim 30 zile de la data constatării" }, { letter: "D", text: "maxim 7 zile de la data constatării" }], correct: 0 },
            { id: "4_135", ch: 4, ch_name: "Reglementari Transport Marfa", q_num: 135, text: "Pierderea, sustragerea sau deteriorarea licenţei comunitare se anunţă la A.R.R. și se publică în:", options: [{ letter: "A", text: "în Jurnalul Oficial al Uniunii Europene" }, { letter: "B", text: "în Monitorul Oficial al României" }, { letter: "C", text: "În Registrul Naţional al Operatorilor de Transport" }, { letter: "D", text: "într-un ziar cu acoperire naţională" }], correct: 1 },
            { id: "4_136", ch: 4, ch_name: "Reglementari Transport Marfa", q_num: 136, text: "Pierderea, sustragerea sau deteriorarea copiei conforme a licenţei comunitare se anunţă la A.R.R. în termen de:", options: [{ letter: "A", text: "maxim 15 zile de la data constatării" }, { letter: "B", text: "maxim 21 zile de la data constatării" }, { letter: "C", text: "maxim 30 zile de la data constatării" }, { letter: "D", text: "maxim 7 zile de la data constatării" }], correct: 0 },
            { id: "4_137", ch: 4, ch_name: "Reglementari Transport Marfa", q_num: 137, text: "Pierderea, sustragerea sau deteriorarea copiei conforme a licenţei comunitare se publică în:", options: [{ letter: "A", text: "în Jurnalul Oficial al Uniunii Europene" }, { letter: "B", text: "în Monitorul Oficial al României" }, { letter: "C", text: "În Registrul Naţional al Operatorilor de Transport" }, { letter: "D", text: "într-un ziar cu acoperire naţională" }], correct: 1 },
            { id: "4_138", ch: 4, ch_name: "Reglementari Transport Marfa", q_num: 138, text: "Un operator de transport poate utiliza copia conformă a licenţei comunitare a altui operator de transport:", options: [{ letter: "A", text: "da, cu notificare prealabilă către A.R.R." }, { letter: "B", text: "da, dar nu mai mult de 15 zile" }, { letter: "C", text: "nu" }, { letter: "D", text: "nu, cu excepţia vânzării vehiculului rutier către celălalt operator de transport" }], correct: 2 },
            { id: "4_139", ch: 4, ch_name: "Reglementari Transport Marfa", q_num: 139, text: "În conformitate cu prevederile Regulamentului (CE) nr. 1072/2009, prin operaţiuni de cabotaj se înţelege:", options: [{ letter: "A", text: "transportul national în cont propriu în statul de stabilire" }, { letter: "B", text: "transportul international contra cost în numele unui tert între doua puncte de încarcare/descarcare situate în state diferite" }, { letter: "C", text: "transportul international între doua puncte de încarcare/descarcare situate în interiorul Uniunii Europene" }, { letter: "D", text: "transportul national contra cost în numele unui tert efectuat temporar într-un stat membru gazda" }], correct: 3 },
            { id: "4_140", ch: 4, ch_name: "Reglementari Transport Marfa", q_num: 140, text: "În cazul aplicării măsurii de suspendare licenței comunitare, operatorul de transport va depune acest document la:", options: [{ letter: "A", text: "inspectoratul teritorial al I.S.C.T.R. în raza căruia s-a făcut controlul în termen de maximum 5 zile de la comunicarea măsurii" }, { letter: "B", text: "agenția teritorială a A.R.R. din județul în care se află sediul operatorului de transport în termen de maximum 5 zile de la comunicarea măsurii" }, { letter: "C", text: "inspectoratul teritorial al I.S.C.T.R. în raza căruia s-a făcut controlul în termen de maximum 15 zile de la comunicarea măsurii" }, { letter: "D", text: "agenția teritorială a A.R.R. din județul în care se află sediul operatorului de transport în termen de maximum 15 zile de la comunicarea măsurii" }], correct: 0 },
            { id: "4_141", ch: 4, ch_name: "Reglementari Transport Marfa", q_num: 141, text: "Pierderea, sustragerea sau deteriorarea certificatului de transport în cont propriu şi/sau a copiei conforme a acestuia se anunţă la A.R.R. în termen de:", options: [{ letter: "A", text: "maxim 15 zile de la data constatării" }, { letter: "B", text: "maxim 21 zile de la data constatării" }, { letter: "C", text: "maxim 30 zile de la data constatării" }, { letter: "D", text: "maxim 7 zile de la data constatării" }], correct: 0 },
            { id: "4_142", ch: 4, ch_name: "Reglementari Transport Marfa", q_num: 142, text: "Pierderea, sustragerea sau deteriorarea certificatului de transport în cont propriu şi/sau a copiei conforme a acestuia se publică în:", options: [{ letter: "A", text: "în Jurnalul Oficial al Uniunii Europene" }, { letter: "B", text: "în Monitorul Oficial al României" }, { letter: "C", text: "În Registrul Naţional al Operatorilor de Transport" }, { letter: "D", text: "într-un ziar cu acoperire naţională" }], correct: 1 },
            { id: "4_143", ch: 4, ch_name: "Reglementari Transport Marfa", q_num: 143, text: "Până când este valabil carnetul TIR:", options: [{ letter: "A", text: "până în ultima zi de valabilitate stabilită de Ministerul Transporturilor" }, { letter: "B", text: "până în ultima zi de valabilitate stabilită de asociația garantă" }, { letter: "C", text: "până la terminarea operațiunii TIR la biroul de destinație" }, { letter: "D", text: "până în ultima zi de valabilitate stabilită de societatea de asigurări care a eliberat carnetul" }], correct: 1 },  // === CAPITOLUL 5: REGLEMENTARI TEHNICE (44 întrebări) ===
            { id: "5_1", ch: 5, ch_name: "Reglementari tehnice", q_num: 1, text: "Omologarea individuala a unui vehicul rutier trebuie efectuata in urmatoarea situatie:", options: [{ letter: "A", text: "pierderea, furtul sau distrugerea certificatului de înmatriculare si a talonului care atesta efectuarea inspectiei tehnice periodice" }, { letter: "B", text: "pierderea, furtul, deteriorarea sau distrugerea cartii de identitate a vehiculului" }, { letter: "C", text: "schimbarea detinatorului daca vehiculul a fost înmatriculat anterior în tara" }, { letter: "D", text: "vehiculul rutier a suferit modificari prin care au fost afectate caracteristicile mentionate în cartea de identitate a vehiculului" }], correct: 3 },
            { id: "5_2", ch: 5, ch_name: "Reglementari tehnice", q_num: 2, text: "Mentinerea în circulatie a vehiculelor rutiere este conditionata de:", options: [{ letter: "A", text: "efectuarea inspectiei tehnice periodice" }, { letter: "B", text: "efectuarea înmatricularii" }, { letter: "C", text: "efectuarea omologarii pentru circulatia pe drumurile publice" }, { letter: "D", text: "eliberarea cartii de identitate a vehiculului" }], correct: 0 },
            { id: "5_3", ch: 5, ch_name: "Reglementari tehnice", q_num: 3, text: "Ce se întelege prin inspectie tehnica periodica:", options: [{ letter: "A", text: "verificarea tehnica a vehiculelor rutiere înmatriculate, efectuate de conducatorul auto înainte de plecarea în fiecare cursa" }, { letter: "B", text: "verificarea tehnica a vehiculelor rutiere înmatriculate, efectuate de organele de control în trafic" }, { letter: "C", text: "verificarea tehnica a vehiculelor rutiere înmatriculate, efectuate la termene stabilite" }, { letter: "D", text: "verificarea tehnica efectuata de patronul sau administratorul societatii" }], correct: 2 },
            { id: "5_4", ch: 5, ch_name: "Reglementari tehnice", q_num: 4, text: "La inspectia tehnica periodica a autovehiculelor echipate cu motoare diesel se verifica:", options: [{ letter: "A", text: "cantitatea de motorina debitata de pompa de injectie" }, { letter: "B", text: "consumul de combustibil în sarcina si în gol" }, { letter: "C", text: "gradul de uniformitate al pulverizarii realizate de injectoare" }, { letter: "D", text: "nivelul opacitatii gazelor de evacuare" }], correct: 3 },
            { id: "5_5", ch: 5, ch_name: "Reglementari tehnice", q_num: 5, text: "Inspectiile tehnice periodice se efectueaza:", options: [{ letter: "A", text: "în cadrul statiilor autorizate de RAR" }, { letter: "B", text: "în orice statie service pentru reparatii" }, { letter: "C", text: "în orice statie tehnica autorizata de ARR" }, { letter: "D", text: "în orice statie tehnica autorizata de constructorul vehiculului" }], correct: 0 },
            { id: "5_6", ch: 5, ch_name: "Reglementari tehnice", q_num: 6, text: "Inspectia tehnica periodica la vehiculele agreate de RAR pentru transportul marfurilor periculoase se efectueaza la:", options: [{ letter: "A", text: "agentii economici care detin statiile de inspectie tehnica periodica autorizate de catre R.A.R." }, { letter: "B", text: "agentii economici autorizati de catre ISCTR" }, { letter: "C", text: "Registrul Auto Roman" }, { letter: "D", text: "agentii economici autorizati pentru repararea vehiculelor care transporta marfuri periculoase" }], correct: 2 },
            { id: "5_7", ch: 5, ch_name: "Reglementari tehnice", q_num: 7, text: "Inspectia tehnica periodica la vehiculele echipate cu suprastructuri destinate exclusiv pentru transportul de butelii de gaze se efectueaza de catre:", options: [{ letter: "A", text: "agentii economici care detin statiile de inspectie tehnica periodica autorizate de catre R.A.R." }, { letter: "B", text: "agentii economici autorizati de catre ISCTR" }, { letter: "C", text: "Registrul Auto Roman" }, { letter: "D", text: "agentii economici autorizati pentru repararea vehiculelor care transporta marfuri periculoase" }], correct: 2 },
            { id: "5_8", ch: 5, ch_name: "Reglementari tehnice", q_num: 8, text: "Inspectia tehnica periodica la remorci si semiremorci având o masa totala maxima autorizata mai mare de 3.500 kg se efectueaza la intervale de:", options: [{ letter: "A", text: "12 luni" }, { letter: "B", text: "18 luni" }, { letter: "C", text: "24 luni" }, { letter: "D", text: "6 luni" }], correct: 0 },
            { id: "5_9", ch: 5, ch_name: "Reglementari tehnice", q_num: 9, text: "Certificarea încadrarii vehiculelor rutiere în normele tehnice privind siguranta circulatiei rutiere, protectia mediului si în categoria de folosinta conform destinatiei se face în conformitate cu urmatoarea reglementare:", options: [{ letter: "A", text: "RNTR 1" }, { letter: "B", text: "RNTR 4" }, { letter: "C", text: "RNTR 5" }, { letter: "D", text: "RNTR 8" }], correct: 0 },
            { id: "5_10", ch: 5, ch_name: "Reglementari tehnice", q_num: 10, text: "Cerinţele privind caracteristicele tehnice constructive speciale pentru agrearea şi inspecţia tehnică periodică a vehiculelor din categoriile N şi O destinate transportului anumitor mărfuri periculoase sunt stabilte prin:", options: [{ letter: "A", text: "RNTR - 1" }, { letter: "B", text: "RNTR - 2" }, { letter: "C", text: "RNTR - 3" }, { letter: "D", text: "OMT 1892/2006" }], correct: 2 },

        // Funcționalitatea completă a aplicației (moduri Citire, Examen, Flashcard, progres)
