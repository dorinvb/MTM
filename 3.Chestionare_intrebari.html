        let currentChapter = 1;
        let currentQuestions = [];
        let currentIndex = 0;
        let examScore = 0;
        let examAnswered = false;
        let flashKnown = new Set();
        let flashQueue = [];
        let flashIdx = 0;
        let flashFlipped = false;

        function getChapterQuestions(ch) { return ALL_QUESTIONS.filter(q => q.ch === ch); }

        function getChapterCounts() {
            const counts = {};
            for (let ch = 1; ch <= 5; ch++) counts[ch] = getChapterQuestions(ch).length;
            return counts;
        }

        function renderHome() {
            const grid = document.getElementById('chaptersGrid');
            grid.innerHTML = '';
            const counts = getChapterCounts();
            for (let ch = 1; ch <= 5; ch++) {
                const qs = getChapterQuestions(ch);
                if (qs.length === 0 && ch === 1) continue;
                const name = ch === 1 ? "Reglementări sociale" : ch === 2 ? "Acorduri Transport Marfă" : ch === 3 ? "Contracte, Contabilitate si Marketing" : ch === 4 ? "Reglementări Transport Marfă" : "Reglementări tehnice";
                const icon = ch === 1 ? "⏱️" : ch === 2 ? "📜" : ch === 3 ? "📊" : ch === 4 ? "🚛" : "🔧";
                const prog = JSON.parse(localStorage.getItem('mt_progress') || '{}');
                const lastExam = prog[ch]?.lastExam || null;
                const pct = lastExam ? Math.round((lastExam / qs.length) * 100) : 0;
                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `
      <div class="card-icon">${icon}</div>
      <div class="card-title">${ch}. ${name}</div>
      <div class="card-meta"><span class="badge">${qs.length} întrebări</span>${lastExam !== null ? `<span class="badge">Ultimul examen: ${pct}%</span>` : ''}</div>
      <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
      <div class="btn-group">
        <button class="btn" data-ch="${ch}" data-mode="read">📖 Citire</button>
        <button class="btn btn-primary" data-ch="${ch}" data-mode="exam">✏️ Examen</button>
        <button class="btn" data-ch="${ch}" data-mode="flash">🃏 Flashcard</button>
      </div>
    `;
                grid.appendChild(card);
            }
            document.querySelectorAll('[data-mode]').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    const ch = parseInt(btn.dataset.ch);
                    const mode = btn.dataset.mode;
                    if (mode === 'read') startRead(ch);
                    else if (mode === 'exam') startExam(ch);
                    else if (mode === 'flash') startFlash(ch);
                });
            });
        }

        function startRead(ch) {
            currentChapter = ch;
            currentQuestions = getChapterQuestions(ch);
            currentIndex = 0;
            document.getElementById('readChapTitle').innerText = currentQuestions[0]?.ch_name || '';
            renderRead();
            document.getElementById('homePage').classList.add('hidden');
            document.getElementById('readMode').classList.remove('hidden');
            document.getElementById('examMode').classList.add('hidden');
            document.getElementById('flashMode').classList.add('hidden');
        }

        function renderRead() {
            const q = currentQuestions[currentIndex];
            document.getElementById('readQNum').innerHTML = `Întrebarea ${q.q_num} / ${currentQuestions.length}`;
            document.getElementById('readQuestion').innerHTML = q.text;
            document.getElementById('readCounter').innerHTML = `${currentIndex + 1} / ${currentQuestions.length}`;
            const pct = ((currentIndex + 1) / currentQuestions.length) * 100;
            document.getElementById('readProgressFill').style.width = pct + '%';
            document.getElementById('readAnswerBox').classList.add('hidden');
        }

        function revealAnswer() {
            const q = currentQuestions[currentIndex];
            const correctText = q.options[q.correct].text;
            const correctLetter = q.options[q.correct].letter;
            document.getElementById('readAnswerBox').innerHTML = `✓ Răspuns corect (${correctLetter}): ${correctText}`;
            document.getElementById('readAnswerBox').classList.remove('hidden');
        }

        function nextRead() { if (currentIndex < currentQuestions.length - 1) { currentIndex++; renderRead(); } else alert('Ați parcurs toate întrebările din acest capitol!'); }
        function prevRead() { if (currentIndex > 0) { currentIndex--; renderRead(); } }

        function startExam(ch) {
            currentChapter = ch;
            currentQuestions = [...getChapterQuestions(ch)];
            currentQuestions.sort(() => Math.random() - 0.5);
            currentIndex = 0;
            examScore = 0;
            examAnswered = false;
            document.getElementById('examChapTitle').innerText = currentQuestions[0]?.ch_name || '';
            renderExam();
            document.getElementById('homePage').classList.add('hidden');
            document.getElementById('examMode').classList.remove('hidden');
            document.getElementById('readMode').classList.add('hidden');
            document.getElementById('flashMode').classList.add('hidden');
            document.getElementById('examScoreCard').classList.add('hidden');
            document.getElementById('examNextBtn').style.display = 'none';
        }

        function renderExam() {
            if (currentIndex >= currentQuestions.length) { showExamScore(); return; }
            const q = currentQuestions[currentIndex];
            document.getElementById('examQNum').innerHTML = `Întrebarea ${currentIndex + 1} / ${currentQuestions.length}`;
            document.getElementById('examQuestion').innerHTML = q.text;
            document.getElementById('examCounter').innerHTML = `${currentIndex + 1} / ${currentQuestions.length}`;
            const pct = (currentIndex / currentQuestions.length) * 100;
            document.getElementById('examProgressFill').style.width = pct + '%';
            const optsDiv = document.getElementById('examOptions');
            optsDiv.innerHTML = '';
            q.options.forEach((opt, idx) => {
                const optDiv = document.createElement('div');
                optDiv.className = 'option';
                optDiv.innerHTML = `<div class="opt-letter">${opt.letter}</div><div>${opt.text}</div>`;
                optDiv.onclick = () => handleExamAnswer(idx);
                optsDiv.appendChild(optDiv);
            });
            document.getElementById('examFeedback').classList.add('hidden');
            examAnswered = false;
        }

        function handleExamAnswer(selectedIdx) {
            if (examAnswered) return;
            const q = currentQuestions[currentIndex];
            const isCorrect = (selectedIdx === q.correct);
            if (isCorrect) examScore++;
            examAnswered = true;
            const fb = document.getElementById('examFeedback');
            fb.classList.remove('hidden');
            if (isCorrect) {
                fb.className = 'feedback correct';
                fb.innerHTML = '✓ Corect!';
            } else {
                fb.className = 'feedback wrong';
                fb.innerHTML = `✗ Greșit. Răspunsul corect (${q.options[q.correct].letter}): ${q.options[q.correct].text}`;
            }
            const opts = document.querySelectorAll('#examOptions .option');
            opts.forEach((opt, i) => {
                opt.style.pointerEvents = 'none';
                if (i === q.correct) opt.classList.add('correct-highlight');
                if (i === selectedIdx && !isCorrect) opt.classList.add('wrong-highlight');
            });
            document.getElementById('examNextBtn').style.display = 'inline-flex';
        }

        function examNext() {
            if (currentIndex < currentQuestions.length - 1) {
                currentIndex++;
                renderExam();
                document.getElementById('examNextBtn').style.display = 'none';
            } else {
                showExamScore();
            }
        }

        function showExamScore() {
            const total = currentQuestions.length;
            const percent = Math.round((examScore / total) * 100);
            document.getElementById('examScoreCard').innerHTML = `
    <h2>Scor final: ${examScore} / ${total}</h2>
    <div class="progress-bar"><div class="progress-fill" style="width:${percent}%"></div></div>
    <p style="margin-top:10px;">${percent}% răspunsuri corecte</p>
    <button id="restartExamBtn" class="btn btn-primary" style="margin-top:15px;">↺ Reîncearcă examenul</button>
    <button id="backHomeBtn" class="btn" style="margin-top:10px;">⌂ Acasă</button>
  `;
            document.getElementById('examScoreCard').classList.remove('hidden');
            document.getElementById('examNextBtn').style.display = 'none';
            document.getElementById('restartExamBtn')?.addEventListener('click', () => startExam(currentChapter));
            document.getElementById('backHomeBtn')?.addEventListener('click', () => {
                document.getElementById('homePage').classList.remove('hidden');
                document.getElementById('examMode').classList.add('hidden');
                renderHome();
            });
            const prog = JSON.parse(localStorage.getItem('mt_progress') || '{}');
            prog[currentChapter] = { ...prog[currentChapter], lastExam: examScore };
            localStorage.setItem('mt_progress', JSON.stringify(prog));
        }

        function startFlash(ch) {
            currentChapter = ch;
            const allQs = getChapterQuestions(ch);
            const prog = JSON.parse(localStorage.getItem('mt_progress') || '{}');
            const knownIds = new Set(prog[ch]?.flashKnown || []);
            const unknown = allQs.filter(q => !knownIds.has(q.id));
            const known = allQs.filter(q => knownIds.has(q.id));
            flashQueue = [...unknown.sort(() => Math.random() - 0.5), ...known.sort(() => Math.random() - 0.5)];
            flashIdx = 0;
            flashKnown = knownIds;
            renderFlash();
            document.getElementById('homePage').classList.add('hidden');
            document.getElementById('flashMode').classList.remove('hidden');
            document.getElementById('readMode').classList.add('hidden');
            document.getElementById('examMode').classList.add('hidden');
        }

        function renderFlash() {
            if (!flashQueue.length) return;
            const q = flashQueue[flashIdx];
            document.getElementById('flashQNum').innerHTML = `Întrebarea ${q.q_num}`;
            document.getElementById('flashQuestion').innerHTML = q.text;
            document.getElementById('flashAnswer').innerHTML = q.options[q.correct].text;
            document.getElementById('flashCounter').innerHTML = `${flashIdx + 1} / ${flashQueue.length}`;
            flashFlipped = false;
            document.getElementById('flashCard').classList.remove('flipped');
            document.getElementById('flashKnowBtns').style.display = 'none';
            const knownCount = flashQueue.filter(qq => flashKnown.has(qq.id)).length;
            document.getElementById('flashStats').innerHTML = `Știute: ${knownCount} | Restante: ${flashQueue.length - knownCount}`;
        }

        function flipFlash() {
            flashFlipped = !flashFlipped;
            document.getElementById('flashCard').classList.toggle('flipped', flashFlipped);
            document.getElementById('flashKnowBtns').style.display = flashFlipped ? 'flex' : 'none';
        }

        function flashKnew(knew) {
            const q = flashQueue[flashIdx];
            if (knew) flashKnown.add(q.id);
            else flashKnown.delete(q.id);
            const prog = JSON.parse(localStorage.getItem('mt_progress') || '{}');
            prog[currentChapter] = { ...prog[currentChapter], flashKnown: Array.from(flashKnown) };
            localStorage.setItem('mt_progress', JSON.stringify(prog));
            if (flashIdx < flashQueue.length - 1) { flashIdx++; renderFlash(); }
            else { alert('🎉 Felicitări! Ai parcurs toate flashcardurile din acest capitol.'); goHome(); }
        }

        function flashNav(d) {
            if (d === -1 && flashIdx > 0) { flashIdx--; renderFlash(); }
            if (d === 1 && flashIdx < flashQueue.length - 1) { flashIdx++; renderFlash(); }
        }

        function goHome() {
            document.getElementById('homePage').classList.remove('hidden');
            document.getElementById('readMode').classList.add('hidden');
            document.getElementById('examMode').classList.add('hidden');
            document.getElementById('flashMode').classList.add('hidden');
            renderHome();
        }

        function resetAllProgress() {
            if (confirm('Sigur doriți să ștergeți tot progresul?')) {
                localStorage.removeItem('mt_progress');
                renderHome();
            }
        }

        document.getElementById('globalHomeBtn').addEventListener('click', goHome);
        document.getElementById('homeLogo').addEventListener('click', goHome);
        document.getElementById('closeRead').addEventListener('click', goHome);
        document.getElementById('closeExam').addEventListener('click', goHome);
        document.getElementById('closeFlash').addEventListener('click', goHome);
        document.getElementById('revealAnswerBtn').addEventListener('click', revealAnswer);
        document.getElementById('readPrev').addEventListener('click', prevRead);
        document.getElementById('readNext').addEventListener('click', nextRead);
        document.getElementById('examNextBtn').addEventListener('click', examNext);
        document.getElementById('flashPrev').addEventListener('click', () => flashNav(-1));
        document.getElementById('flashNext').addEventListener('click', () => flashNav(1));
        document.getElementById('flashCard').addEventListener('click', flipFlash);
        document.getElementById('flashKnew').addEventListener('click', () => flashKnew(true));
        document.getElementById('flashNotKnew').addEventListener('click', () => flashKnew(false));
        document.getElementById('resetAllBtn').addEventListener('click', resetAllProgress);

        renderHome();
    </script>
</body>

</html>
