<!DOCTYPE html>
<html lang="ro">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Manager Transporturi Marfă — Studii de Caz</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500;600&display=swap"
    rel="stylesheet">
  <style>
    :root {
      --bg: #0d1117;
      --surface: #161b22;
      --surface2: #1c2433;
      --border: #30363d;
      --accent: #e8a838;
      --accent2: #4fa3e0;
      --green: #3fb950;
      --red: #f85149;
      --text: #e6edf3;
      --text2: #8b949e;
      --text3: #6e7681;
      --radius: 12px;
    }

    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── HEADER ── */
    .header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 58px;
      position: sticky;
      top: 0;
      z-index: 100;
      gap: 16px;
    }

    .logo {
      font-family: 'Libre Baskerville', serif;
      font-size: 1rem;
      color: var(--accent);
      white-space: nowrap;
      letter-spacing: 0.02em;
    }

    .logo span {
      color: var(--accent2);
    }

    .header-tabs {
      display: flex;
      gap: 4px;
    }

    .tab-btn {
      padding: 6px 14px;
      border-radius: 8px;
      border: 1px solid transparent;
      background: transparent;
      color: var(--text2);
      cursor: pointer;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.82rem;
      font-weight: 500;
      transition: all .15s;
    }

    .tab-btn:hover {
      background: var(--surface2);
      color: var(--text);
    }

    .tab-btn.active {
      background: var(--accent);
      color: #111;
      border-color: var(--accent);
    }

    /* ── SCOREBOARD STRIP ── */
    .scoreboard {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 8px 24px;
      display: flex;
      gap: 20px;
      align-items: center;
      flex-wrap: wrap;
    }

    .score-pill {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 0.8rem;
      color: var(--text2);
    }

    .score-num {
      font-weight: 700;
      font-size: 0.95rem;
    }

    .score-num.green {
      color: var(--green);
    }

    .score-num.red {
      color: var(--red);
    }

    .score-num.blue {
      color: var(--accent2);
    }

    .score-num.gold {
      color: var(--accent);
    }

    .progress-wrap {
      flex: 1;
      min-width: 120px;
      height: 5px;
      background: var(--border);
      border-radius: 3px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      border-radius: 3px;
      background: linear-gradient(90deg, var(--accent2), var(--accent));
      transition: width .4s ease;
    }

    .pct-label {
      font-size: 0.78rem;
      color: var(--text3);
    }

    /* ── MAIN ── */
    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    /* ── STUDY VIEW ── */
    #view-studiu {
      display: flex;
      flex-direction: column;
      flex: 1;
    }

    .controls-bar {
      padding: 12px 24px;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
      border-bottom: 1px solid var(--border);
    }

    .ctrl-btn {
      padding: 6px 14px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--surface2);
      color: var(--text2);
      cursor: pointer;
      font-size: 0.8rem;
      font-family: 'DM Sans', sans-serif;
      transition: all .15s;
    }

    .ctrl-btn:hover {
      border-color: var(--accent2);
      color: var(--text);
    }

    .ctrl-btn.danger:hover {
      border-color: var(--red);
      color: var(--red);
    }

    .filter-select {
      padding: 6px 10px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--surface2);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.8rem;
      cursor: pointer;
      outline: none;
    }

    .spacer {
      flex: 1;
    }

    .nav-counter-inline {
      font-size: 0.8rem;
      color: var(--text3);
      font-variant-numeric: tabular-nums;
    }

    /* ── CARD AREA ── */
    .card-area {
      flex: 1;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 28px 20px 40px;
    }

    .card-wrap {
      width: 100%;
      max-width: 760px;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 4px 32px rgba(0, 0, 0, .4);
      animation: cardIn .25s ease;
    }

    @keyframes cardIn {
      from {
        opacity: 0;
        transform: translateY(10px);
      }

      to {
        opacity: 1;
        transform: none;
      }
    }

    .card-top {
      padding: 20px 24px 0;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .card-tema {
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: .08em;
      text-transform: uppercase;
      color: var(--accent2);
      background: rgba(79, 163, 224, .1);
      border: 1px solid rgba(79, 163, 224, .2);
      padding: 3px 10px;
      border-radius: 6px;
    }

    .card-nr {
      font-size: 0.75rem;
      color: var(--text3);
    }

    .card-mark {
      display: inline-block;
      padding: 2px 9px;
      border-radius: 6px;
      font-size: 0.72rem;
      font-weight: 600;
      margin-left: 8px;
    }

    .card-mark.stiut {
      background: rgba(63, 185, 80, .15);
      color: var(--green);
      border: 1px solid rgba(63, 185, 80, .3);
    }

    .card-mark.nestiut {
      background: rgba(248, 81, 73, .15);
      color: var(--red);
      border: 1px solid rgba(248, 81, 73, .3);
    }

    .card-body {
      padding: 20px 24px;
    }

    .card-question {
      font-family: 'Libre Baskerville', serif;
      font-size: 1.05rem;
      line-height: 1.7;
      color: var(--text);
    }

    /* ── USER ANSWER BOX ── */
    .answer-section {
      padding: 0 24px 20px;
    }

    .answer-label {
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .07em;
      color: var(--text3);
      margin-bottom: 8px;
    }

    .answer-textarea {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px 16px;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.9rem;
      line-height: 1.6;
      resize: vertical;
      min-height: 90px;
      outline: none;
      transition: border-color .2s;
    }

    .answer-textarea:focus {
      border-color: var(--accent2);
    }

    .answer-textarea:disabled {
      opacity: .5;
      cursor: not-allowed;
    }

    .btn-row {
      display: flex;
      gap: 10px;
      margin-top: 10px;
      flex-wrap: wrap;
    }

    .btn-reveal {
      padding: 10px 22px;
      border-radius: 9px;
      border: 1px solid var(--accent);
      background: rgba(232, 168, 56, .1);
      color: var(--accent);
      cursor: pointer;
      font-size: 0.88rem;
      font-family: 'DM Sans', sans-serif;
      font-weight: 600;
      transition: all .15s;
    }

    .btn-reveal:hover {
      background: rgba(232, 168, 56, .2);
    }

    .btn-reveal:disabled {
      opacity: .35;
      cursor: default;
    }

    /* ── CORRECT ANSWER ── */
    .correct-answer {
      margin: 0 24px 20px;
      background: rgba(79, 163, 224, .05);
      border: 1px solid rgba(79, 163, 224, .2);
      border-radius: 10px;
      padding: 16px 18px;
      animation: fadeIn .3s ease;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(6px);
      }

      to {
        opacity: 1;
      }
    }

    .correct-label {
      font-size: 0.72rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .08em;
      color: var(--accent2);
      margin-bottom: 10px;
    }

    .correct-text {
      font-family: 'DM Sans', sans-serif;
      font-size: 0.9rem;
      line-height: 1.75;
      color: var(--text);
      white-space: pre-line;
    }

    /* ── VOTE BUTTONS ── */
    .vote-row {
      padding: 16px 24px;
      border-top: 1px solid var(--border);
      display: flex;
      gap: 10px;
      align-items: center;
    }

    .vote-label {
      font-size: 0.8rem;
      color: var(--text2);
      flex: 1;
    }

    .btn-stiut,
    .btn-nestiut {
      padding: 10px 22px;
      border-radius: 9px;
      border: 1px solid;
      cursor: pointer;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.85rem;
      font-weight: 600;
      transition: all .15s;
    }

    .btn-stiut {
      border-color: rgba(63, 185, 80, .4);
      background: rgba(63, 185, 80, .08);
      color: var(--green);
    }

    .btn-stiut:hover {
      background: rgba(63, 185, 80, .18);
    }

    .btn-nestiut {
      border-color: rgba(248, 81, 73, .4);
      background: rgba(248, 81, 73, .08);
      color: var(--red);
    }

    .btn-nestiut:hover {
      background: rgba(248, 81, 73, .18);
    }

    /* ── NAV ── */
    .nav-bar {
      padding: 16px 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-top: 1px solid var(--border);
      background: var(--surface);
    }

    .nav-btn {
      padding: 9px 20px;
      border-radius: 9px;
      border: 1px solid var(--border);
      background: var(--surface2);
      color: var(--text2);
      cursor: pointer;
      font-size: 0.85rem;
      font-family: 'DM Sans', sans-serif;
      transition: all .15s;
    }

    .nav-btn:hover:not(:disabled) {
      border-color: var(--accent2);
      color: var(--text);
    }

    .nav-btn:disabled {
      opacity: .25;
      cursor: default;
    }

    .nav-pos {
      font-size: 0.82rem;
      color: var(--text3);
      font-variant-numeric: tabular-nums;
    }

    /* ── STATS VIEW ── */
    #view-stats {
      display: none;
      padding: 28px 24px;
      max-width: 780px;
      margin: 0 auto;
      width: 100%;
    }

    #view-stats.active {
      display: block;
    }

    .stats-header {
      font-family: 'Libre Baskerville', serif;
      font-size: 1.5rem;
      color: var(--accent);
      margin-bottom: 24px;
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
      margin-bottom: 28px;
    }

    @media (max-width: 600px) {
      .stats-grid {
        grid-template-columns: repeat(2, 1fr);
      }
    }

    .stat-box {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 18px;
      text-align: center;
    }

    .stat-box .num {
      font-size: 2rem;
      font-weight: 700;
      font-family: 'Libre Baskerville', serif;
    }

    .stat-box .lbl {
      font-size: 0.75rem;
      color: var(--text3);
      margin-top: 4px;
    }

    .stat-box.s-total .num {
      color: var(--accent2);
    }

    .stat-box.s-stiut .num {
      color: var(--green);
    }

    .stat-box.s-nestiut .num {
      color: var(--red);
    }

    .stat-box.s-skip .num {
      color: var(--text3);
    }

    .tema-section {
      margin-top: 8px;
    }

    .tema-row {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 0;
      border-bottom: 1px solid var(--border);
    }

    .tema-name {
      font-size: 0.82rem;
      color: var(--text2);
      width: 260px;
      flex-shrink: 0;
    }

    .tema-bar-bg {
      flex: 1;
      height: 7px;
      background: var(--border);
      border-radius: 4px;
      overflow: hidden;
    }

    .tema-bar-fill {
      height: 100%;
      border-radius: 4px;
      background: var(--green);
      transition: width .5s;
    }

    .tema-nums {
      font-size: 0.75rem;
      color: var(--text3);
      width: 80px;
      text-align: right;
    }

    .reset-btn {
      margin-top: 24px;
      padding: 10px 22px;
      border-radius: 9px;
      border: 1px solid rgba(248, 81, 73, .4);
      background: rgba(248, 81, 73, .08);
      color: var(--red);
      cursor: pointer;
      font-family: 'DM Sans', sans-serif;
      font-weight: 600;
      font-size: 0.85rem;
      transition: all .15s;
    }

    .reset-btn:hover {
      background: rgba(248, 81, 73, .18);
    }

    /* ── HIDE/SHOW ── */
    #view-studiu.hidden {
      display: none;
    }

    /* ── CACHE NOTICE ── */
    .cache-badge {
      font-size: 0.7rem;
      color: var(--text3);
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .cache-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--green);
      display: inline-block;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {

      0%,
      100% {
        opacity: 1
      }

      50% {
        opacity: .3
      }
    }

    /* keyboard hint */
    .kb-hint {
      font-size: 0.7rem;
      color: var(--text3);
      text-align: center;
      padding: 6px 0 0;
      opacity: .6;
    }

    kbd {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 1px 5px;
      font-size: 0.68rem;
      font-family: monospace;
    }
  </style>
</head>

<body>
  <!-- Buton pentru întoarcerea la Index -->
  <div style="position:fixed; top:12px; right:12px; z-index:9999;">
    <a href="index.html"
      style="display:flex; align-items:center; gap:6px; background:#0a2540; color:#fff; text-decoration:none; padding:8px 16px; border-radius:40px; font-size:13px; font-weight:600; font-family:sans-serif; box-shadow:0 2px 8px rgba(0,0,0,0.2); transition:all 0.2s;">
      🏠 Index
    </a>
  </div>
  <div class="header">
    <div class="logo">Manager <span>Transporturi</span> Marfă</div>
    <div class="header-tabs">
      <button class="tab-btn active" onclick="switchView('studiu')">📚 Studiu</button>
      <button class="tab-btn" onclick="switchView('stats')">📊 Statistici</button>
    </div>
    <div class="cache-badge">
      <span class="cache-dot"></span> salvat local
    </div>
  </div>

  <div class="scoreboard" id="scoreboard">
    <div class="score-pill">Total: <span class="score-num blue" id="sc-total">134</span></div>
    <div class="score-pill">✅ <span class="score-num green" id="sc-stiut">0</span></div>
    <div class="score-pill">❌ <span class="score-num red" id="sc-nestiut">0</span></div>
    <div class="score-pill">— <span class="score-num" id="sc-skip" style="color:var(--text3)">0</span></div>
    <div class="progress-wrap">
      <div class="progress-fill" id="progress-fill" style="width:0%"></div>
    </div>
    <div class="pct-label" id="pct-label">0%</div>
  </div>

  <!-- STUDY VIEW -->
  <div class="main" id="view-studiu">
    <div class="controls-bar">
      <select class="filter-select" id="tema-filter" onchange="applyFilter()">
        <option value="toate">Toate capitolele</option>
      </select>
      <button class="ctrl-btn" onclick="shuffleCards()">🔀 Amestecă</button>
      <button class="ctrl-btn" onclick="showOnlyUnseen()">👁 Doar neștiute</button>
      <div class="spacer"></div>
      <span class="nav-counter-inline" id="nav-counter-inline">1 / 134</span>
    </div>

    <div class="card-area">
      <div class="card-wrap">
        <div class="card" id="main-card">
          <div class="card-top">
            <span class="card-tema" id="card-tema"></span>
            <div>
              <span class="card-nr" id="card-nr"></span>
              <span class="card-mark" id="card-mark" style="display:none"></span>
            </div>
          </div>
          <div class="card-body">
            <div class="card-question" id="card-question"></div>
          </div>

          <div class="answer-section">
            <div class="answer-label">Răspunsul tău (opțional)</div>
            <textarea class="answer-textarea" id="user-answer"
              placeholder="Scrie răspunsul tău înainte de a vedea varianta corectă..."></textarea>
            <div class="btn-row">
              <button class="btn-reveal" id="btn-reveal" onclick="reveal()">
                👁 Arată răspunsul corect
              </button>
              <button class="btn-reveal" style="border-color:var(--border);color:var(--text2);background:transparent"
                onclick="skipCard()">
                Sari peste →
              </button>
            </div>
            <div class="kb-hint">
              <kbd>Enter</kbd>+<kbd>Shift</kbd> rând nou &nbsp;·&nbsp; <kbd>Ctrl</kbd>+<kbd>↵</kbd> afișează răspunsul
            </div>
          </div>

          <div id="correct-wrap" style="display:none">
            <div class="correct-answer">
              <div class="correct-label">✔ Răspuns corect</div>
              <div class="correct-text" id="correct-text"></div>
            </div>
            <div class="vote-row">
              <span class="vote-label">Ai știut?</span>
              <button class="btn-stiut" onclick="vote('stiut')">✅ Da, știam!</button>
              <button class="btn-nestiut" onclick="vote('nestiut')">❌ Nu știam</button>
            </div>
          </div>
        </div>

        <div class="nav-bar">
          <button class="nav-btn" id="btn-prev" onclick="navigate(-1)">← Anterior</button>
          <span class="nav-pos" id="nav-pos">1 / 134</span>
          <button class="nav-btn" id="btn-next" onclick="navigate(1)">Următor →</button>
        </div>
      </div>
    </div>
  </div>

  <!-- STATS VIEW -->
  <div id="view-stats">
    <div class="stats-header">📊 Progresul tău</div>
    <div class="stats-grid">
      <div class="stat-box s-total">
        <div class="num" id="st-total">134</div>
        <div class="lbl">Total cazuri</div>
      </div>
      <div class="stat-box s-stiut">
        <div class="num" id="st-stiut">0</div>
        <div class="lbl">Știute ✅</div>
      </div>
      <div class="stat-box s-nestiut">
        <div class="num" id="st-nestiut">0</div>
        <div class="lbl">Neștiute ❌</div>
      </div>
      <div class="stat-box s-skip">
        <div class="num" id="st-skip">0</div>
        <div class="lbl">Sărite / Neatinse</div>
      </div>
    </div>
    <div class="tema-section" id="tema-section"></div>
    <button class="reset-btn" onclick="resetAll()">↺ Resetează tot progresul</button>
  </div>

  <script>
    const STUDII = [{ "nr": 1, "tema": "Elemente de drept civil", "intrebare": "Conform prevederilor Convenției referitoare la contractul de transport internațional de mărfuri pe șosele (CMR), la care România a aderat, care este termenul în care destinatarul mărfii poate consideră marfa pierdută, fără prezentarea unei dovezi în acest sens?", "raspuns": "Destinatarul poate să considere marfa pierdută dacă aceasta nu a fost livrată în termen de 30 de zile de la expirarea termenului de livrare sau, în cazul în care nu a fost stabilit un termen, în 60 de zile de la primirea mărfii de către transportator.\n\nÎntrebarea 2 din 134" }, { "nr": 2, "tema": "Elemente de drept civil", "intrebare": "Conform Convenției CMR, care este termenul maxim în care destinatarul mărfii poate să solicite despăgubiri pentru că marfa primită a fost livrată cu întârziere față de termenul stabilit în scrisoarea de transport tip CMR?", "raspuns": "Destinatarul poate să solicite despăgubiri pentru întârziere la livrare doar dacă a fost adresată o rezervă în scris, în termen de cel mult 21 de zile de la data punerii mărfii la dispoziția destinatarului.\n\nÎntrebarea 3 din 134" }, { "nr": 3, "tema": "Elemente de drept civil", "intrebare": "Conform prevederilor Convenției referitoare la contractul de transport internațional de mărfuri pe șosele (CMR), la care România a aderat, care este termenul maxim în care destinatarul mărfii poate să facă o reclamație că marfa primită, în cazul pierderilor sau avariilor neaparente, nu este în starea descrisă de scrisoarea de transport tip CMR?", "raspuns": "Termenul maxim pentru acest tip de reclamație este de 7 zile de la primirea mărfii, în afară de duminici și sărbători legale. \n\nÎntrebarea 4 din 134" }, { "nr": 4, "tema": "Elemente de drept civil", "intrebare": "Conform prevederilor Convenției referitoare la contractul de transport internațional de mărfuri pe șosele (CMR), la care România a aderat, în care situații transportatorul poate să procedeze la vânzarea mărfii fără să aștepte instrucțiuni de la persoana care are dreptul să dispună asupra ei?", "raspuns": "Transportatorul poate să procedeze la vânzarea mărfii fără să aștepte instrucțiuni de la persoana care are dreptul să dispună asupra mărfii atunci când:\n\n• cheltuielile pentru păstrare sunt disproporționate față de valoarea mărfii;\n\n• natura perisabilă a mărfii sau starea ei o justifică;\n\n• nu a primit din partea persoanei care are dreptul să dispună de marfă instrucțiuni contrare.\n\nÎntrebarea 5 din 134" }, { "nr": 5, "tema": "Elemente de drept civil", "intrebare": "Care pot fi indicațiile pe care un expeditor le poate menționa în scrisoare de transport tip CMR în afară de cele obligatorii ? (Pentru un răspuns corect precizați minim patru astfel de indicații).", "raspuns": "Indicațiile pe care un expeditor le poate menționa în scrisoare CMR, în afară de cele obligatorii, pot fi:\n\ntermenul în care transportul trebuie să fie efectuat;\n\ncheltuielile pe care expeditorul le ia asupra sa;\n\ntotalul sumelor ramburs de perceput la livrarea mărfii;\n\ninterzicerea transbordării;\n\nlista documentelor remise transportatorului.\n\nÎntrebarea 6 din 134" }, { "nr": 6, "tema": "Elemente de drept civil", "intrebare": "Care sunt datele pe care trebuie să le conțină în mod obligatoriu scrisoare de transport tip CMR? (Pentru un răspuns corect precizați minim șase astfel de indicații).", "raspuns": "Datele pe care trebuie să le conțină în mod obligatoriu scrisoare de transport tip CMR sunt:\n\nnumele și adresa expeditorului;\n\nnumele și adresa transportatorului;\n\nlocul și data întocmirii;\n\nlocul și data primirii mărfii și locul prevăzut pentru livrarea acesteia;\n\nnumele și adresa destinatarului;\n\nnumărul coletelor, marcajele speciale și numerele lor;\n\ngreutatea brută a mărfii.\n\nÎntrebarea 7 din 134" }, { "nr": 7, "tema": "Elemente de drept civil", "intrebare": "În ce condiții transportatorul care a plătit despăgubiri, conform prevederilor Convenției CMR, are drept de regres, pentru suma plătită, împreună cu dobânzile și cheltuielile suportate, contra transportatorilor care au participat la executarea contractului de transport​?", "raspuns": "Transportatorul care a plătit despăgubiri, are drept de regres contra transportatorilor care au participat la executarea contractului astfel:\n\ntransportatorul prin fapta căruia s-a produs paguba va suporta singur despăgubirea;\n\ndacă paguba s-a produs prin fapta a doi sau mai mulți transportatori, fiecare dintre ei va plati o sumă proporțională cu partea sa de răspundere;\n\ndacă mai mulți transportatori sunt implicați, dar nu se poate stabili exact cât revine fiecăruia, răspunderea se împarte proporțional cu partea de remunerație;\n\ndacă nu se poate identifica deloc care transportator a cauzat paguba, despăgubirea se repartizează între toți transportatorii, proporțional cu partea de remunerație.\n\nÎntrebarea 8 din 134" }, { "nr": 8, "tema": "Elemente de drept civil", "intrebare": "Care sunt datele pe care poate să le conțină scrisoare de transport tip CMR, în afară de cele obligatorii? (Pentru un răspuns corect precizați minim patru astfel de indicații).", "raspuns": "Datele pe care poate să le conțină scrisoare CMR, în afară de cele obligatorii, pot fi:\n\ninterzicerea transbordării;\n\ncheltuielile pe care expeditorul le ia asupra sa;\n\ntotalul sumelor ramburs de perceput la eliberarea mărfii;\n\nvaloarea declarată a mărfii și suma care reprezintă interesul special la eliberare;\n\ninstrucțiunile expeditorului către transportator cu privire la asigurarea mărfii;\n\ntermenul convenit în care transportul trebuie să fie efectuat;\n\nlista documentelor remise transportatorului.\n\nÎntrebarea 9 din 134" }, { "nr": 9, "tema": "Elemente de drept civil", "intrebare": "În conformitate cu prevederile Convenției CMR, expeditorul are dreptul de dispoziție asupra mărfii, în special să ceară transportatorului oprirea transportului, schimbarea locului prevăzut pentru eliberare sau să elibereze marfa unui alt destinatar decât cel indicat în scrisoarea CMR. Care sunt condițiile la care este supus exercițiul dreptului de dispoziție? (Precizați minim două condiții, pentru un răspuns corect).", "raspuns": "Exercițiul dreptului de dispoziție este supus următoarelor condiții:\n\nexpeditorul trebuie să prezinte transportatorului primul exemplar al scrisorii CMR cu noile instrucțiuni;\n\nexpeditorul trebuie să-l despăgubească pe transportator pentru cheltuielile pe care le-a antrenat executarea noilor instrucțiuni;\n\nexecutarea acestor instrucțiuni trebuie să fie posibilă în momentul în care instrucțiunile parvin persoanei care trebuie să le execute și nu trebuie nici să împiedice exploatarea normală a întreprinderii transportatorului, nici să aducă prejudicii expeditorilor sau destinatarilor altor transporturi;\n\ninstrucțiunile nu trebuie niciodată să aibă efect divizarea transportului.\n\nÎntrebarea 10 din 134" }, { "nr": 10, "tema": "Elemente de drept civil", "intrebare": "În ce condiții transportatorul care a plătit despăgubiri, conform prevederilor Convenției CMR, are drept de regres, pentru suma plătită, împreună cu dobânzile și cheltuielile suportate, contra transportatorilor care au participat la executarea contractului de transport, dacă nu se poate stabili care dintre transportatori răspunde pentru pagubă?", "raspuns": "În cazul în care nu se poate stabili care dintre transportatori răspunde pentru pagubă, despăgubirea se repartizează între toți transportatorii, proporțional cu partea de remunerație ce revine fiecăruia.\n\nSau în alte cazuri:\n\ntransportatorul prin fapta căruia s-a produs paguba trebuie să suporte singur despăgubirea plătită de el sau de un alt transportator;\n\ndacă paguba s-a produs prin fapta a doi sau mai mulți transportatori, fiecare dintre ei trebuie să plătească o sumă proporțională cu partea sa de răspundere; dacă evaluarea părților de răspundere este imposibilă, fiecare dintre ei este răspunzător proporțional cu partea de remunerare a transportului care îi revine;\n\ndacă nu se poate stabili care dintre transportatori răspunde pentru pagubă, despăgubirea se repartizează între toți transportatorii, în proporția fixată la punctul de mai sus.\n\nÎntrebarea 11 din 134" }, { "nr": 11, "tema": "Elemente de drept civil", "intrebare": "Menționați, pentru un răspuns corect, patru cazuri în care tribunalul poate pronunța dizolvarea societății la solicitarea oricărei persoane interesate, precum și a Oficiului Național al Registrului Comerțului.", "raspuns": "La cererea oricărei persoane interesate, precum și a Oficiului National al Registrului Comerțului, tribunalul va putea pronunța dizolvarea societății în cazurile în care:\n\n• societatea nu mai are organe statutare sau acestea nu se mai pot întruni;\n\n• societatea nu a depus, în cel mult 6 luni de la expirarea termenelor legale, situațiile financiare anuale;\n\n• societatea și-a încetat activitatea, nu are sediul social cunoscut ori nu îndeplinește condițiile referitoare la sediul social sau asociații au dispărut ori nu au domiciliul cunoscut sau reședința cunoscută;\n\n• societatea s-a aflat mai mult de 3 ani în inactivitate temporară, anunțată organelor fiscale și înscrisă în registrul comerțului; termenul de 3 ani curge de la data înscrierii în registrul comerțului a mențiunii privind starea de inactivitate temporară a societății;\n\n• societatea nu și-a completat capitalul social, în condițiile legii.\n\nÎntrebarea 12 din 134" }, { "nr": 12, "tema": "Elemente de drept civil", "intrebare": "În cazul în care operatorul de transport întârzie să livreze marfa la timpul convenit prin scrisoarea de transport tip CMR, dacă cel în drept face dovada că din această întârziere a rezultat un prejudiciu, transportatorul este obligat să plătească daune. Care este valoarea maximă a acestora?", "raspuns": "În caz de întârziere, dacă cel în drept face dovada că din această întârziere a rezultat un prejudiciu, transportatorul este ținut să plătească daune care nu pot depăși prețul transportului.\n\nÎntrebarea 13 din 134" }, { "nr": 13, "tema": "Elemente de drept civil", "intrebare": "Conform prevederilor Convenției referitoare la contractul de transport internațional de mărfuri pe șosele (CMR), în ce situații transportatorul este exonerat de răspundere dacă pierderea sau avaria rezultă din riscurile particulare inerente uneia din următoarele fapte: manipularea, încărcarea, stivuirea sau descărcarea mărfii?", "raspuns": "Transportatorul este exonerat de răspundere dacă:\n\n• manipularea, încărcarea sau stivuirea mărfii se face de către expeditor;\n\n• manipularea, stivuirea sau descărcarea mărfii se face de către destinatar;\n\n• manipularea, stivuirea, încărcarea sau descărcarea mărfii se face de către o persoană care acționează în contul expeditorului sau am destinatarului.\n\nÎntrebarea 14 din 134" }, { "nr": 14, "tema": "Elemente de drept civil", "intrebare": "Care sunt indicațiile obligatorii pe care trebuie să le conțină scrisoarea de transport tip CMR pentru care expeditorul răspunde pentru toate cheltuielile și daunele pricinuite transportatorului din cauza inactivității sau insuficienței lor?", "raspuns": "Expeditorul răspunde pentru toate cheltuielile și daunele pricinuite transportatorului din cauza inactivității sau insuficienței indicațiilor următoare:\n\n• numele și adresa expeditorului;\n\n• locul și data primirii mărfii și locul prevăzut pentru eliberarea acesteia;\n\n• numele și adresa destinatarului;\n\n• denumirea curentă a naturii mărfii și felul ambalajului, iar pentru mărfurile periculoase, denumirea lor general recunoscută;\n\n• numărul coletelor, marcajele speciale și numerele lor;\n\n• greutatea brută sau cantitatea altfel exprimată a mărfii;\n\n• cheltuielile aferente transportului ori oricăror alte indicații sau instrucțiuni date de el pentru emiterea scrisorii de trăsură.\n\nÎntrebarea 15 din 134" }, { "nr": 15, "tema": "Elemente de drept civil", "intrebare": "În conformitate cu prevederile din Convenția CMR, care sunt obligațiile expeditorului?", "raspuns": "Expeditorul trebuie să pună la dispoziția transportatorului toate documentele necesare ( de ex. factura, certificat sanitar, etc) și să-i furnizeze toate informațiile cerute.\n\nÎntrebarea 16 din 134" }, { "nr": 16, "tema": "Elemente de drept civil", "intrebare": "În conformitate cu prevederile din Convenția CMR, care sunt răspunderile expeditorului?", "raspuns": "• expeditorul răspunde pentru toate cheltuielile și daunele pricinuite transportatorului din cauza inexactității sau insuficienței indicațiilor prevăzute în Convenția CMR în articolul 6 paragraful 1 b), d), e), f), g), h) și j); indicațiilor menționate în articolul 6 paragraful 2 și oricăror alte indicații sau instrucțiuni date de el pentru emiterea scrisorii de trăsură sau pentru a fi inserate în aceasta;\n\n• expeditorul este răspunzător față de transportator pentru daunele pricinuite persoanelor, materialului sau altor mărfuri, precum și pentru cheltuielile cauzate de defectuozitatea ambalajului mărfii, afară de cazul când defectuozitatea, fiind aparentă sau cunoscută transportatorului în momentul primirii mărfii, transportatorul nu a făcut rezerve cu privire la aceasta;\n\n• expeditorul este răspunzător față de transportator pentru toate daunele care ar putea rezulta din lipsa, insuficiența sau din neregularitatea documentelor necesare pentru îndeplinirea formalităților de vamă si a altora care trebuie făcute înainte de eliberarea mărfii, remise de expeditor transportatorului, în afară de cazul în care culpa este a transportatorului.\n\nÎntrebarea 17 din 134" }, { "nr": 17, "tema": "Elemente de drept civil", "intrebare": "În conformitate cu prevederile din Convenția CMR, care sunt obligațiile transportatorului?", "raspuns": "La primirea mărfii, transportatorul este obligat să verifice:\n\n• exactitatea mențiunilor din scrisoarea de transport referitoare la numărul de colete, marcajul și numerele lor;\n\n• starea aparentă a mărfii și a ambalajului.\n\nÎntrebarea 18 din 134" }, { "nr": 18, "tema": "Elemente de drept civil", "intrebare": "În conformitate cu prevederile din Convenția CMR, care sunt răspunderile transportatorului?", "raspuns": "• transportatorul este răspunzător pentru pierderea totală sau parțială sau pentru avarie, produse între momentul primirii mărfii și cel al eliberării acesteia, cât și pentru întârzierea în eliberare;\n\n• transportatorul este răspunzător ca și un comisionar de consecințele pierderii sau utilizării inexacte a documentelor menționate în scrisoarea de trăsură și care o însoțesc sau care i s-au predat, totuși despăgubirea pusă în sarcina sa nu o va depăși pe aceea care ar fi datorat-o în caz de pierdere a mărfii.\n\nÎntrebarea 19 din 134" }, { "nr": 19, "tema": "Elemente de drept civil", "intrebare": "În conformitate cu prevederile din Convenția CMR, care sunt obligațiile destinatarului?", "raspuns": "Destinatarul este obligat să plătească creanțele care rezultă din scrisoarea de transport și este obligat, la primirea mărfii, să verifice conformitatea stării acesteia cu mențiunile din scrisoarea CMR.\n\nÎntrebarea 20 din 134" }, { "nr": 20, "tema": "Elemente de drept civil", "intrebare": "În conformitate cu prevederile din Convenția CMR, care sunt răspunderile destinatarului?", "raspuns": "Dacă destinatarul a primit marfa fără să fi constatat starea ei în contradictoriu cu transportatorul sau dacă cel mai târziu în momentul livrării, când este vorba de pierderi ori avarii aparente, nu a făcut rezerve transportatorului, se prezumă, până la proba contrarie, că a primit marfa în starea descrisă în scrisoarea de transport.\n\nÎntrebarea 21 din 134" }, { "nr": 21, "tema": "Elemente de drept comercial", "intrebare": "Menționați, pentru un răspuns corect, patru anumite operații care declanșează și pregătesc încetarea existentei societății comerciale?", "raspuns": "O societate comercială cu răspundere limitată (SRL) se dizolvă prin:\n\n• trecerea timpului stabilit pentru durata societății;\n\n• imposibilitatea realizării obiectului de activitate al societății sau realizarea acestuia;\n\n• declararea nulității societății;\n\n• hotărârea adunării generale;\n\n• hotărârea tribunalului, la cererea oricărui asociat, pentru motive temeinice, precum neînțelegerile grave dintre asociați, ce împiedică funcționarea societății;\n\n• falimentul societății;\n\n• alte cauze prevăzute de lege sau de actul constitutiv al societății.\n\n​SRL-ul, pe lângă motivele enumerate mai sus, se dizolvă prin falimentul, incapacitatea, excluderea, retragerea sau decesul unuia dintre asociați, când, datorită acestor cauze, numărul asociaților s-a redus la unul singur.\n\nÎntrebarea 22 din 134" }, { "nr": 22, "tema": "Elemente de drept comercial", "intrebare": "(Pentru un răspuns corect precizați minim patru activități preliminare și enumerați patru tipuri de societăți comerciale).", "raspuns": "Operaţiuni preliminare înființării unei societăți comerciale:\n\n• se alege obiectul de activitate, forma juridică, durata de funcționare, modul de dizolvare și lichidare;\n\n• rezervarea denumirii la registrul comerțului;\n\n• întocmirea actului constitutiv și numirea administratorului;\n\n• stabilirea sediului social prin întocmirea contractului de comodat.\n\nTipuri de societăți comerciale:\n\n• societate în nume colectiv SNC;\n\n• societate în comandită simplă SCS;\n\n• societate pe acțiuni SA;\n\n• societate în comandită pe acțiuni SCA;\n\n• societate cu răspundere limitată SRL.\n\nÎntrebarea 23 din 134" }, { "nr": 23, "tema": "Elemente de drept comercial", "intrebare": "Pentru un răspuns corect precizați minim patru registre, în afară de registrul asociaților care au constituit SRL-ul.", "raspuns": "• Registrul-jurnal;\n\n• Registrul-inventar;\n\n• Registrul Cartea mare;\n\n• Registrul general de evidentă a salariaților;\n\n• Registrul unic de control;\n\n• Registrul de casă.\n\nÎntrebarea 24 din 134" }, { "nr": 24, "tema": "Elemente de drept comercial", "intrebare": "Care sunt condițiile pe care trebuie să le îndeplinească un agent economic pentru a fi considerat comerciant?", "raspuns": "Pentru a fi considerat comerciant, un agent economic trebuie să îndeplinească următoarele condiții: \n\n• să facă acte de comerț;\n\n• să realizeze acte de comerț în mod obișnuit, ceea ce implică repetabilitatea operațiunilor respective;\n\n• să transforme realizarea actelor de comerț în profesia sa de bază sau accesorie;\n\n• să acționeze în numele său personal.\n\nÎntrebarea 25 din 134" }, { "nr": 25, "tema": "Elemente de drept comercial", "intrebare": "Care sunt incapacitățile, prevăzute de legislația națională, care determină restricții referitoare la persoanele care efectuează și desfășoară o activitate de comerț? (Pentru un răspuns corect precizați cel puțin 3 situați care generează incapacități pentru anumite persoane).", "raspuns": "Nu au voie să facă comerț:\n\n• persoanele afectate de interdicții legale ca urmare a unor condamnări suferite pentru crime sau delicte contra onestității și bunăvoinței, precum și cele condamnate pentru delicte fiscale sau economice;\n\n• persoanele care au suferit anumite interdicții judiciare datorită faptului că s-au dovedit a fi foarte risipitori sau că fac parte din rândul persoanelor atinse de alienare mintală;\n\n• minorii.\n\nÎntrebarea 26 din 134" }, { "nr": 26, "tema": "Elemente de drept comercial", "intrebare": "Care sunt incompatibilitățile, prevăzute de legislația națională, care stipulează imposibilitatea exercitării actelor de comerț, concomitent cu anumite profesii? (Pentru un răspuns corect precizați cel puțin trei profesii incompatibile cu actele de comerț).", "raspuns": "Exercitarea comerțului este incompatibilă cu realizare concomitentă a unor profesii, cum ar fi cea de avocat, magistrat, notar, funcționar public, militar etc.\n\nÎntrebarea 27 din 134" }, { "nr": 27, "tema": "Elemente de drept comercial", "intrebare": "Menționați două activități care pot fi încadrate ca monopol de stat.", "raspuns": "Constituie monopol de stat:\n\n• fabricarea și comercializarea armamentului, munițiilor și explozibililor;\n\n• producerea și comercializarea stupefiantelor;\n\n• producerea și emisiunea de mărci poștale și timbre fiscale.\n\nÎntrebarea 28 din 134" }, { "nr": 28, "tema": "Elemente de drept comercial", "intrebare": "Menționați, dintre prerogativele comerciantului, cel puțin două care fac referire la posibilitatea de a beneficia de măsuri speciale cu privire la urmărirea contractelor comerciale.", "raspuns": "Prerogativele comerciantului\n\n• posibilitatea de a beneficia de măsuri speciale cu privire la urmărirea contractelor comerciale;\n\n• posibilitatea inserării în contractele sale a unei clauze de arbitraj;\n\n• posibilitatea apelării la instanțe specializate sau proceduri simplificate pentru litigii comerciale.\n\nÎntrebarea 29 din 134" }, { "nr": 29, "tema": "Elemente de drept comercial", "intrebare": "Care sunt activitățile vizate de procedura falimentului? (Pentru un răspuns corect precizați minim trei activități).", "raspuns": "Printre activitățile vizate de procedura falimentului se numără și acestea:\n\n• activitățile de comerț;\n\n• activitățile industriale;\n\n• activitățile de prestări servicii;\n\n• activitățile de transport;\n\n• activitățile bancare și de asigurări.\n\nÎntrebarea 30 din 134" }, { "nr": 30, "tema": "Elemente de drept social", "intrebare": "Cum se consideră perioada de timp necesară conducătorului auto pentru a se deplasa la locul de îmbarcare într-un vehicul care intră în domeniul de aplicare a Regulamentului (CE) nr. 561/2006 sau pentru a se întoarce din acel loc, atunci când acesta nu se află la locul de reședință al conducătorului auto, nici la sediul angajatorului unde se află locul normal de staționare al conducătorului auto, ce obligație are acesta și de când decurgea aceasta, dacă vehiculul este dotat cu aparat tahograf digital?", "raspuns": "Perioada de timp necesară conducătorului pentru a se deplasa la locul de îmbarcare într-un vehicul care intră în domeniul de aplicare a prezentului regulament sau pentru a se întoarce din acel loc, atunci când acesta nu se află nici la locul de reședință a conducătorului, nici la sediul angajatorului unde se află locul normal de staționare al conducătorului, nu se consideră repaus sau pauză, cu excepția cazului în care conducătorul se află pe un feribot sau în tren și are acces la o cușetă. Această perioadă se consideră perioadă de disponibilitate și va începe să curgă din momentul în care conducătorul auto își începe deplasarea către locul de îmbarcare sau din momentul în care acesta părăsește vehiculul, pentru a se întoarce din acel loc iar înregistrarea pe cardul tahografic al conducătorului auto se va face folosind funcția de introducere manuală a datelor a tahografului digital în momentul când conducătorul auto are acces la tahograful digital.\n\nÎntrebarea 31 din 134" }, { "nr": 31, "tema": "Elemente de drept social", "intrebare": "Cum se consideră perioada de timp necesara conducătorului auto ce conduce un vehicul care nu intră în domeniul de aplicare a Regulamentului (CE) nr. 561/2006, pentru a se deplasa la locul de îmbarcare într-un vehicul care intră în domeniul de aplicare a acestui regulament sau pentru a se întoarce din acel loc, atunci când acesta nu se află nici la locul de reședință al conducătorului auto, nici la sediul angajatorului unde se află locul normal de staționare al conducătorului auto, ce obligație are acesta și de când decurgea aceasta, dacă vehiculul este dotat cu aparat tahograf analog?", "raspuns": "Perioada de timp necesară conducătorului ce conduce un vehicul care nu intră în domeniul de aplicare a prezentului regulament pentru a se deplasa la locul de îmbarcare într-un vehicul care intră în domeniul de aplicare a prezentului regulament sau pentru a se întoarce din acel loc, atunci când acesta nu se află nici la locul de reședință al conducătorului, nici la sediul angajatorului unde se află locul normal de staționare al conducătorului, se consideră altă muncă. Conducătorul auto trebuie să înregistreze manual această perioadă de timp pe foile de înregistrare din momentul în care această perioadă de timp începe și până are acces din nou la tahograful analogic.\n\nÎntrebarea 32 din 134" }, { "nr": 32, "tema": "Elemente de drept social", "intrebare": "Care ar fi o formă de manifestare a concurenței neloiale în domeniul legislației sociale?", "raspuns": "Nerespectarea perioadelor de conducere și de odihnă, remunerarea conducătorilor auto în funcție de distanța parcursă, practici de administrare ilicite.\n\nÎntrebarea 33 din 134" }, { "nr": 33, "tema": "Elemente de drept social", "intrebare": "Având în vedere cele de mai sus precizați care este durata odihnei zilnice pe care trebuie luată de către cei doi conducători auto, într-un interval de 30 de ore, ca să beneficieze de prevederea enunțată anterior?", "raspuns": "Pentru a putea utiliza această derogare, membrii unui echipaj trebuie să efectueze o perioadă de repaus zilnic normală de cel puțin 11 ore într-un interval de 30 de ore.\n\nÎntrebarea 34 din 134" }, { "nr": 34, "tema": "Elemente de drept social", "intrebare": "În ce zi și la ce oră se poate ajunge în cel mai scurt timp la Roma cu respectarea prevederilor Regulamentului (CE) nr. 561/2006 dacă se utilizează un singur conducător auto și viteza medie de deplasare este de 60 km/h. (Justificați răspunsul prin desfășurarea cursei).", "raspuns": "Autocamionul ajunge la Roma joi la ora 16.30.\n\nJustificare:\n\n2400km/60 km/h = 40 ore de conducere efectivă sunt necesare pentru a ajunge la destinație;\n\n• Luni 7.30 plecare + 4.5 ore conducere + 45 min pauză + 4.5 ore conducere + 9 ore odihnă zilnică redusă;\n\n• Marți 2.15 plecare + 4.5 ore conducere + 45 min pauză + 4.5 ore conducere + 9 ore odihnă zilnică redusă;\n\n• Marți 21.00 plecare + 4.5 ore conducere + 45 min pauză + 4.5 ore conducere + 9 ore odihnă zilnică redusă;\n\n• Miercuri 15.45 plecare + 4.5 ore conducere + 45 min pauză + 4.5 ore conducere + 11 ore odihnă zilnică normală;\n\n• Joi 12.30 plecare + 4 ore de conducere = ajunge la destinație joi la ora 16.30.\n\nÎntrebarea 35 din 134" }, { "nr": 35, "tema": "Elemente de drept social", "intrebare": "Precizați minim trei componente ale perioadei dedicate activităților de transport rutier.", "raspuns": "• conducerea autovehiculului;\n\n• încărcarea și descărcarea;\n\n• ajutorul acordat pasagerilor la urcarea și coborârea din vehicul;\n\n• curățenia și întreținerea tehnică;\n\n• toate celelalte activități vizând asigurarea siguranței vehiculului, a încărcăturii sale și a pasagerilor sau îndeplinirea obligațiilor legale ori de reglementare direct legate de operațiunea de transport aflată în desfășurare, inclusiv supravegherea încărcării și descărcării, formalitățile administrative legate de poliție, vamă, serviciul de imigrare etc.\n\nÎntrebarea 36 din 134" }, { "nr": 36, "tema": "Elemente de drept social", "intrebare": "Ce obligație are conducătorul auto într-o astfel de situație?", "raspuns": "Conducătorul auto trebuie să indice manual natura și cauza abaterii de la Regulament (în orice limbă comunitară) pe diagrama tahograf sau pe un imprimat scos din memoria tahografului sau în registrul său de sarcini, până la sosirea la locul de oprire corespunzător. Aceste documente vor fi semnate de conducătorul auto.\n\nÎntrebarea 37 din 134" }, { "nr": 37, "tema": "Elemente de drept social", "intrebare": "În ce condiții, în conformitate cu prevederile Regulamentului (CE) nr. 561/2006, un conducător auto care efectuează un transport internațional de marfă poate efectua repausul într-un vehiculul rutier, pe care acesta îl conduce? Pentru un răspuns corect precizați, de asemenea, care sunt tipurile de repaus ce sunt permise a se efectua într-un vehicul rutier.", "raspuns": "În cazul în care un conducător solicită acest lucru, perioadele de repaus zilnic și perioadele de repaus săptămânal reduse departe de baza de staționare a vehiculului pot fi efectuate la bordul vehiculului dacă:\n\n• conducătorul auto solicită acest lucru;\n\n• autovehiculul este dotat cu cabină de dormit și se află în staționare.\n\nÎntrebarea 38 din 134" }, { "nr": 38, "tema": "Elemente de drept social", "intrebare": "În conformitate cu prevederile Hotărârea de Guvern nr. 38/2008, cum va înregistra un conducător auto, perioadele de timp în care acesta nu poate dispune liber de timpul său și i se cere să fie la postul său de lucru, gata să întreprindă activitatea sa normală, îndeplinind anumite sarcini asociate serviciului, în special în timpul perioadelor când așteaptă să se facă încărcarea sau descărcarea bagajelor călătorilor, dacă durata previzibilă a acestora este cunoscută dinainte​?", "raspuns": "Această perioadă face parte din timpul de muncă al conducătorului auto și va fi înregistrată folosind tahograful de la bordul vehiculului ca „Altă muncă”.\n\nÎntrebarea 39 din 134" }, { "nr": 39, "tema": "Elemente de drept social", "intrebare": "În ce zi și la ce oră se poate ajunge în cel mai scurt timp la cu respectarea prevederilor Regulamentului CE nr. 561/2006 dacă viteza medie de deplasare este de 50 km/h? (Justificați răspunsul prin desfășurarea cursei).", "raspuns": "Autocamionul ajunge la Wiesbaden joi la ora 5:45.\n\nJustificare:\n\n1850km : 50km/h = 37 ore de conducere efectivă necesare pentru a ajunge la destinaţie.\n\n• I-ul program: luni 10:00 + 9 ore conducere + 45 min pauză + 9 ore repaus zilnic = marți 4:45\n\n• II-lea program: marți 4:45 + 9 ore conducere + 45 min pauză + 9 ore repaus zilnic = marți 23:30\n\n• III-lea program: marți 23:30 + 9 ore conducere + 45 min pauza + 9 ore repaus zilnic = miercuri 18:15\n\n• IV-lea program: miercuri 18:15 + 10 ore conducere + 2x45 min pauze = joi 5:45\n\n• Autocamionul ajunge la Wiesbaden joi la ora 5:45.\n\nÎntrebarea 40 din 134" }, { "nr": 40, "tema": "Elemente de drept social", "intrebare": "În ce condiții perioada de timp necesară conducătorului auto pentru a se deplasa la locul de îmbarcare sau pentru a se întoarce din acel loc, atunci când acesta nu se află la locul de reședință a conducătorului auto, nici la sediul angajatorului unde se află locul normal de staționare al conducătorului auto poate fi considerată repaus sau pauză?", "raspuns": "Se consideră repaus sau pauză numai în cazul în care conducătorul auto se află pe un feribot sau în tren și are acces la o cușetă.\n\nÎntrebarea 41 din 134" }, { "nr": 41, "tema": "Elemente de drept social", "intrebare": "Indicați două fapte care pot atrage reținerea cartelei (cardului) tahograf utilizat de către conducătorul auto în momentul controlului.", "raspuns": "Cardul tahograf al unui conducător auto se reține dacă:\n\n• cardul este fals;\n\n• cardul a fost declarat pierdut sau furat;\n\n• cardul aparține altei persoane.\n\nÎntrebarea 42 din 134" }, { "nr": 42, "tema": "Elemente de drept social", "intrebare": "În ce zi și la ce oră se poate ajunge în cel mai scurt timp la Roma respectând prevederilor Regulamentului (CE) nr. 561/2006 dacă utilizați un singur conducător auto, plecarea din București este luni la ora 05:30, iară viteza medie de deplasare este de 60 km/h? (Justificați răspunsul prin desfășurarea cursei).", "raspuns": "Autocamionul ajunge la Roma joi la ora 22:00.\n\nJustificare:\n\n2760 km : 60 km/h = 46 ore de conducere necesare pentru a ajunge la destinație.\n\n• I-ul program: luni 5:30 + 9 ore conducere + 45 min pauză + 9 ore repaus zilnic = marți 0:15;\n\n• II-lea program: marți 0:15 + 9 ore conducere + 45 min pauză + 9 ore repaus zilnic = marți 19:00;\n\n• III-lea program: marți 19:00 + 9 ore conducere + 45 min pauză + 9 ore repaus zilnic = miercuri 13:45;\n\n• IV-lea program: miercuri 13:45 + 9 ore conducere + 45 min pauză + 11 ore repaus zilnic = joi 10:30;\n\n• V-lea program: joi 10:30 + 10 ore conducere + 2 x 45min pauze = joi 22:00.\n\nÎntrebarea 43 din 134" }, { "nr": 43, "tema": "Elemente de drept social", "intrebare": "În ce zi și la ce oră se poate ajunge în cel mai scurt timp la Roma respectând prevederilor Regulamentului (CE) nr. 561/2006 dacă utilizați un singur conducător auto, plecarea din București este luni la ora 06:30, iară viteza medie de deplasare este de 60 km/h? (Justificați răspunsul prin desfășurarea cursei).", "raspuns": "Autocamionul ajunge la Roma joi la ora 23:00.\n\nJustificare:\n\n2760 km : 60 km/h = 46 ore de conducere efectivă sunt necesare pentru a ajunge la destinație.\n\n• I-ul program: luni 6:30 + 9 ore conducere + 45 min pauză + 9 ore repaus zilnic = marți 1:15;\n\n• II-lea program: marți 1:15 + 9 ore conducere + 45 min pauză + 9 ore repaus zilnic = marți 20:00;\n\n• III-lea program: marți 20:00 + 9 ore conducere + 45 min pauză + 9 ore repaus zilnic = miercuri 14:45;\n\n• IV-lea program: miercuri 14:45 + 9 ore conducere + 45 min pauză + 11 ore repaus zilnic = joi 11:30;\n\n• V-lea program: joi 11:30 + 10 ore conducere + 2 x 45min pauze = joi 23:00.\n\nÎntrebarea 44 din 134" }, { "nr": 44, "tema": "Elemente de drept social", "intrebare": "În ce mod poate un conducătorul auto face această înregistrare în situația în care acesta urmează să conducă una din autocisternele utilizate de către operatorul de transport conform datelor menționate anterior? (Pentru un răspuns corect precizați cel puțin două moduri în care se poate face această înregistrare). Obs. Se va lua în calcul faptul că vehiculul respectiv este echipat cu tahograf digital.", "raspuns": "Conducătorul auto va înregistra aceste perioade care nu intră în sfera de aplicare a Reg. 561/2006 se înregistrează ca \"Alte activități\":\n\n• cu funcția de introducere manuală a datelor a tahografului digital;\n\n• pe un imprimat scos din memoria tahografului digital;\n\n• prin Formularul privind atestarea activităților - conform Regulamentului CE nr. 561/2006.\n\nÎntrebarea 45 din 134" }, { "nr": 45, "tema": "Elemente de drept fiscal", "intrebare": "Conform prevederilor OG nr. 15/2002 privind aplicarea tarifului de utilizare și a tarifului de trecere pe rețeaua de drumuri naționale din România, cu modificările și completările ulterioare, în ce condiții rovigneta își menține valabilitatea în cazul schimbării numărului de înmatriculare al vehiculului?", "raspuns": "În cazul schimbării numărului de înmatriculare, rovinieta își menține valabilitatea numai în condițiile în care utilizatorul solicită efectuarea modificării în baza de date, în scris. Pentru efectuarea modificării, utilizatorul se va prezenta la unul dintre punctele de lucru ce aparțin de Compania Națională de Administrare a Infrastructurii Rutiere S.A (C.N.A.I.R.) cu cerere scrisă, conform formularului tip și cartea de identitate a autovehiculului în copie și originalul acesteia pentru verificarea conformității.\n\nÎntrebarea 46 din 134" }, { "nr": 46, "tema": "Elemente de drept fiscal", "intrebare": "În ce situații se consideră îndeplinită condiția de a nu înregistra obligații fiscale restante la bugetul general consolidat de către operatorilor economici eligibili pentru restituirea de accize? Pentru un răspuns corect precizați două situații în care se consideră îndeplinită condiția de a nu înregistra obligații fiscale restante la bugetul general consolidat.", "raspuns": "Se consideră îndeplinită condiția de a nu înregistra obligații fiscale restante la bugetul de stat dacă sunt îndeplinite următoarele condiții:\n\n• la momentul înregistrării în Registrul vehiculelor și al operatorilor economici eligibili pentru restituirea de accize nu au obligații de plată restante;\n\n• la momentul efectuării restituirii de accize nu au obligații de plată restante la bugetul general consolidat;\n\n• în certificatul de atestare fiscală operatorul economic are înscrise obligații de plată care sunt mai mici sau egale cu sumele pe care acesta le are de încasat.\n\nÎntrebarea 47 din 134" }, { "nr": 47, "tema": "Elemente de drept fiscal", "intrebare": "În ce condiții, în conformitate cu prevederile din Codul fiscal valabil în anul 2016, transportul rutier de mărfuri este supus unui nivel al accizelor diferențiat prin diminuarea nivelului standard prevăzut pentru motorină utilizată drept carburant pentru motor?", "raspuns": "Este supusă unui nivel al accizelor diferențiat motorina utilizată drept carburant pentru motor în scopul unui transport rutier de mărfuri în cont propriu sau pentru alte persoane, cu autovehicule ori ansambluri de vehicule articulate destinate exclusiv transportului rutier de mărfuri și cu o greutate brută maximă autorizată de cel puțin 7,5 tone.\n\nÎntrebarea 48 din 134" }, { "nr": 48, "tema": "Elemente de drept fiscal", "intrebare": "Ce reprezintă TVA (taxa pe valoare adăugată) în conformitate cu prevederile din Codul fiscal al României, valabil în anul 2016?", "raspuns": "Taxa pe valoarea adăugată este un impozit indirect, pe consum, datorat la bugetul statului și care este suportat de consumatorul final de bunuri și servicii.\n\nÎntrebarea 49 din 134" }, { "nr": 49, "tema": "Elemente de drept fiscal", "intrebare": "Care sunt elementele specifice ale TVA (taxa pe valoare adăugată) în conformitate cu prevederile din Codul fiscal al României, valabil în anul 2016?", "raspuns": "• denumirea impozitului - TVA se aplică asupra valorii adăugate creată de firmă;\n\n• persoanele impozabile;\n\n• materia impozabilă;\n\n• sfera de cuprindere;\n\n• suportatorul impozitului (TVA) este consumatorul de bunuri și servicii: persoane fizice care sunt consumatori finali, persoanele juridice care nu sunt înregistrate ca plătitori de TVA și persoane fizice autorizate (PFA) care nu sunt înregistrate ca plătitori de TVA.\n\nÎntrebarea 50 din 134" }, { "nr": 50, "tema": "Elemente de drept fiscal", "intrebare": "Care sunt elementele care nu sunt cuprinse în baza de calcul a TVA(taxa pe valoare adăugată) în conformitate cu prevederile din Codul fiscal al României, valabil în anul 2016?", "raspuns": "Baza de calcul pentru impozitare nu cuprinde următoarele:\n\n• rabaturile, remizele, risturnele, sconturile și alte reduceri de preț, acordate de furnizori direct clienților la data exigibilității taxei;\n\n• sumele reprezentând daune-interese, stabilite prin hotărâre judecătorească definitivă/definitivă și irevocabilă, după caz, penalizările și orice alte sume solicitate pentru neîndeplinirea totală sau parțială a obligațiilor contractuale, dacă sunt percepute peste prețurile și/sau tarifele negociate;\n\n• dobânzile, percepute după data livrării sau prestării, pentru plăți cu întârziere;\n\n• valoarea ambalajelor care circulă între furnizorii de marfă și clienți, prin schimb, fără facturare;\n\n• sumele achitate de o persoană impozabilă în numele și în contul altei persoane și care apoi se decontează acesteia, inclusiv atunci când locatorul asigură el însuși bunul care face obiectul unui contract de leasing financiar sau operațional și refacturează locatarului costul exact al asigurării, precum și sumele încasate de o persoană impozabilă în numele și în contul unei alte persoane.\n\nÎntrebarea 51 din 134" }, { "nr": 51, "tema": "Elemente de drept fiscal", "intrebare": "Când se calculează TVA (taxa pe valoare adăugată) în conformitate cu prevederile din Codul fiscal al României, valabil în anul 2016?", "raspuns": "Taxa pe valoare adăugată (TVA) se calculează:\n\n• în momentul livrării bunurilor și al prestării serviciilor, atunci când taxa se stabilește de furnizor;\n\n• în momentul achiziției bunurilor atunci când se aplică taxarea inversă, când taxa se stabilește de cumpărător;\n\n• în momentul vămuirii bunurilor, iar calculul taxei cade în sarcina organelor vamale.\n\nÎntrebarea 52 din 134" }, { "nr": 52, "tema": "Elemente de drept fiscal", "intrebare": "Care este termenul scadent de plată al TVA (taxa pe valoare adăugată), respectiv când acesta trebuie achitat la bugetul statului, în conformitate cu prevederile din Codul fiscal al României, valabil în anul 2016?", "raspuns": "Termenul scadent de plată al TVA (taxa pe valoare adăugată) este până în 25 ale lunii următoare, atunci când perioada fiscală este luna calendaristică și până în 25 a primei luni a trimestrului următor, atunci când această perioadă fiscală este trimestrială; în momentul când se generează dreptul de import pentru bunurile respective, conform legislației vamale.\n\nÎntrebarea 53 din 134" }, { "nr": 53, "tema": "Elemente de drept fiscal", "intrebare": "Precizați două tehnici utilizate pentru stabilirea bazei de impozitare a TVA (taxa pe valoare adăugată) în conformitate cu prevederile din Codul fiscal al României, valabil în anul 2016?", "raspuns": "Printre tehnicile utilizate pentru stabilirea bazei de impozitare a TVA (taxa pe valoare adăugată) se numără și:\n\n• tehnica directă (calcul valoare TVA când se cunoaște valoarea produsului);\n\n• tehnica indirectă (calcul TVA și baza de impozitare când se cunoaște prețul final de vânzare).\n\nÎntrebarea 54 din 134" }, { "nr": 54, "tema": "Elemente de drept fiscal", "intrebare": "Impozitarea vehiculelor este un instrument economico-financiar prin care se promovează vehicule cu grad redus de poluare, în măsura în care se creează avantaje pentru înscrierea și menținerea în circulație a acestor vehicule. Dați cel puțin două exemple de categorii de vehicule cărora li se poate aplica impozit anual diferențiat?", "raspuns": "Următoarele două categorii de vehicule li se aplică impozit anual diferențiat:\n\n• autovehiculele acționate electric sunt supuse unui regim de impozitare anual distinct față de autovehiculele cu motor exclusiv termic;\n\n• mijloacele de transport hibride sunt supuse unui regim de impozitare anual diferențiat față de autovehiculele cu motor exclusiv termic.\n\nÎntrebarea 55 din 134" }, { "nr": 55, "tema": "Elemente de drept fiscal", "intrebare": "Statele membre ale Uniunii Europene pot stabili taxe de utilizarea infrastructurii rutiere în diverse forme. Care sunt cele două tipuri de taxe pentru utilizarea infrastructurii rutiere din România?", "raspuns": "• Tarif de utilizare, se achită în funcție de tipul vehiculului și se aplică în mod nediscriminatoriu utilizatorilor români și străini pentru toate vehiculele înmatriculate temporar sau definitiv care utilizează rețeaua de drumuri naționale din România pe parcursul unei perioade date.\n\n• Tarif de trecere, se achită în funcție de tipul vehiculului și se aplică în mod nediscriminatoriu utilizatorilor români și străini pentru toate vehiculele înmatriculate temporar sau definitiv care utilizează o anumită distanță de pe un sector de drum, pod, tunel sau trecătoare de munte care fac parte din rețeaua de drumuri naționale din România.\n\nÎntrebarea 56 din 134" }, { "nr": 56, "tema": "Elemente de drept fiscal", "intrebare": "Pentru care venituri au obligativitatea plății impozitului, persoane fizice rezidente care au domiciliul în România?", "raspuns": "Impozitul pe venit se aplică veniturilor obținute din orice sursă (de exemplu: venituri din salarii, din drept de proprietate intelectuală, din cedarea folosinței bunurilor, din activități independente, etc), atât din România, cât si din afara României.\n\nÎntrebarea 57 din 134" }, { "nr": 57, "tema": "Elemente de drept fiscal", "intrebare": "Pentru care venituri au obligativitatea plății impozitului, persoane fizice rezidente care nu au domiciliul în România?", "raspuns": "În cazul persoanelor fizice rezidente care nu au domiciliul în România, impozitul pe venit se aplică veniturilor obținute din orice sursă (de ex: salarii, drept de proprietate intelectuală, cedarea folosinței bunurilor, activități independente, etc) obținute în România.\n\nÎntrebarea 58 din 134" }, { "nr": 58, "tema": "Elemente de drept fiscal", "intrebare": "Pentru ce activități desfășurate de către persoanele fizice nerezidente trebuie plătit impozitul pe veniturile realizate?", "raspuns": "În cazul persoanelor fizice nerezidente care desfășoară activitate independentă prin intermediul unui sediu permanent în România, impozitul pe pe veniturile realizate se aplică venitului net atribuibil sediului permanent sau venitului salarial net din activitatea dependentă, dacă persoana fizică nerezidentă desfășoară o astfel de activitate.\n\nÎntrebarea 59 din 134" }, { "nr": 59, "tema": "Elemente de drept fiscal", "intrebare": "Enumerați patru categorii de venituri supuse impozitării din categoria veniturilor în bani, cât și din echivalentul în lei al veniturilor în natură?", "raspuns": "• venituri din activități independente;\n\n• venituri din salarii și asimilate salariilor;\n\n• venituri din cedarea folosinței bunurilor;\n\n• venituri din investiții;\n\n• venituri din pensii;\n\n• venituri din activități agricole, silvicultură și piscicultură;\n\n• venituri din premii și din jocuri de noroc;\n\n• venituri din transferul proprietăților imobiliare;\n\n• venituri din alte surse.\n\nÎntrebarea 60 din 134" }, { "nr": 60, "tema": "Elemente de drept fiscal", "intrebare": "Cine contribuie în România la bugetul asigurărilor sociale, la fondul de sănătate, la fondul pentru șomaj și la bugetul de stat?", "raspuns": "Cei care contribuie la bugetele/fondurile enumerate mau sus sunt:\n\n• cetățenii români sau străini, pe perioada în care au domiciliul ori reședința în România;\n\n• persoanele fizice și juridice care au calitatea de angajatori;\n\n• ANOFM, pentru persoanele care beneficiază de indemnizație de șomaj;\n\n• Casa Națională de Pensii, pentru persoanele care realizează venituri din pensii.\n\nÎntrebarea 61 din 134" }, { "nr": 61, "tema": "Elemente de drept fiscal", "intrebare": "Dați două exemple de modalități de plata taxelor de utilizare a infrastructurii rutiere, din afara României, pentru vehicule cu masa totală maximă autorizată mai mare de 3,5 tone și explicați cum se face verificarea plății taxelor?", "raspuns": "Taxele de utilizare a infrastructurii rutiere, din afara României, pentru vehicule cu masa totală maximă autorizată mai mare de 3,5 tone se pot achita online, cu numerar la punctele de vânzare sau la intrarea/ieșirea de pe autostrăzi, la automate speciale.\n\nVerificarea se face automat pe baza unor camere video care recunosc numărul de înmatriculare al vehiculului, căutând apoi în baza de date dacă există vigneta valabilă. Prin prezentarea la control a vignetei sau a unui document de plată.\n\nÎntrebarea 62 din 134" }, { "nr": 62, "tema": "Gestiunea comercială și financiară a întreprinderii", "intrebare": "Care este prețul minim/km pe care trebuie să-l solicitați pentru efectuarea unei curse dus – întors, dacă luați în calcul costurile din enunț, distanța dintre localitățile între care se efectuează cursa este de 650 km, viteza medie de deplasare este de 50 km/oră și transportul trebuie să se realizeze cu un profit de 21%?", "raspuns": "• 650 km x 2 = 1300 km x 25L / 100 km = 325 L motorină;\n\n• Cost motorină: 325 L x 1,2 E / L = 390 E;\n\n• Cost service: 1300 km x 0,15 E / km = 195 E;\n\n• 1300 km / 50 km/h = 26 ore conducere;\n\n• Cost salar conducător auto: 26 ore x 2,5 E / oră = 65 E;\n\n• Costuri fixe: 50 E x 2 = 100 E;\n\n• Total costuri: 390 + 195 + 65 + 100 = 750 E;\n\n• Profit: 750 x 21 / 100 = 157,5 E;\n\n• Total cursa: 750 + 157,5 = 907,5 E;\n\n• Preț per km: 907,5 / 1300 = 0,698 E/km.\n\nÎntrebarea 63 din 134" }, { "nr": 63, "tema": "Gestiunea comercială și financiară a întreprinderii", "intrebare": "Menționați toate documente în baza cărora operatorul de transport poate demonstra îndeplinirea cerinței privind capacitatea financiară și calculați nivelul financiar care ar asigura îndeplinirea acestei cerințe, dacă efectuați transporturi rutiere cu parcul auto din enunț?", "raspuns": "Condiția de capacitate financiară se consideră îndeplinită daca întreprinderea demonstrează:\n\n• că dispune anual de capital și rezerve în valoare de 9000 euro pentru primul autovehicul utilizat;\n\n• că dispune anual de capital și rezerve în valoare de 5000 euro pentru fiecare autovehicul suplimentar.\n\nCapacitatea financiară se poate demonstra prin:\n\n• bilanț contabil certificat de un expet contabil autorizat sau;\n\n• scrisoare de garanție bancară sau;\n\n• asigurare profesională (asigurare de risc financiar).\n\nÎntrebarea 64 din 134" }, { "nr": 64, "tema": "Gestiunea comercială și financiară a întreprinderii", "intrebare": "Ce reprezintă bilanțul contabil al unei societăți?", "raspuns": "Bilanțul contabil este o situație financiară care prezintă situația activelor, pasivelor și capitalurile proprii ale unei companii/instituții la un anumit moment.\n\nÎntrebarea 65 din 134" }, { "nr": 65, "tema": "Gestiunea comercială și financiară a întreprinderii", "intrebare": "În conformitate cu prevederile referitoare la condițiile de livrare a mărfurilor (INCOTERMS 2010) în situația în care expeditorul menționează pe scrisoarea de transport CMR, condiția de livrare DDP (Delivered Duty Paid) în ce moment își îndeplinește vânzătorul obligația de livrare a mărfurilor și cine răspunde de riscurile de pierdere sau de deteriorare a mărfii, precum și orice alte cheltuieli suplimentare cauzate de evenimente care au avut loc după ce marfa a fost predată operatorului de transport rutier​?", "raspuns": "DDP (Delivered Duty Paid) Descriere: Vânzătorul își îndeplinește obligația de livrare în momentul în care marfa a fost pusă la dispoziția cumpărătorului, la locul convenit din țara importatoare. Vânzătorul trebuie să suporte toate cheltuielile și riscurile legate de aducerea mărfii în acest loc inclusiv a taxelor vamale, a altor taxe și speze oficiale care se plătesc la import, precum și a costurilor și riscurilor de îndeplinire a formalităților vamale. Acest termen poate fi folosit indiferent de modalitatea de transport.\n\nÎntrebarea 66 din 134" }, { "nr": 66, "tema": "Gestiunea comercială și financiară a întreprinderii", "intrebare": "În conformitate cu prevederile referitoare la condițiile de livrare a mărfurilor (INCOTERMS 2010) în situația în care expeditorul menționează pe scrisoarea de transport CMR, condiția de livrare EXW (EX WORS) în ce moment își îndeplinește vânzătorul obligația de livrare a mărfurilor și cine răspunde de riscurile de pierdere sau de deteriorare a mărfii la încărcarea în vehiculul de transport, inclusiv plata transportului și costul asigurării, precum și orice alte cheltuieli suplimentare cauzate de evenimente care au avut loc după ce marfa a fost predată operatorului de transport rutier?", "raspuns": "EXW - Ex Works - Franco fabrică: Presupune obligații minime pentru vânzător care trebuie să pună marfa la dispoziția cumpărătorului la sediul său fără a răspunde de încărcarea mărfii în mijlocul de transport al cumpărătorului. Cumpărătorul suportă toate riscurile pe care le comportă preluarea mărfii și transportarea acestora la destinație. Cumpărătorul asigură plata transportului și costul asigurării și toate cheltuielile suplimentare.\n\nÎntrebarea 67 din 134" }, { "nr": 67, "tema": "Gestiunea comercială și financiară a întreprinderii", "intrebare": "Sistemele de tranzit al mărfurilor care se pot folosi în cadrul Uniuni Vamale Europene sunt în mod obligatoriu acoperite de o garanție. Pentru un răspuns corect precizați două tipuri de garanții și menționați ce trebuie să acopere aceasta?", "raspuns": "Există două tipuri diferite de garanții în sistemul T: garanții individuale și garanții globale.\n\nGaranția individuală asigură acoperire numai pentru o singură deplasare în sistem T. Ea trebuie să acopere valoarea totală a datoriei vamale care poate apărea, calculată pe baza celor mai mari tarife aplicabile mărfurilor de același tip în Statul Membru de plecare.\n\nGaranția globală poate oferi acoperire pentru mai multe curse în sistem T pentru o anumită perioadă de timp. Garanția este fixată pentru a acoperi suma maximă a datoriilor și a altor taxe care sunt exigibile într-o perioadă de cel puțin o săptămână, pe baza tranzacțiilor anterioare și tendințelor anticipate în operațiunile comerciale. Această valoare maximă se numește „sumă de referință“.\n\nÎntrebarea 68 din 134" }, { "nr": 68, "tema": "Gestiunea comercială și financiară a întreprinderii", "intrebare": "Ce elemente din Bilanț sunt incluse la calculul capacității financiare? (Se vor enumera cel puțin cinci elemente pentru un răspuns corect).", "raspuns": "Următoarele elemente din Bilanț se regăsesc printre cele incluse la calculul capacității financiare:\n\n• Capitalul propriu;\n\n• Aporturi de capital;\n\n• Rezerve;\n\n• Rezerve din reevaluare;\n\n• Prime de capital;\n\n• Rezultatul reportat (profitul anilor anteriori, rămas nedistribuit);\n\n• Rezultatul exercițiului financiar (profitul anului curent).\n\nÎntrebarea 69 din 134" }, { "nr": 69, "tema": "Gestiunea comercială și financiară a întreprinderii", "intrebare": "Ce reprezintă cheltuielile de exploatare în cadrul prețului de cost și ce elemente pot fi cuprinse în acestea? (Pentru un răspuns corect precizați minim cinci elemente).", "raspuns": "Cheltuielile de exploatare în cadrul prețului de cost sunt cheltuieli directe generate de realizarea obiectului de activitate.\n\nCheltuieli de exploatare în cadrul prețului de cost sunt:\n\n• combustibil;\n\n• ulei;\n\n• piese de schimb;\n\n• anvelope;\n\n• costul de achiziție al autovehiculelor și uzura acestora;\n\n• salariile șoferilor;\n\n• asigurările autovehiculelor;\n\n• taxe de drum.\n\nÎntrebarea 70 din 134" }, { "nr": 70, "tema": "Gestiunea comercială și financiară a întreprinderii", "intrebare": "Ce elemente obligatorii trebuie să conțină o cambie, știind că acest titlu de credit este un înscris sub semnătură privată?", "raspuns": "Cambia trebuie să cuprindă obligatoriu următoarele elemente:\n\n• denumirea de cambie;\n\n• ordinul pur și simplu de a plăti o suma bine determinată exprimată într-o valută și înscrisă în cifre și litere (dacă suma în cifre nu este aceeași cu suma în litere, rămâne valabilă aceasta din urmă, iar în cazul cand în cambie suma în cifre și litere este trecută de mai multe ori, rămâne valabilă cea mai mică);\n\n• numele, prenumele și adresa trasului (persoanei care trebuie să plătească);\n\n• scadența care poate fi la o zi fixă calendaristică, la vedere, la un anumit termen de la vedere, adică la prezentare, la un anumit termen de la data emiterii, iar dacă nu este indicată scadența se consideră că se plătește la vedere;\n\n• locul unde urmează să se efectueze plata;\n\n• numele, prenumele și adresa beneficiarului (o cambie nu poate fi emisă la purtător);\n\n• data (anul, luna și ziua) și locul emiterii;\n\n• semnătura trăgătorului care în ultimă instanță atestă valabilitatea cambiei.\n\nLipsa unuia dintre aceste elemente poate duce la pierderea valabilității cambiei.\n\nÎntrebarea 71 din 134" }, { "nr": 71, "tema": "Gestiunea comercială și financiară a întreprinderii", "intrebare": "În conformitate cu prevederile referitoare la condițiile de livrare a mărfurilor (INCOTERMS 2010) în situația în care expeditorul menționează pe scrisoarea de transport CMR, condiția de livrare CPT (Carriage Paid To) în ce moment riscurile de pierdere sau de deteriorare a mărfii, precum și orice alte cheltuieli suplimentare cauzate de evenimente care au avut loc după ce marfa a fost predată operatorului de transport rutier trec de la vânzător la cumpărător?", "raspuns": "CPT (Carriage Paid To) Descriere:\n\nVânzătorul plătește pentru transportul mărfii la destinația convenită.\n\nRiscurile de pierdere sau de deteriorare a mărfii, precum și orice alte cheltuieli suplimentare cauzate de evenimente care au avut loc după ce marfa a fost predată cărăușului trec de la vânzător la cumpărător în momentul în care marfa a fost predată cărăușului.\n\nÎn cazul în care pentru transportul mărfii se folosesc cărăuși succesivi, riscurile trec de la vânzător la cumpărător în momentul în care marfa a fost predată primului cărăuș.\n\nTermenul CPT implică obligația vânzătorului de vămuire a mărfii pentru export.\n\nAcest termen poate fi folosit pentru toate modurile de transport, inclusiv pentru transportul multimodal.\n\nÎntrebarea 72 din 134" }, { "nr": 72, "tema": "Gestiunea comercială și financiară a întreprinderii", "intrebare": "În conformitate cu prevederile referitoare la condițiile de livrare a mărfurilor (INCOTERMS 2010) în situația în care expeditorul menționează pe scrisoarea de transport CMR, condiția de livrare CIP (Carriage and Insurance Paid) în ce moment riscurile de pierdere sau de deteriorare a mărfii, precum și orice alte cheltuieli suplimentare cauzate de evenimente care au avut loc după ce marfa a fost predată operatorului de transport rutier trec de la vânzător la cumpărător și ce obligație are suplimentar vânzătorul.", "raspuns": "CIP (Carriage and Insurance Paid) Descriere:\n\nVânzătorul are aceleași obligații ca la termenul CPT dar suplimentar el trebuie sa efectueze și asigurarea pentru acoperirea riscului de pierdere sau deteriorare a mărfii pe timpul transportului.\n\nVânzătorul încheie contractul și plătește prima de asigurare.\n\nCumpărătorul trebuie să ia notă că în cazul CIP vânzătorul este obligat să obțină prima de asigurare pentru acoperire minimă.\n\nTermenul CIP implică obligația vânzătorului de vămuire a mărfii pentru export.\n\nAcest termen poate fi folosit pentru toate modurile de transport, inclusiv pentru transportul multimodal.\n\nÎntrebarea 72 din 134" }, { "nr": 73, "tema": "Gestiunea comercială și financiară a întreprinderii", "intrebare": "Ce reprezintă contul de profit și pierderi al unui operator de transport rutier?", "raspuns": "Contul de profit și pierdere este o situație financiară întocmită pentru o anumită perioadă de timp și care reflectă veniturile și cheltuielile, inclusiv dobânzile și amortismentul, respectivei societăți.\n\nÎntrebarea 74 din 134" }, { "nr": 74, "tema": "Gestiunea comercială și financiară a întreprinderii", "intrebare": "Ce reprezintă cheltuielile financiare în cadrul prețului de cost și ce elemente pot fi cuprinse în acestea? (Pentru un răspuns corect precizați minim cinci elemente).", "raspuns": "Cheltuielile financiare în cadrul prețului de cost reprezintă costuri indirecte.\n\nCheltuielile financiare reprezintă:\n\n• Dobânzile aferente creditelor și împrumuturilor;\n\n• Comisioanele și alte costuri bancare;\n\n• Pierderile din diferențe de curs valutar;\n\n• Sconturile acordate clienților;\n\n• Pierderile din titluri de valoare și alte investiții financiare;\n\n• Cheltuieli privind provizioanele pentru investiții financiare;\n\n• Cheltuieli cu decontările prin efecte comerciale (cambii, bilete la ordin etc.).\n\nÎntrebarea 75 din 134" }, { "nr": 75, "tema": "Gestiunea comercială și financiară a întreprinderii", "intrebare": "Ce transporturi de mărfuri sunt stabilite a se efectua în sistemul de tranzit comunitar intern al mărfurilor, conform procedurii T1​?", "raspuns": "Procedura T1 se aplică transportului mărfurilor necomunitare între două puncte situate pe teritoriul vamal al Uniunii Europene. Acest regim suspendă plata taxelor vamale la import, a altor taxe și a măsurilor de politică comercială, până în momentul în care mărfurile ajung la destinația finală din cadrul Uniunii.\n\nÎntrebarea 76 din 134" }, { "nr": 76, "tema": "Gestiunea comercială și financiară a întreprinderii", "intrebare": "Ce transporturi de mărfuri sunt stabilite a se efectua în sistemul de tranzit comunitar intern al mărfurilor, conform procedurii T2​?", "raspuns": "Regimul T2 se folosește pentru mărfuri unionale (adică deja în liberă circulație în UE). Aceste mărfuri pot circula între două puncte din Uniunea Europeană, chiar dacă trec printr-o țară din afara UE, fără să-și piardă statutul de marfă unională.\n\nRegimul T2 se aplică, de asemenea, mărfurilor care circulă din Uniune către o țară de tranzit comun, care urmează regimul de export.\n\nRegimul T2 nu se aplică dacă transportul este făcut integral pe cale maritimă sau aeriană.\n\nÎntrebarea 77 din 134" }, { "nr": 77, "tema": "Accesul la piață", "intrebare": "În conformitate cu Manualul de utilizare a contigentului de autorizații CEMT cât timp se păstrează în carnetul de drum foile de proces verbal?
