(Pentru un răspuns corect precizați ce se face cu foaia de proces verbal după expirarea termenului de păstrare în carnetul de drum, în cazul utilizării unei autorizații multilaterale CEMT cu valabilitate pentru anul calendaristic curent).", "raspuns": "Filele completate ale carnetului de drum (prima filă original, de culoare verde, cu scrisul în original) trebuie păstrate în carnetul de drum până la expirarea perioadei de valabilitate a autorizației CEMT corespunzătoare. Pe baza datelor cuprinse în filele respective, operatorul de transport întocmește raportul lunar privind utilizarea autorizațiilor CEMT anuale.\n\nFILELE DIN CARNETELE DE DRUM CEMT NU SE MAI TRANSMIT LA SEDIUL M.T.I. !\n\nRaportarea curselor se face prin aplicația dedicată gestionată de Autoritatea Rutieră Română (ARR): [http://cemt.arr.ro/](http://cemt.arr.ro/). Obligația raportării electronice implică și transmiterea copiilor scanate a foilor de drum CEMT care fac obiectul raportării respective.\n\nRaportarea curselor efectuate într-o lună calendaristică se face în termen de cel mult 30 de zile de la expirarea lunii de raportare.\n\nÎn cazul în care o cursă începe într-o lună și se termină în luna următoare, raportarea cursei respective se face în luna și pentru luna în care cursa se termină.\n\nOperatorii de transport deținători de autorizații CEMT vor păstra, de asemenea, la sediul lor, în tot anul calendaristic următor, carnetele de drum cu filele originale, corespunzătoare autorizațiilor CEMT repartizate în anul precedent.\n\nOperatorii de transport deținători de autorizații CEMT vor pune la dispoziția Direcției Transport Rutier din cadrul M.T., la solicitarea acestuia, carnetele de drum care fac obiectul perioadei obligatorii de păstrare menționată anterior.\n\nÎntrebarea 78 din 134" }, { "nr": 78, "tema": "Accesul la piață", "intrebare": "În ce situații o autorizație CEMT nu este valabilă? (Pentru un răspuns corect menționați minim patru de astfel de situații.)", "raspuns": "Autorizațiile CEMT se consideră nevalabile în următoarele cazuri:\n\n• pe autorizația CEMT nu figurează una din următoarele mențiuni obligatorii:\n\n• denumirea și adresa completă a operatorului de transport rutier;\n\n• semnătura și ștampila organului emitent;\n\n• datele referitoare la începutul perioadei de valabilitate și sfârșitul perioadei de  valabilitate a autorizației CEMT; \n\n• data de eliberare a autorizației CEMT.\n\n• autorizația CEMT nu este însoțită de carnetul de drum completat corespunzător;\n\n• autorizațiile CEMT nu sunt însoțite de certificatele valabile care să ateste conformitatea cu tipul autorizațiilor respective; \n\n• autorizația CEMT prezintă deteriorări, ștersături, astfel încât elementele de identificare sunt ilizibile;\n\n• autorizația CEMT se utilizează pentru efectuarea transporturilor rutiere de mărfuri cu încălcarea prevederilor referitoare la restricțiile în utilizarea autorizațiilor CEMT; \n\n• autorizația CEMT se utilizează pentru derularea a mai mult de 3 curse consecutive, cu încărcătură, între statele CEMT, fără întoarcerea, în intervalul respectiv, pe teritoriul statului de înmatriculare.\n\nÎntrebarea 79 din 134" }, { "nr": 79, "tema": "Accesul la piață", "intrebare": "Care sunt cerințele pe care trebuie să le îndeplinească vehicule, conform Convenției TIR, pentru a fi agreate la transportul internațional de mărfuri sub sigiliul vamal, dacă se ia în considerare compartimentul destinat încărcăturii? (Menționați, pentru un răspuns corect, minim trei cerințe).", "raspuns": "Pot fi agreate pentru transportul internațional de mărfuri sub sigiliu vamal numai vehiculele ale căror compartimente rezervate încărcăturii sunt construite și echipate astfel încât:\n\n• nici o marfă să nu poată fi scoasă sau introdusă din partea sigilată a vehiculului fără a lăsa urme vizibile de efracție sau fără ruperea sigiliului vamal;\n\n• sigiliul vamal să poată fi aplicat într-un mod simplu și eficace;\n\n• să nu aibă un spatii ascunse care să permită dosirea mărfurilor;\n\n• toate spațiile susceptibile de a conține mărfuri să fie ușor accesibile pentru controlul vamal.\n\nÎntrebarea 80 din 134" }, { "nr": 80, "tema": "Accesul la piață", "intrebare": "Care sunt condițiile și cerințele minimale de autorizare a persoanelor fizice sau juridice pentru a putea utiliza carnetul TIR, conform prevederilor Convenției TIR? (Pentru un răspuns corect menționați minim patru condiții sau cerințe minimale).", "raspuns": "Condițiile și cerințele minimale pe care trebuie să le respecte persoanele care doresc să acceadă la regimul TIR sunt:\n\n• să facă dovada experienței sau a capacității de a efectua cu regularitate transporturi internaționale (deținătorul unei licențe comunitare, etc.);\n\n• bonitate financiară;\n\n• să facă dovada cunoașterii modului în care se aplică Convenția TIR;\n\n• lipsa unor abateri grave sau repetate de la legislația vamală sau fiscală.\n\nÎntrebarea 81 din 134" }, { "nr": 81, "tema": "Accesul la piață", "intrebare": "Când se consideră că o societate comercială nu utilizează în mod regulat regimul TIR?", "raspuns": "Se consideră că o societate comercială nu folosește în mod regulat regimul TIR, în situația în care asociația sa garantă nu i-a mai eliberat carnete TIR în ultimele 12 luni​.\n\nÎntrebarea 82 din 134" }, { "nr": 82, "tema": "Accesul la piață", "intrebare": "Aveți dreptul sa efectuați cele două transporturi? Dacă ați face numai transportul pe traseul Salzburg – Graz în ce perioadă maximă de timp, trebuie efectuat acesta?", "raspuns": "Nu avem dreptul să efectuăm ambele transporturi. Dacă efectuăm doar unul dintre cele două transporturi, trebuie să îl efectuăm în maxim 3 zile.\n\nÎntrebarea 83 din 134" }, { "nr": 83, "tema": "Accesul la piață", "intrebare": "Aveți dreptul să efectuați cele două transporturi? Dacă ați face numai transportul pe ruta Linz - Graz în ce perioadă maximă de timp, trebuie efectuat acesta?", "raspuns": "Cele două transporturi pot fi efectuate. Transportul Linz - Graz trebuie efectuat în termen de maxim 7 zile de la descărcarea la Linz.\n\nÎntrebarea 84 din 134" }, { "nr": 84, "tema": "Accesul la piață", "intrebare": "După ce perioada de timp întreprinderea și/sau managerul de transport care și-au/și-a pierdut buna reputație pentru încălcările grave prevăzute în anexa nr. IV la Regulamentul (CE) nr. 1.071/2009 fiind declarate/declarat inapte/inapt conform art. 14 din Regulamentul (CE) nr. 1.071/2009, pot/poate fi reabilitate/reabilitat?", "raspuns": "Buna reputație se poate redobândi după perioada de 1 an de la pierderea ei, atât de întreprindere, cât și de managerul de transport.\n\nÎntrebarea 85 din 134" }, { "nr": 85, "tema": "Accesul la piață", "intrebare": "Ce sisteme de tranzit al mărfurilor se pot folosi în cadrul Uniuni Vamale Europene la care România a aderat și pentru ce transporturi de mărfuri sunt stabilite a se utiliza acestea? Pentru un răspuns corect precizați două sisteme de tranzit ce se pot utiliza.", "raspuns": "În cadrul Uniuni Vamale Europene la care România a aderat se pot folosi:\n\n• Sistemul de Tranzit Comunitar T 1, pentru bunurile necomunitare ce se transportă între două birouri vamale ale Uniunii Europene;\n\n• Sistemul de Tranzit Comun T2, pentru bunurile comunitare ce se transportă între două birouri vamale ale Uniunii Europene, fiind extins ulterior și țârilor AELS și grupului Vişegrad.\n\nÎntrebarea 86 din 134" }, { "nr": 86, "tema": "Accesul la piață", "intrebare": "Ce documente trebuie să dețină conducătorul auto la bordul cisternei cu care efectuează un transport de motorină, între Ploiești și București dacă acesta nu este resortisant al unui stat membru al Uniunii? Obs. Se va avea în vedere și ce aparat tahograf este montat pe cisternă, sau pe alte vehicule cu care se transportă diferite mărfuri generale sau periculoase.", "raspuns": "• Legitimația de serviciu valabilă a conducătorului auto;\n\n• Certificatul de competență profesională a conducătorului auto (CPI dacă a obținut categoria C după data de 09.09.2009 și este la prima atestate, sau CPC dacă a obținut categoria C înainte de data de 09.09.2009 sau a obținut categoria C după această dată și este la a doua atestare);\n\n• Certificatul de competentă profesională ADR (specializarea cisterne);\n\n• Atestatul de conducător auto pentru cetățenii neresortisanti ai UE;\n\n• Cardul tahografic al conducătorului auto, dacă vehiculul este dotat cu tahograf digital sau dacă in ultimele 56 de zile a condus vehicule cu tahograf digital;\nNOTĂ: Începând cu 31 decembrie 2024, conform modificărilor aduse de Regulamentul (UE) 2020/1054 la Regulamentul (CE) nr. 561/2006, conducătorii auto sunt obligați să păstreze și să prezinte, la cererea autorităților de control, orice informație înregistrată manual și orice document imprimat în timpul zilei în curs și pe parcursul celor 56 de zile precedente. Anterior acestei modificări, conducătorii auto erau obligați să păstreze și să prezinte înregistrările tahografice pentru ziua în curs și pentru cele 28 de zile anterioare.\n\n• Actul din care reiese dreptul la muncă în RO al conducătorului auto;\n\n• Copia conformă a licenței comunitare;\n\n• Documentul de transport: scrisoarea CMR;\n\n• Instrucțiunile scrise (fișa de siguranță) pentru transportul produselor periculoase;\n\n• Contractul de închiriere/leasing al vehiculului în original sau în copie conformă cu originalul;\n\n• Certificatul de agreare al cisternei.\n\nÎntrebarea 87 din 134" }, { "nr": 87, "tema": "Accesul la piață", "intrebare": "Ce documente trebuie să transmită operatorul de transport care deține o licență comunitară și la care agenție teritorială a Autorității Rutiere Române – ARR, dacă acesta este înregistrat ca societate comercială în județul Prahova iar sediul unde acesta își păstrează documentele și în care aceasta desfășoară activitatea administrativă și operativă în legătură cu transportul rutier este la un punct de lucru din municipiul București, în situația în care dorește să efectueze transport de mărfuri periculoase cu vehiculele pe care le deține conform datelor menționate anterior, după obținerea licenței comunitare?", "raspuns": "În vederea efectuării transportului rutier de mărfuri periculoase, operatorul de transport rutier va depune sau va transmite prin poștă, cu confirmare de primire, la A.R.R. agenția București, următoarele documente:\n\n• dovada angajării, decizia de numire și certificatul de atestare profesională a consilierului de siguranță;\n\n• certificatul de agreare eliberat de Regia Autonomă \"Registrul Auto Român\", pentru vehiculele pentru care este necesar a se elibera respectivul certificat (cisterne sau vehicule ce transporta mărfuri din clasa 1);\n\n• certificatul de atestare profesională al conducătorului auto, specific mărfurilor periculoase care vor fi transportate;\n\n• autorizația eliberată de Comisia Națională pentru Controlul Activităților Nucleare, pentru vehiculele care transportă mărfuri periculoase din clasa 7;\n\n• certificatul de inspecție tehnică, în cazul suprastructurilor specializate pentru transportul recipientelor cu gaze lichefiate sau cu alte mărfuri periculoase.\n\nÎntrebarea 87 din 134" }, { "nr": 88, "tema": "Accesul la piață", "intrebare": "Ce documente trebuie să depuneți și la care agenție teritorială a Autorității Rutiere Române – ARR în vederea obținerii licenței comunitare, dacă întreprinderea este înregistrată în municipiul București și are două puncte de lucru în județul Prahova, iar sediul unde întreprinderea își păstrează documentele și în care aceasta desfășoară activitatea administrativă și operativă în legătura cu transportul rutier este la un punct de lucru din județul Prahova?", "raspuns": "Pentru obținerea licenței comunitare și a copiilor conforme ale acesteia, întreprinderea va depune sau va transmite prin poștă, cu confirmare de primire, la Autoritatea Rutieră Română - A.R.R. din județul Prahova, o cerere însoțită de următoarele:\n\n• documente care atestă înregistrarea la Oficiul Național al Registrului Comerțului, supunerea la impozit pe profit/venit și, după caz, codul de TVA;\n\n• document doveditor privind deținerea sediului;\n\n• cartea de identitate a vehiculului, certificatul de înmatriculare și dovada efectuării ITP în termen de valabilitate;\n\n• document privind asigurarea întreținerii tehnice a vehiculelor rutiere utilizate;\n\n• cazierul judiciar și declarație pe propria răspundere a managerului de transport, din care să reiasă că nu a fost sancționat pentru încălcările grave ale normelor de transport;\n\n• cazierul judiciar și declarație pe propria răspundere a întreprinderii din care să reiasă că nu a fost sancționată pentru încălcările grave ale normelor de transport;\n\n• document privind îndeplinirea condiției de capacitate financiară;\n\n• certificatul de competentă profesională al managerului de transport;\n\n• dovada plății tarifului de eliberare a licenței și a copiei conforme a acesteia.\n\nÎntrebarea 89 din 134" }, { "nr": 89, "tema": "Accesul la piață", "intrebare": "Ce condiții trebuie să îndeplinească o întreprindere care efectuează transport rutier internațional de mărfuri contra cost, pentru a se considera respectată cerința privind bună reputație?", "raspuns": "Se consideră îndeplinită cerința privind buna reputație, dacă:\n\n• întreprinderea sau managerul de transport nu au suferit condamnări sau sancțiuni pentru încălcarea normelor în vigoare privind dreptul comercial, circulația rutieră sau normele de transport;\n\n• dacă managerul de transport și-a pierdut buna reputație, a fost declarat inapt dar a intervenit reabilitarea.\n\nÎntrebarea 90 din 134" }, { "nr": 90, "tema": "Accesul la piață", "intrebare": "Menționați cinci abateri grave, care fac referire la timpii de conducere și odihnă, utilizarea aparatelor tahograf și cartelelor tahograf de către conducătorii auto, cuprinse în această anexă.", "raspuns": "Conform prevederilor din Anexa IV din Regulamentul (CE) nr. 1071/2009:\n\n• Depășirea timpului de conducere de șase zile sau de două săptămâni;\n\n• Depășirea timpului maxim de conducere zilnic fără o pauză corespunzătoare;\n\n• Lipsa tahografului sau a unui dispozitiv de limitare a vitezei la bordul vehiculului;\n\n• Utilizarea unui echipament fraudulos capabil să modifice înregistrările tahografului sau ale limitatorului de viteză;\n\n• Falsificarea diagramelor tahograf sau a datelor descărcate de pe tahograf sau de pe cartela conducătorului auto;\n\n• Conducerea, de către un conducător auto care folosește o cartelă falsificată, al cărei posesor nu este sau care a fost obținută pe baza unor declarații false.\n\nÎntrebarea 91 din 134" }, { "nr": 91, "tema": "Accesul la piață", "intrebare": "Menționați cinci abateri grave, care nu fac referire la timpii de conducere și odihnă, utilizarea aparatelor tahograf și cartelelor tahograf de către conducătorii auto, cuprinse în această anexă.", "raspuns": "Conform prevederilor din Anexa IV din Regulamentul (CE) nr. 1071/2009:\n\n• Conducerea autovehiculului fără un certificat valabil de inspecție tehnică, dacă un astfel de document este solicitat de legislația comunitară\n\n• Conducerea autovehiculului cu o deficiență foarte serioasă la nivelul sistemului de frânare, al mecanismului de direcție, al roților/pneurilor, al suspensiei sau al șasiului și care determină decizia de imobilizare a vehiculului\n\n• Transportul de persoane sau de marfă fără a deține un permis de conducere valabil\n\n• Transportul de persoane sau de marfă de către o întreprindere care nu este deținătoarea unei licențe comunitare valabile\n\n• Transportul de mărfuri cu depășirea masei maxime autorizate a vehiculului\n\n• Transportarea de mărfuri periculoase pentru care transportul este interzis sau cu vehicule nemarcate, dacă se ia decizia imobilizării vehiculului.\n\nÎntrebarea 92 din 134" }, { "nr": 92, "tema": "Accesul la piață", "intrebare": "Ce condiții trebuie să îndeplinească întreprinderea pentru a se considera îndeplinită cerința privind sediul?", "raspuns": "Conform art. 13 (modificat prin O.G. nr. 12/31.01.2022), cerința unui sediu real și stabil pe teritoriul României este îndeplinită numai dacă întreprinderea îndeplinește cumulativ următoarele:\n\n• Sediu în România + păstrarea documentelor la sediu: are un sediu pe teritoriul României, în incinta căruia păstrează originale (pe suport electronic sau fizic) ale principalelor documente: contracte de transport, documente ale vehiculelor, documente contabile, de personal și contracte de muncă, asigurări sociale, alocări și detașări conducători auto, cabotaj, durate de conducere și repaus etc., la care I.S.C.T.R. trebuie să aibă acces;\n\n• Întoarcerea vehiculelor în 8 săptămâni: organizează activitatea astfel încât vehiculele folosite în transport internațional să revină la unul dintre centrele operaționale din România în cel mult 8 săptămâni de la plecare;\n\n• Înregistrare legală: este înregistrată la Oficiul Național al Registrului Comerțului;\n\n• Regim fiscal în România: este supusă impozitului pe profit/venit și, după caz, deține cod de înregistrare în scopuri de TVA dacă i se aplică art. 316 din Codul fiscal;\n\n• Vehicule înmatriculate/autorize în România: dispune de unul sau mai multe vehicule înmatriculate ori puse în circulație și autorizate pentru utilizare în România (proprietate, rate, închiriere sau leasing;\n\n• Activitate efectivă și permanentă în România: își desfășoară efectiv și permanent activitățile administrative și comerciale la sediul din România și își gestionează operațiunile de transport în mod efectiv și permanent din România, folosind echipamente tehnice corespunzătoare.\n\n• Resurse permanente proporționale cu volumul: are la dispoziție în permanență și în mod obișnuit un număr de vehicule (conforme punctului 5) și conducători auto al căror loc de staționare obișnuit este la un centru operațional din România; numărul lor este proporțional cu volumul operațiunilor de transport.\n\nCerința privind sediul este considerată îndeplinită doar dacă toate condițiile de mai sus (punctele 1-7) sunt respectate cumulativ. Neîndeplinirea oricăreia dintre ele duce la neîndeplinirea cerinței privind sediul.\n\nÎntrebarea 93 din 134" }, { "nr": 93, "tema": "Accesul la piață", "intrebare": "Ce obligație are un manager de transport dacă în ultimi cinci ani nu a mai condus o întreprindere de transport rutier de marfă, în conformitate OG nr. 27/2011 privind transporturile rutiere, cu modificările și completările ulterioare?", "raspuns": "Deținătorii de certificate de competentă profesională care nu au mai condus o întreprindere de transport rutier de marfă sau o întreprindere de transport rutier de persoane în ultimii 5 ani au obligația de a urma cursuri de pregătire profesională periodică, care se finalizează printr-o evaluare privind actualizarea cunoștințelor.\n\nÎntrebarea 94 din 134" }, { "nr": 94, "tema": "Accesul la piață", "intrebare": "Ce condiții trebuie să îndeplinească o întreprindere care efectuează transport rutier internațional de mărfuri contra cost, pentru a se considera respectată cerința privind competența profesională?", "raspuns": "Se consideră îndeplinită cerința privind competența profesională, dacă întreprinderea care exercită ocupația de operator de transport rutier desemnează o persoană fizică ca manager de transport și care îndeplinește cumulativ următoarele condiții:\n\n• este titulară a certificatului de competentă profesională;\n\n• îndeplinește cerința de bună reputație;\n\n• conduce permanent și efectiv activitățile de transport ale întreprinderii;\n\n• este angajat, director, proprietar sau acționar al întreprinderii;\n\n• este rezidentă în Uniunea Europeană.\n\nÎntrebarea 95 din 134" }, { "nr": 95, "tema": "Accesul la piață", "intrebare": "Ce documente are obligația operatorul de transport rutier, conform legislației în vigoare, să dețină la sediul situat pe teritoriul României în incinta căruia își păstrează documentele de lucru? (Pentru un răspuns corect precizați minim trei astfel de documente, cu excepția cărților de identitate ale vehiculelor, avizele medicale și psihologice valabile pentru persoanele cu funcții care concură la siguranța circulației, toate documentele din care reiese menținerea condițiilor de acces la profesie și la piață, documentele doveditoare din care să rezulte angajarea în condiții legale a persoanelor cu funcții care concură la siguranța circulației).", "raspuns": "Pentru operatorul de transport marfă:\n\n• formularul de expediție și formularul pentru aprobarea transportului de deșeuri, pentru anul în curs și anul precedent;\n\n• tichetele de cântar pentru anul în curs și anul precedent;\n\n• autorizațiile speciale de transport AST privind transportul mărfurilor indivizibile cu depășirea maselor și/sau dimensiunilor maxime admise;\n\n• scrisorile de transport (C.M.R.), pentru anul în curs și anul precedent;\n\n• documentele privind întreținerea vehiculelor pentru o perioadă de 18 luni, care să conțină minimum informațiile privind: informări legate de sesizările conducătorilor auto privind starea tehnică a vehiculului, rezoluții ale managerului de transport, modalitatea de soluționare și documente justificative, după caz.\n\nÎntrebarea 96 din 134" }, { "nr": 96, "tema": "Standarde tehnice și aspecte tehnice ale funcționării", "intrebare": "În cazul transporturilor efectuate contra cost în baza Acordului cu privire la transportul internațional de produse perisabile (ATP), când se face controlului conformității cu Normele pentru mijloacele de transport izoterme, refrigeratoare, frigorifice sau calorice ? (Precizați minim două situații în care se face acest control).", "raspuns": "Controlul se va efectua:\n\n• înaintea puneri în exploatare a mijlocului de transport;\n\n• periodic, cel puțin o data la șase ani;\n\n• de fiecare data când autoritatea competenta a țării unde este înmatriculat mijlocul de transport o solicită.\n\nÎntrebarea 97 din 134" }, { "nr": 97, "tema": "Standarde tehnice și aspecte tehnice ale funcționării", "intrebare": "Care sunt indicațiile minimale pe care trebuie să le conțină mărcile de identificare montate pe un furgon izoterm? (Precizați minim patru astfel de indicații, pentru un răspuns corect).", "raspuns": "Furgoanele izoterme sau mijloacele de transport izoterme, refrigeratoare, frigorifice sau calorice și dispozitivul lor termic vor trebui dotate fiecare, în mod permanent, prin grija constructorilor, cu mărci de identificare cuprinzând indicații minimale, după cum urmează:\n\n• denumirea ATP;\n\n• țara constructorului sau literele folosite în circulația rutieră internațională;\n\n• numele sau firma constructorului;\n\n• numărul de serie;\n\n• luna și anul de fabricație.\n\nÎntrebarea 98 din 134" }, { "nr": 98, "tema": "Standarde tehnice și aspecte tehnice ale funcționării", "intrebare": "Care sunt obligațiile utilizatorului în cazul unui transport de bunuri divizibile? (Pentru un răspuns corect precizați minim trei obligații ale utilizatorului).", "raspuns": "Obligațiile utilizatorului sunt următoarele:\n\n• să nu transporte bunuri divizibile de la furnizorii care nu cântăresc sau nu eliberează tichet de cântar pentru toate vehiculele\n\n• să comunice furnizorului, în scris, valorile maselor totale maxime admise pentru vehiculele utilizate\n\n• să transbordeze încărcătura, pe propria cheltuială, în unul sau mai multe vehicule, astfel încât să fie respectate masele pe axe maxime admise în situația în care se constată de către personalul de control circulația vehiculelor cu depășirea maselor maxime pe axe\n\n• să nu transporte materiale vrac cu vehicule din dotarea cărora le lipsește prelata, iar în cazul în care vehiculele sunt prevăzute prin construcție cu obloane, acestea trebuie să fie asigurate cu sisteme de închidere care să asigure etanșeitatea.\n\nÎntrebarea 99 din 134" }, { "nr": 99, "tema": "Standarde tehnice și aspecte tehnice ale funcționării", "intrebare": "În baza cărui document operatorul de transport rutier poate efectua transportul de mărfuri care nu sunt indivizibile și ce condiții trebuie îndeplinite cumulativ pentru eliberarea acestuia, dacă este depășită cel puțin una dintre masele sau dimensiunile maxime admise, conform prevederilor din Ordonanța nr. 43/1997 privind regimul drumurilor, cu modificările și completările ulterioare? Pentru un răspuns corect precizați minim patru dintre aceste condiții.", "raspuns": "Circulația pe drumurile publice a vehiculelor rutiere, înmatriculate sau înregistrate în România sau în alte state, cu depășirea masei totale maxime admise, maselor maxime admise pe axe și/sau a dimensiunilor maxime admise se poate efectua numai în baza autorizației speciale de transport, AST, eliberată în prealabil.\n\nAutorizația specială de transport AST se eliberează pentru transporturi de mărfuri care nu sunt indivizibile, dacă este depășită cel puțin una dintre masele sau dimensiunile maxime admise și sunt îndeplinite, cumulativ, următoarele condiții:\n\n• masa totală să nu depășească cu mai mult de 25% masa totală maximă admisă;\n\n• masa pe axe să nu depășească masa maximă ce poate fi autorizată;\n\n• lungimea să nu depășească cu mai mult de 3,0 metri lungimea maximă admisă;\n\n• lățimea să nu depășească 3,20 metri;\n\n• să nu fie depășită înălțimea maximă admisă.\n\nÎntrebarea 100 din 134" }, { "nr": 100, "tema": "Standarde tehnice și aspecte tehnice ale funcționării", "intrebare": "Pentru care categorii de autovehicule este obligatorie dotarea cu limitatoare de viteză?", "raspuns": "Pentru autovehiculele ori ansamblurile de vehicule destinate transportului rutier de mărfuri a căror masă totală maximă autorizată este mai mare de 3,5 tone și pentru autovehiculele destinate transportului de persoane având mai mult de 9 locuri pe scaune, inclusiv locul conducătorului auto.\n\nÎntrebarea 101 din 134" }, { "nr": 101, "tema": "Standarde tehnice și aspecte tehnice ale funcționării", "intrebare": "Operatorul de transport rutier este obligat să dețină la sediu declarat, în incinta căruia își păstrează principalele documente de lucru și documentele privind întreținere vehiculelor utilizate la efectuarea transporturilor rutiere. Care sunt informațiile minime pe care le cuprind și pentru care interval de timp​?", "raspuns": "Documentele privind întreținerea vehiculelor se păstrează pentru o perioadă de 18 luni și trebuie să conțină minimum informațiile privind:\n\n• sesizările conducătorilor auto privind starea tehnică a vehiculului;\n\n• rezoluții ale managerului de transport;\n\n• modalitatea de soluționare;\n\n• documente justificative.\n\nÎntrebarea 102 din 134" }, { "nr": 102, "tema": "Standarde tehnice și aspecte tehnice ale funcționării", "intrebare": "Ce obligație are un operator de transport rutier, conform legislației în vigoare, în ceea ce privește aparatul tahograf și limitatorul de viteză montat pe vehiculele cu care efectuează transport rutier de marfă? Precizați minim două obligații pentru un răspuns corect. Cum se sancționează, conform legislației în vigoare din domeniul transporturilor rutiere plecarea în cursă cu aparatul tahograf sau limitatorul de viteză ne funcționale?", "raspuns": "• să monteze, numai prin agenți economici autorizați, aparate tahograf și limitatoare de viteză la vehiculele pentru care acestea sunt obligatorii;\n\n• să nu permită plecarea în cursă a vehiculelor care au tahograful/limitatorul de viteză defect;\n\n• să nu permită intervenția persoanelor neautorizate asupra limitatoarelor de viteză și/sau asupra aparatelor tahograf.\n\nPlecarea în cursă cu aparatul tahograf sau limitatorul de viteză nefuncționale este abatere foarte gravă și se sancționează cu amendă contravențională și suspendarea atestatului/certificatului care atestă competența/calificarea profesională a conducătorului auto.\n\nÎntrebarea 103 din 134" }, { "nr": 103, "tema": "Standarde tehnice și aspecte tehnice ale funcționării", "intrebare": "Care dintre autovehiculele din dotarea întreprinderii trebuie să fie dotate cu tahograf și cu ce tip de aparat tahograf se înlocuiește un tahograf defect care nu se mai poate repara, aflat în dotarea unei autocisterne care are MTMA de 16 tone, în cazul în care se efectuează transport rutier de mărfuri contra cost cu toate vehiculele deținute? (Justificați răspunsul prin indicarea tipurilor de aparate tahograf cu care sunt echipate autovehiculele la care este obligatorie dotarea cu tahograf, în condițiile în care aparatele tahograf ce echipează autovehiculele sunt cele originale cu care acestea au fost livrate de către constructor).", "raspuns": "Toate autovehiculele care au MTMA mai mare de 3,5t trebuie dotate cu aparate tahograf, inclusiv ansamblele de vehicule a căror MTMA depășește 3,5t.\n\nAutovehiculele sau ansamblele de vehicule menționate mai sus, care sunt fabricate până în anul 2006 inclusiv sunt dotate din fabrică cu tahografe analogice, iar cele fabricate începând cu anul 2007 sunt dotate din fabrică cu tahografe digitale.\n\nDupă defectarea unui tahograf (indiferent că este analogic sau digital) acesta va fi înlocuit în mod obligatoriu cu un tahograf digital.\n\nÎntrebarea 104 din 134" }, { "nr": 104, "tema": "Standarde tehnice și aspecte tehnice ale funcționării", "intrebare": "În conformitate cu prevederile legale în vigoare precizați pe ce sectoare de drum circulația autovehiculelor cu mase și/sau gabarite depășite nu este permisă?", "raspuns": "Este interzisă circulația autovehiculelor cu mase și/sau gabarite depășite în conformiate cu prevederle legale în vigore :\n\n• pe sectoarele de drum unde sunt instalate indicatoare de interzicere, restricție sau limitare a accesului acestora, dacă vehiculul sau ansamblul de vehicule atinge ori depășește lățimea, înălțimea, lungimea sau masele pe axe ori masa totală maximă admisă\n\n• când vizibilitatea este redusă sau partea carosabilă este acoperită cu polei, gheață sau zăpadă.\n\nÎntrebarea 105 din 134" }, { "nr": 105, "tema": "Standarde tehnice și aspecte tehnice ale funcționării", "intrebare": "Care sunt documentele ce trebuie prezentate la stația de inspecție tehnică în vederea executării acesteia?", "raspuns": "Documentele ce trebuie prezentate la stația de inspecție tehnică în vederea executării acesteia sunt:\n\n• certificatul de înmatriculare sau dovada înlocuitoare a certificatului de înmatriculare, eliberată de autoritățile competente și completată în mod corespunzător cu datele necesare identificării sau, după caz, autorizația provizorie de circulație;\n\n• asigurare RCA valabilă\n\n• cartea de identitate a vehiculului.\n\n• carte de identitate a persoanei care prezintă autovehiculul la inspecție.\n\nÎntrebarea 106 din 134" }, { "nr": 106, "tema": "Standarde tehnice și aspecte tehnice ale funcționării", "intrebare": "Câte depășiri ale maselor maxime admise s-au înregistrat și care sunt acestea? Cum se sancționează abaterile constatate și în ce condiții se poate relua deplasarea?", "raspuns": "S-au înregistrat 2 depășiri ale maselor maxime admise:\n\n• pe axa spate (13 tone în loc de 11.5)\n\n• masa totală maximă ansamblu de vehicule ( 45 în loc de 40 tone).\n\nAceste depășiri se sancționează cu amendă contravențională și imobilizarea ansamblului.\n\nSe poate relua deplasarea doar după reașezarea mărfii în vehicul pentru nu mai depăși masa pe axa motoare și după descărcarea surplusului de 5t pentru a nu depăși masa totală admisă." }, { "nr": 107, "tema": "Standarde tehnice și aspecte tehnice ale funcționării", "intrebare": "În conformitate cu prevederile OMLPTL nr. 458/2002 pentru aprobarea Normelor metodologice privind clasificarea pe categorii a autobuzelor și microbuzelor utilizate pentru transporturile publice de persoane prin servicii regulate în trafic național, cu modificările și completările ulterioare, precizați care sunt documentele necesare a fi depuse la Registrul Auto Român – RAR în vederea efectuării operațiunilor de clasificare a autocarelor pe care le deține operatorul de transport rutier?", "raspuns": "Documentele  necesare clasificării sunt:\n\n• cererea de clasificare completată de către deținător;\n\n• copie conformă a licenței comunitare;\n\n• copie de pe cartea de identitate a vehiculului;\n\n• copie de pe certificatul de înmatriculare cu inspecția tehnică periodică valabilă;\n\n• copie de pe contractul (leasing, închiriere) încheiat între titularul licenței comunitare și deținătorul autobuzului/ microbuzului, după caz.\n\nÎntrebarea 108 din 134" }, { "nr": 108, "tema": "Standarde tehnice și aspecte tehnice ale funcționării", "intrebare": "Indicați prin ce măsuri se sancționează cele constatate cu ocazia controlului în trafic în conformitate cu prevederile din legislația specifică din domeniul transporturilor rutiere.", "raspuns": "Această abatere se sancționează prin amendă contravențională și suspendarea dreptului de a circula cu vehiculul respectiv, prin reținerea certificatului de înmatriculare și a plăcuțelor de înmatriculare, și anularea ITP-ului.\n\nÎntrebarea 109 din 134" }, { "nr": 109, "tema": "Standarde tehnice și aspecte tehnice ale funcționării", "intrebare": "În ce situații, conform prevederilor legale în vigoare, aveți obligația de a prezenta la o reprezentanță a RA Registrul Auto Român - RAR, autovehiculul sau ansamblul de vehicule conform structurii parcului auto pe care-l are în dotare operatorul de transport, pentru efectuarea inspecției tehnice periodice (ITP)? Obs. Se va lua în calcul și situația în care operatorul a fost sancționat pentru circulația cu ITP expirat, constatarea unor defecțiuni grave la diverse sisteme ale vehiculului, transport mărfuri periculoase, etc.", "raspuns": "Aveți obligația de a vă prezenta la RAR pentru efectuarea ITP în următoarele situații:\n\n• când vehiculele sunt agreate pentru transportul de mărfuri periculoase;\n\n• când vehiculele sunt destinate exclusiv transportului de butelii de gaze;\n\n• când remorcile-cisternă lente sunt destinate transportului de mărfuri periculoase;\n\n• când sunt vehicule istorice;\n\n• când autovehiculele sunt destinate competițiilor sportive;\n\n• când vehiculele au caracteristici speciale;\n\n• când vehiculele sunt înregistrate ca mașini sau utilaje autopropulsate pentru lucrări cu o viteză maximă ce depășește 25 km/h;\n\n• când vehiculele sunt radiate din evidență care au fost înmatriculate ori înregistrate anterior în România, în vederea înmatriculării sau a înregistrării acestora;\n\n• când vehiculele sunt înmatriculate în alte state;\n\n• în vederea redobândirii certificatului de înmatriculare sau a certificatului de înregistrare reținute ca urmare a circulației pe drumurile publice cu ITP expirat sau cu defecțiuni tehnice majore.\n\nÎntrebarea 110 din 134" }, { "nr": 110, "tema": "Standarde tehnice și aspecte tehnice ale funcționării", "intrebare": "Cum este definit un container, conform prevederilor Convenției TIR? (Pentru un răspuns corect menționați minim trei condiții sau cerințe minimale).", "raspuns": "Prin \"container\" se înțelege un mijloc de transport (cadru, cisternă mișcătoare sau alt mijloc asemănător):\n\n• constituit dintr-un compartiment, în întregime sau parțial închis, destinat să conțină mărfuri;\n\n• are caracter permanent, suficient de rezistent pentru a permite folosirea sa repetată;\n\n• special conceput pentru a facilita transportul mărfurilor, fără descărcare și reîncărcare;\n\n• conceput astfel încât să poată fi ușor de manipulat;\n\n• conceput astfel încât să fie ușor de încărcat și de descărcat;\n\n• cu un volum interior de cel puțin 1 metru cub.\n\nTermenul \"container\" nu cuprinde nici ambalajele uzuale, nici vehiculele.\n\nÎntrebarea 111 din 134" }, { "nr": 111, "tema": "Standarde tehnice și aspecte tehnice ale funcționării", "intrebare": "Conform legislației în vigoare în ce alte situații se impune verificarea aparatului tahograf digital? Pentru un răspuns corect menționați cel puțin trei astfel de situații?", "raspuns": "În cazul tahografelor se impune efectuarea unei verificări de către operatorii economici autorizați:\n\n• după orice reparare a tahografului;\n\n• după orice modificare a coeficientului caracteristic al autovehiculului;\n\n• după orice modificare a circumferinței efective a anvelopelor;\n\n• atunci când ceasul care indică ora universală coordonată (UTC) prezintă o eroare mai mare de 20 de minute;\n\n• atunci când s-a schimbat numărul de înmatriculare al autovehiculului.\n\nÎn cazul tahografelor digitale, verificările trebuie să includă și o calibrare.\n\nÎntrebarea 112 din 134" }, { "nr": 112, "tema": "Standarde tehnice și aspecte tehnice ale funcționării", "intrebare": "Care sunt dimensiunile maxime admise ale unui ansamblu de vehicule, utilizat la transport rutier internațional de marfă pe drumuri europene reabilitate? ( Lungime, lățime și înălțime).", "raspuns": "• Lungime maximă = 18.75 m;\n\n• Lățime = 2.55 m (2,60 m pentru cele cu caroserie izotermă);\n\n• Înălțime = 4 m.\n\nÎntrebarea 113 din 134" }, { "nr": 113, "tema": "Standarde tehnice și aspecte tehnice ale funcționării", "intrebare": "Care este masa totală maxim admisă pe un drum european, pentru un tren rutier cu patru osii, compus dintr-un autovehicul cu două osii și o remorcă cu două osii?", "raspuns": "Masa totală maxim admisă este de 36t.\n\nÎntrebarea 114 din 134" }, { "nr": 114, "tema": "Standarde tehnice și aspecte tehnice ale funcționării", "intrebare": "Care este suma maselor maxime admise pe osiile componente, în cazul unei osi triple (tridem) pentru o semiremorcă la care distanța dinte acestea este mai mică sau egală cu 1,3 metri, în cazul transporturilor efectuate pe un drum modernizat?", "raspuns": "Suma maselor maxime admise pe osiile componente, în cazul unei osii triple pentru o semiremorcă la care distanța dintre acestea este mai mică sau egală cu 1,3m pe un drum modernizat este de 19t.\n\nÎntrebarea 115 din 134" }, { "nr": 115, "tema": "Standarde tehnice și aspecte tehnice ale funcționării", "intrebare": "Cine efectuează certificarea autenticității unui vehicul destinat transportului de mărfuri, și când este obligatorie efectuarea acesteia?", "raspuns": "Certificarea autenticității se efectuează de către R.A.R pentru:\n\n• vehiculele rutiere utilizate care sunt sau au fost ultima dată înmatriculate într-un alt stat și care se supun omologării și/sau eliberării CIV în vederea înmatriculării în România;\n\n• vehiculele rutiere utilizate care nu sunt supuse înmatriculării în țara de proveniență și care se supun omologării și/sau eliberării CIV în vederea înmatriculării în România;\n\n• orice vehicul rutier, la cerere.\n\nÎntrebarea 116 din 134" }, { "nr": 116, "tema": "Siguranță rutieră", "intrebare": "Precizați minim două condiții care trebuie verificate de către operatorul de transport, după încărcarea mărfii, înainte de plecarea în cursă.", "raspuns": "Să se asigure în prealabil că vehiculul rutier cu care se efectuează transportul respectă următoarele condiții:\n\n• ușile laterale sau/și ușile din spatele vehiculului pentru încărcarea/descărcarea mărfurilor, obloanele, rampa escamotabilă, prelatele, roata de rezervă, cât și celelalte echipamente specifice vehiculului respectiv sunt bine fixate;\n\n• încărcătura nu trebuie să împiedice conducerea vehiculului în condiții de siguranță;\n\n• centrul de greutate al încărcăturii să fie cât mai aproape de centrul vehiculului rutier.\n\nSă efectueze transportul numai după ce s-a asigurat că ambalajul mărfii este destul de rezistent pentru siguranța transportului. În cazul în care ambalajul mărfii nu este destul de rezistent, va cere expeditorului o ambalare suplimentară suficient de rezistentă.\n\nÎntrebarea 117 din 134" }, { "nr": 117, "tema": "Siguranță rutieră", "intrebare": "Ce obligație au operatorii de transport rutier în ceea ce privește condițiile pe care trebuie să le îndeplinească elementele de fixare a mărfii? (Pentru un răspuns corect precizați minim trei condiții).", "raspuns": "Să se asigure că elementele de fixare a mărfii respectă următoarele condiții:\n\n• îndeplinesc corect funcțiile pentru care au fost construite;\n\n• sunt adaptate pentru fixarea mărfii respective;\n\n• nu prezintă noduri și/sau elemente deteriorate, uzate, slăbite;\n\n• sunt conforme cu standardele europene și/sau internaționale în vigoare în domeniu.\n\nÎntrebarea 118 din 134" }, { "nr": 118, "tema": "Siguranță rutieră", "intrebare": "Care este vârsta minimă pentru a conduce un autovehicul categoria C1E? (sau CE, sau D1E, sau DE)?", "raspuns": "Vârsta minimă pentru obținerea permisului de conducere este:\n\n• 18 ani împliniți, pentru categoriile C1, C1E și Tr;\n\n• 21 de ani, pentru categoriile C și CE (prin excepție, începând cu 2 februarie 2023, aceste categorii pot fi obținute și de la vârsta de 18 ani, în anumite condiții);\n\n• 21 de ani, pentru categoriile D1 și D1E;\n\n• 24 de ani, pentru categoriile D și DE (prin excepție, începând cu 2 februarie 2023, aceste categorii pot fi obținute și de la vârsta de 21 de ani, în anumite condiții);\n\n• 24 de ani, pentru categoriile Tb și Tv.\n\nÎntrebarea 119 din 134" }, { "nr": 119, "tema": "Siguranță rutieră", "intrebare": "Pentru a exercita ocupația de conducător auto, acesta trebuie să dețină un certificat de pregătire profesională. Enumerați minim cinci tipuri de certificate de pregătire profesională pentru conducătorii auto?", "raspuns": "• certificatul de calificare profesională inițială, CPI, transport marfă;\n\n• certificatul de calificare profesională inițială, CPI, transport persoane;\n\n• certificatul de calificare profesională continuă, CPC, transport marfă;\n\n• certificatul de calificare profesională continuă, CPC, transport persoane;\n\n• certificat A.D.R. (curs de bază, specializarea cisternă, specializarea clasa 1 și specializarea clasa 7);\n\n• certificat pentru transport cu troleibuzul;\n\n• certificat pentru transport de vehicule avariate.\n\nÎntrebarea 120 din 134" }, { "nr": 120, "tema": "Siguranță rutieră", "intrebare": "Când este obligatorie examinare medicală și psihologică a conducătorilor auto? (Pentru un răspuns corect precizați și periodicitatea acestor examinări, în cazul transporturilor rutiere).", "raspuns": "Examinarea medicală și psihologică este obligatorie pentru funcțiile cu atribuții în siguranța transporturilor (inclusiv conducătorii auto) și se efectuează pentru:\n\n• admiterea în unitățile de pregătire (calificare) pentru funcții cu atribuții în siguranța transporturilor;\n\n• angajarea într-o funcție cu atribuții în siguranța transporturilor;\n\n• examinarea periodică a personalului cu atribuții în siguranța transporturilor;\n\n• schimbarea funcției cu atribuții în siguranța transporturilor în cazul în care baremul medical și/sau psihologic este superior față de cel stabilit pentru funcția deținută anterior;\n\n• controlul medical și psihologic la termenele de revizuire stabilite de comisiile medicale și psihologice în siguranța transporturilor pentru personalul care a avut aviz restrictiv.\n\nPentru transportul rutier la grupa de vârstă 18 – 65 ani se vor efectua controlul medical periodic și controlul psihologic la interval de 1 an.\n\nÎntrebarea 121 din 134" }, { "nr": 121, "tema": "Siguranță rutieră", "intrebare": "Precizați ce verificări se impun a se efectua în ceea ce privește echipamentul minimal de siguranță.", "raspuns": "Se verifică dacă echipamentul minimal de siguranță conține cel puțin următoarele: extinctor, trusă medicală, triunghiuri reflectorizante, vestă reflectorizantă, cale de blocare a roților, lanternă portabilă și se găsesc la bordul vehiculului, într-un loc accesibil și cunoscut de conducătorul auto.\n\nReferitor la stingătoarele de incendiu, acestea trebuie verificate periodic de către persoane autorizate, de asemenea trebuie reîncărcate după fiecare utilizare.\n\nReferitor la trusele medicale, acestea au un termen de valabilitate limitat și trebuie înlocuite sau completate periodic.\n\nÎntrebarea 122 din 134" }, { "nr": 122, "tema": "Siguranță rutieră", "intrebare": "Precizați ce verificări se impun a se efectua în ceea ce privește conducerea preventivă, înainte de plecarea în cursă, de către conducătorul auto?", "raspuns": "Se impun următoarele verificări:\n\n• sistemul de iluminare-semnalizare: să funcționeze și să fie curat;\n\n• starea anvelopelor: gradul de uzură, presiunea, integritatea fizică (gâlme, tăieturi, rupturi);\n\n• sistemul de frânare: nivelul lichidului de frână, starea furtunelor, eficacitate;\n\n• compartimentul motor: nivelul uleiului, al lichidului de răcire, lichidul de spălat parbrizul;\n\n• caroserie: să nu lipsească elemente de caroserie, toate lăzile de depozitare să fie închise și blocate, ușile compartimentului pentru marfă să fie închise.\n\nÎntrebarea 123 din 134" }, { "nr": 123, "tema": "Siguranță rutieră", "intrebare": "În situația unui accident cu victime, precizați care ar fi procedurile de conduită pe care trebuie să le urmeze un conducător auto, angajat al operatorului de transport rutier, în vederea acordării primului ajutor?", "raspuns": "• Evitarea expunerii la risc, protecția personală și a celorlalți participanți la trafic, delimitarea zonei și alertarea autorităților.\n\n• scoaterea victimei din vehicul prin ridicare\n\n• eliberarea căilor respiratorii, asigurarea funcției respiratorie, oprirea hemoragiilor, imobilizarea fracturilor, dezinfectarea rănilor\n\n• transportul victimei la spital dacă nu există altă posibilitate de transport.\n\nÎntrebarea 124 din 134" }, { "nr": 124, "tema": "Siguranță rutieră", "intrebare": "Ce trebuie avut în vedere în ceea ce privește cercetarea conducătorului auto implicat în accident?", "raspuns": "Pentru conducătorul auto se verifică:\n\n• permisul de conducere și cartea de identitate;\n\n• certificatele de pregătire profesională;\n\n• avize medicale și psihologice;\n\n• calitatea de angajat al operatorului de transport.\n\nÎntrebarea 125 din 134" }, { "nr": 125, "tema": "Siguranță rutieră", "intrebare": "Procesul de cercetare al unui accident rutier în care a fost implicat un conducător auto mai multe etape. Ce trebuie avut în vedere în ceea ce privește cercetarea operatorului de transport implicat în accident?", "raspuns": "Pentru operatorul de transport trebuie avut în vedere:\n\n• verificarea licenței comunitare și a copiilor conforme\n\n• verificarea ITP, a RCA și a celorlalte documente prevăzute de lege\n\n• verificarea certificatelor specifice ( de agreare, de clasificare)\n\n• verificarea documentelor de transport.\n\nÎntrebarea 126 din 134" }, { "nr": 126, "tema": "Siguranță rutieră", "intrebare": "Operatorul de transport trebuie să se asigure că pe timpul transportului este realizată arimarea mărfurilor. Ce înseamnă ancorarea directă a mărfurilor?", "raspuns": "Legarea mărfurilor prin intermediul sistemelor de fixare a încărcăturii ( chingi, lanțuri, cabluri de oțel) care se prind de punctele de ancorare (zale, cârlige, inele) de pe unitățile transportoare.\n\nÎntrebarea 127 din 134" }, { "nr": 127, "tema": "Siguranță rutieră", "intrebare": "Operatorul de transport trebuie să se asigure că pe timpul transportului este realizată arimarea mărfurilor. Explicați când se aplică ancorarea directă a mărfurilor​?", "raspuns": "Ancorarea directă se aplică când sunt permise doar mișcări reduse (controlate) ale încărcăturii și pentru a crea o forță pe direcție opusă forței de inerție.\n\nÎntrebarea 128 din 134" }, { "nr": 128, "tema": "Siguranță rutieră", "intrebare": "Operatorul de transport trebuie să se asigure că pe timpul transportului este realizată arimarea mărfurilor. Ce înseamnă ancorarea pe diagonală a mărfurilor​?", "raspuns": "Unitățile de încărcătură care au puncte de ancorare rigide pot fi asigurate cu ajutorul a patru sisteme de ancorare directe. Fiecare sistem de ancorare conectează un punct de ancorare de pe încărcătură cu un punct de ancorare de pe vehicul, aproximativ în direcția diagonalelor platformei de încărcare.\n\nÎntrebarea 129 din 134" }, { "nr": 129, "tema": "Siguranță rutieră", "intrebare": "Ce înseamnă ancorarea în paralel a mărfurilor​?", "raspuns": "Pentru conectarea celor 8 puncte de ancorare de pe vehicul cu cele 8 puncte de ancorare de pe încărcătură sunt folosite 8 sisteme de ancorare.\n\nCele 8 sisteme de ancorare sunt cuplate două câte două, în paralel, și au lungimi egale.\n\nDouă sisteme de ancorare paralele împiedică deplasarea pe direcție înspre înainte, două sisteme de ancorare paralele împiedică deplasarea pe direcție înspre înapoi, iar două sunt folosite pe partea stângă și două pe partea dreaptă.\n\nÎntrebarea 130 din 134" }, { "nr": 130, "tema": "Siguranță rutieră", "intrebare": "Ce înseamnă ancorarea cu jumătate de buclă a mărfurilor?", "raspuns": "Ancorarea cu jumătate de buclă (uneori denumită ancorarea cu buclă) este metoda cea mai folosită pentru a împiedica deplasările pe transversală a pieselor lungi de încărcătură.\n\nSunt folosite cel puțin 3 și, de preferat, 4 sisteme de ancorare.\n\nFiecare sistem de ancorare începe la un punct de ancorare din apropiere a vehiculului, trece pe sub încărcătură și trece din nou peste încărcătură, și se termină în același punct de ancorare sau într-un punct de ancorare apropiat.\n\nSe recomandă utilizarea a două sisteme de ancorare în fața încărcăturii lungi și a două sisteme de ancorare aproape de capătul acesteia.\n\nDouă sisteme de ancorare încep pe partea dreaptă, iar două încep pe partea stângă.\n\nAceste sisteme de ancorare au un efect limitat asupra împiedicării alunecării încărcăturii pe direcție longitudinală.\n\nÎntrebarea 131 din 134" }, { "nr": 131, "tema": "Siguranță rutieră", "intrebare": "Ce înseamnă ancorarea elastică a mărfurilor?", "raspuns": "Ancorarea elastică poate fi folosită pentru a împiedica deplasările (alunecare și înclinare) într-o singură direcție, adeseori pe direcția înspre înainte sau înspre înapoi.\n\nUn singur sistem de ancorare începe dintr-un punct de ancorare de pe o parte a vehiculului, trece pe lângă partea frontală/posterioară a încărcăturii și este fixat pe un punct de încărcare de pe cealaltă parte a vehiculului sau de pe partea opusă a punctului de ancorare.\n\nÎntrebarea 132 din 134" }, { "nr": 132, "tema": "Siguranță rutieră", "intrebare": "Operatorul de transport trebuie să se asigure că pe timpul transportului este realizată arimarea mărfurilor. Ce condiții trebuie să respecte elementele de fixare a mărfurilor​?", "raspuns": "Elementele de fixare a mărfii trebuie să respecte următoarele condiții:\n\n• îndeplinesc corect funcțiile pentru care au fost construite;\n\n• sunt adaptate pentru fixarea mărfii respective;\n\n• nu prezintă noduri și/sau elemente deteriorate, uzate, slăbite;\n\n• sunt conforme cu standardele europene și/sau internaționale în vigoare în domeniu.\n\nÎntrebarea 133 din 134" }, { "nr": 133, "tema": "Siguranță rutieră", "intrebare": "Ce condiții trebuie să respecte sistemul de fixare a mărfurilor?", "raspuns": "Operatorul de transport trebuie să se asigure că sistemul de fixare a încărcăturii utilizat pentru înconjurarea, fixarea sau menținerea încărcăturii pe/sau într-un vehicul este adaptat la mărimea, forma, consistența și caracteristicile încărcăturii.\n\nDe asemenea, trebuie  să se asigure că dispozitivul de fixare sau de înșurubare utilizat pentru fixarea încărcăturii este fixat în așa fel încât acesta să nu poată să fie deșurubat sau desprins.\n\nDispozitivul de înșurubare integrat utilizat pentru fixarea unei încărcături trebuie să îndeplinească următoarele condiții:\n\n• să fie proiectat și construit în scopul pentru care este folosit;\n\n• să fie utilizat și întreținut conform specificațiilor producătorului și standardelor europene și/sau internaționale în domeniu.\n\nÎntrebarea 134 din 134" }, { "nr": 134, "tema": "Siguranță rutieră", "intrebare": "La ce valoare a forțelor trebuie să reziste sistemul de fixare a mărfurilor, în funcție de accelerațiile/decelerațiile la care este supus vehiculul​?", "raspuns": "Operatorul de transport trebuie să efectueze transportul asigurând un sistem de fixare a încărcăturii astfel încât acesta să reziste la forțele exercitate atunci când vehiculul este supus la următoarele accelerații:\n\n• decelerare de 0,8 x g (accelerație gravitațională) spre față;\n\n• decelerare de 0,5 x g (accelerație gravitațională) spre spate;\n\n• accelerare de 0,5 x g (accelerație gravitațională) spre ambii pereți laterali.\n\nAtunci când asupra unui element component al sistemului de fixare se exercită o forță determinată conform celor trei puncte de mai sus, forța exercitată asupra acestui element de fixare nu poate depăși sarcina nominală pentru care acesta a fost construit." }];

    // ── STATE ──
    let filtered = [...STUDII];
    let idx = 0;
    let scores = {};   // nr -> 'stiut'|'nestiut'|'skip'
    let userAnswers = {}; // nr -> string
    let revealed = false;

    // ── STORAGE ──
    function saveState() {
      try {
        localStorage.setItem('mgr_scores', JSON.stringify(scores));
        localStorage.setItem('mgr_useranswers', JSON.stringify(userAnswers));
        localStorage.setItem('mgr_idx', idx);
      } catch (e) { }
    }
    function loadState() {
      try {
        const s = localStorage.getItem('mgr_scores');
        if (s) scores = JSON.parse(s);
        const u = localStorage.getItem('mgr_useranswers');
        if (u) userAnswers = JSON.parse(u);
        const i = localStorage.getItem('mgr_idx');
        if (i) idx = Math.min(parseInt(i), filtered.length - 1);
      } catch (e) { }
    }

    // ── INIT ──
    (function init() {
      // Populate filter
      const sel = document.getElementById('tema-filter');
      const teme = [...new Set(STUDII.map(s => s.tema))];
      teme.forEach(t => {
        const opt = document.createElement('option');
        opt.value = t; opt.textContent = t;
        sel.appendChild(opt);
      });

      loadState();
      renderCard();
      updateScoreboard();

      // Keyboard shortcuts
      document.addEventListener('keydown', e => {
        if (document.activeElement.tagName === 'TEXTAREA') {
          if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
            e.preventDefault();
            if (!revealed) reveal();
          }
          return;
        }
        if (e.key === 'ArrowRight' || e.key === 'l') navigate(1);
        if (e.key === 'ArrowLeft' || e.key === 'h') navigate(-1);
        if (e.key === ' ') { e.preventDefault(); if (!revealed) reveal(); }
      });
    })();

    // ── FILTER ──
    function applyFilter() {
      const val = document.getElementById('tema-filter').value;
      filtered = val === 'toate' ? [...STUDII] : STUDII.filter(s => s.tema === val);
      idx = 0;
      renderCard();
      updateScoreboard();
    }

    function showOnlyUnseen() {
      filtered = STUDII.filter(s => !scores[s.nr] || scores[s.nr] === 'nestiut');
      idx = 0;
      document.getElementById('tema-filter').value = 'toate';
      renderCard();
      updateScoreboard();
    }

    function shuffleCards() {
      filtered = filtered.sort(() => Math.random() - 0.5);
      idx = 0;
      renderCard();
    }

    // ── RENDER ──
    function renderCard() {
      const card = filtered[idx];
      if (!card) return;

      revealed = false;
      document.getElementById('correct-wrap').style.display = 'none';
      document.getElementById('btn-reveal').disabled = false;

      // Animate
      const el = document.getElementById('main-card');
      el.style.animation = 'none';
      void el.offsetWidth;
      el.style.animation = 'cardIn .22s ease';

      document.getElementById('card-tema').textContent = card.tema;
      document.getElementById('card-nr').textContent = 'Nr. ' + card.nr;

      // Mark badge
      const mark = document.getElementById('card-mark');
      const sc = scores[card.nr];
      if (sc === 'stiut') { mark.textContent = '✅ Știut'; mark.className = 'card-mark stiut'; mark.style.display = 'inline-block'; }
      else if (sc === 'nestiut') { mark.textContent = '❌ Neștiut'; mark.className = 'card-mark nestiut'; mark.style.display = 'inline-block'; }
      else { mark.style.display = 'none'; }

      document.getElementById('card-question').textContent = card.intrebare;

      // Restore user answer if exists
      const ua = document.getElementById('user-answer');
      ua.value = userAnswers[card.nr] || '';
      ua.disabled = false;

      updateNav();
    }

    function reveal() {
      const card = filtered[idx];
      revealed = true;
      document.getElementById('btn-reveal').disabled = true;
      document.getElementById('user-answer').disabled = true;

      // Save user answer
      const ua = document.getElementById('user-answer').value.trim();
      if (ua) { userAnswers[card.nr] = ua; saveState(); }

      document.getElementById('correct-text').textContent = card.raspuns;
      document.getElementById('correct-wrap').style.display = 'block';
      document.getElementById('correct-wrap').scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }

    function vote(val) {
      const card = filtered[idx];
      scores[card.nr] = val;
      saveState();
      updateScoreboard();

      // Auto-advance after short delay
      setTimeout(() => {
        if (idx < filtered.length - 1) navigate(1);
        else renderCard(); // refresh badge on last card
      }, 350);
    }

    function skipCard() {
      const card = filtered[idx];
      if (!scores[card.nr]) { scores[card.nr] = 'skip'; saveState(); updateScoreboard(); }
      navigate(1);
    }

    function navigate(dir) {
      idx = Math.max(0, Math.min(idx + dir, filtered.length - 1));
      saveState();
      renderCard();
    }

    function updateNav() {
      const pos = idx + 1, total = filtered.length;
      document.getElementById('nav-pos').textContent = pos + ' / ' + total;
      document.getElementById('nav-counter-inline').textContent = pos + ' / ' + total;
      document.getElementById('btn-prev').disabled = idx === 0;
      document.getElementById('btn-next').disabled = idx === filtered.length - 1;
    }

    // ── SCOREBOARD ──
    function updateScoreboard() {
      const stiut = Object.values(scores).filter(v => v === 'stiut').length;
      const nestiut = Object.values(scores).filter(v => v === 'nestiut').length;
      const skip = Object.values(scores).filter(v => v === 'skip').length;
      const parcurse = stiut + nestiut;
      const pct = Math.round(parcurse / 134 * 100);

      document.getElementById('sc-total').textContent = filtered.length;
      document.getElementById('sc-stiut').textContent = stiut;
      document.getElementById('sc-nestiut').textContent = nestiut;
      document.getElementById('sc-skip').textContent = skip;
      document.getElementById('progress-fill').style.width = pct + '%';
      document.getElementById('pct-label').textContent = pct + '%';

      // Stats view
      document.getElementById('st-total').textContent = 134;
      document.getElementById('st-stiut').textContent = stiut;
      document.getElementById('st-nestiut').textContent = nestiut;
      document.getElementById('st-skip').textContent = 134 - stiut - nestiut;

      // Per-tema
      const teme = [...new Set(STUDII.map(s => s.tema))];
      const sec = document.getElementById('tema-section');
      sec.innerHTML = '';
      for (const t of teme) {
        const inTema = STUDII.filter(s => s.tema === t);
        const stiuteT = inTema.filter(s => scores[s.nr] === 'stiut').length;
        const pctT = Math.round(stiuteT / inTema.length * 100);
        const row = document.createElement('div');
        row.className = 'tema-row';
        row.innerHTML = `
      <div class="tema-name">${t}</div>
      <div class="tema-bar-bg"><div class="tema-bar-fill" style="width:${pctT}%"></div></div>
      <div class="tema-nums">${stiuteT}/${inTema.length} &nbsp;<span style="color:var(--accent)">${pctT}%</span></div>
    `;
        sec.appendChild(row);
      }
    }

    // ── VIEW SWITCH ──
    function switchView(v) {
      document.querySelectorAll('.tab-btn').forEach((b, i) => b.classList.toggle('active', (i === 0 && v === 'studiu') || (i === 1 && v === 'stats')));
      document.getElementById('view-studiu').classList.toggle('hidden', v !== 'studiu');
      document.getElementById('view-stats').style.display = v === 'stats' ? 'block' : 'none';
      if (v === 'stats') updateScoreboard();
    }

    // ── RESET ──
    function resetAll() {
      if (!confirm('Ștergi tot progresul? Această acțiune nu poate fi anulată.')) return;
      scores = {}; userAnswers = {};
      localStorage.removeItem('mgr_scores');
      localStorage.removeItem('mgr_useranswers');
      localStorage.removeItem('mgr_idx');
      idx = 0;
      filtered = [...STUDII];
      renderCard();
      updateScoreboard();
    }
  </script>
</body>
